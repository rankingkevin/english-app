 40분 동안 완전히 아무것도 안 하는 것을 지켜봤어요. 다음 월요일에 나는 평소처럼 여섯 시에 일어나 샤워를 하고 목록을 만들었어요. 직업 목록이 아니었어요. 항상 하려고 마음먹었던 것들의 목록이었어요. 그것은, 내가 깨달았는데, 시작하기 전에 피곤하게 만들지 않는 몇 년 만의 첫 번째 목록이었어요.","ex":[{"p":"let me go","m":"해고하다 (완곡하게)","g":"let go = 완곡한 해고 표현. fire나 terminate보다 부드러운 뉘앙스. let someone go = 직원을 내보내다","s":"laid me off / terminated my employment / released me from the company","e":"After the merger, the company let go of nearly a third of its workforce."},{"p":"in a way I had not anticipated","m":"예상하지 못한 방식으로","g":"in a way that = ~한 방식으로. had not anticipated = 미처 예상하지 못했다 (과거완료)","s":"in a manner I hadn't expected / more than I had foreseen / unexpectedly deeply","e":"The quiet of the empty office affected her in a way she had not anticipated."},{"p":"always meant to do","m":"항상 하려고 마음먹었던","g":"mean to do = ~할 의도였다. always meant to = 오랫동안 하려고 했지만 못한 것","s":"always intended to do / kept putting off / had long planned to try","e":"I signed up for the pottery class I had always meant to do but never gotten around to."}]},{"id":82,"level":3,"topic":"사회","title":"The Long Way Around","text":"Daniel and Yusuf had been friends since the seventh grade, and for twenty-two years that fact had required no maintenance. It existed the way their hometown existed — something always there, something you could return to. Then, at a mutual friend's wedding in September, something was said. Neither of them remembered it exactly the same way afterward. Daniel thought he had been joking. Yusuf thought he had been careless. Either way, they left the reception without speaking, and neither reached out in the weeks that followed. By December, the silence had acquired a weight that made starting difficult. It was Yusuf who finally sent a message — not an apology exactly, but an invitation to meet for coffee, which is a kind of apology between people who have known each other long enough not to need the word itself. Daniel replied within the hour. They met the following Saturday. The conversation was awkward at first, and then it wasn't.","ko":"다니엘과 유수프는 7학년 때부터 친구였고, 22년 동안 그 사실은 유지 관리가 필요하지 않았어요. 고향이 존재하는 방식처럼 존재했어요 — 항상 거기 있고, 돌아갈 수 있는 것. 그러다 9월 공동 친구의 결혼식에서 무언가가 말해졌어요. 그 후 두 사람 모두 정확히 같은 방식으로 기억하지 않았어요. 다니엘은 자신이 농담을 했다고 생각했어요. 유수프는 그가 부주의했다고 생각했어요. 어느 쪽이든, 그들은 말 한마디 없이 피로연을 떠났고, 그 후 몇 주 동안 아무도 먼저 연락하지 않았어요. 12월쯤에는 침묵이 시작을 어렵게 만드는 무게를 얻었어요. 마침내 메시지를 보낸 것은 유수프였어요 — 정확히 사과는 아니었지만, 커피 한잔하자는 초대였는데, 이것은 서로를 오래 알아 그 단어 자체가 필요 없는 사람들 사이의 사과의 일종이에요. 다니엘은 한 시간 이내에 답장했어요. 그들은 다음 토요일에 만났어요. 처음에는 대화가 어색했고, 그다음에는 그렇지 않았어요.","ex":[{"p":"required no maintenance","m":"유지 관리가 필요하지 않았다","g":"maintenance = 유지, 관리. 관계를 물건이나 시스템에 비유하는 표현. 노력 없이도 지속된다는 뉘앙스","s":"needed no effort to sustain / just continued on its own / was effortless to keep","e":"Their friendship was easy — it required no maintenance, just presence."},{"p":"the silence had acquired a weight","m":"침묵이 무게를 얻었다","g":"acquire = 얻다, 쌓이다. silence acquires weight = 시간이 지나며 침묵이 더 무거워지다. 감정 묘사의 문학적 표현","s":"the silence had grown heavy / not speaking had become a burden","e":"After a week without contact, the silence had acquired a weight that was hard to break through."},{"p":"not an apology exactly, but","m":"정확히 사과는 아니지만","g":"not exactly = 딱 맞는 말은 아니지만. but 이후에 실제 의미를 전달. 뉘앙스를 살리는 내러티브 기법","s":"something close to an apology / not quite saying sorry, but","e":"It wasn't a confession exactly, but it was close enough that both of them understood."}]},{"id":83,"level":3,"topic":"일상","title":"What She Never Wrote Down","text":"My mother did not cook from recipes. She cooked from memory, from instinct, from a series of adjustments so small and continuous that they could never be fully captured in writing. I tried, once, to document her kimchi jjigae — sitting at the kitchen table with a notebook while she worked. She moved too quickly, and when I asked her to stop, to tell me how much gochugaru, she frowned and said something like: enough. Until it looks right. The jjigae never tastes exactly the same when I make it. It is close, sometimes very close, and in those moments I feel something that is almost memory but not quite. After she died, I found a single index card in her handwriting at the back of a kitchen drawer. It listed seven ingredients without amounts or instructions. I have cooked from that card every year since. I am still learning what she meant.","ko":"어머니는 레시피로 요리하지 않았어요. 기억으로, 직감으로, 너무 작고 지속적이어서 글로는 완전히 담길 수 없는 일련의 조정들로 요리했어요. 나는 한번 그녀의 김치찌개를 기록하려 했어요 — 그녀가 일하는 동안 공책을 들고 부엌 식탁에 앉아서요. 그녀는 너무 빠르게 움직였고, 멈추라고, 고춧가루를 얼마나 넣는지 말해달라고 했을 때, 그녀는 눈살을 찌푸리며 이런 말을 했어요: 충분히. 보기에 맞을 때까지. 내가 만들면 찌개는 정확히 같은 맛이 나지 않아요. 비슷해요, 때로는 아주 비슷해요, 그리고 그 순간에 나는 거의 기억이지만 정확히는 아닌 무언가를 느껴요. 어머니가 돌아가신 후, 나는 주방 서랍 뒤쪽에서 그녀의 필체로 쓴 작은 색인 카드 한 장을 발견했어요. 그 카드에는 양이나 지시 없이 일곱 가지 재료가 나열되어 있었어요. 나는 그 이후로 매년 그 카드로 요리해왔어요. 나는 여전히 그녀가 무엇을 의미했는지 배우고 있어요.","ex":[{"p":"too quickly to document","m":"기록하기에는 너무 빠르게","g":"too + 형용사 + to + 동사 = ~하기에 너무 ~한. 결과적 한계를 나타내는 구조","s":"faster than I could write down / impossible to capture in real time","e":"The conversation moved too quickly to document everything they said."},{"p":"something that is almost memory but not quite","m":"거의 기억이지만 정확히는 아닌 무언가","g":"almost but not quite = 아주 가깝지만 완전히는 아닌. 감각이나 감정의 미묘한 차이를 표현하는 문학적 구절","s":"something close to remembering / a feeling that echoes the past without fully reaching it","e":"Hearing that song gave her something that was almost peace, but not quite."},{"p":"I am still learning what she meant","m":"나는 여전히 그녀가 무엇을 의미했는지 배우고 있다","g":"현재진행형으로 과거의 가르침을 현재에도 이해하는 중임을 표현. 내러티브의 여운 있는 마무리 기법","s":"I'm still trying to understand her / her meaning is still unfolding for me","e":"She gave me advice I didn't understand at the time, and I'm still learning what she meant."}]},{"id":84,"level":3,"topic":"사회","title":"The Waiting Room","text":"The hospital waiting room at eleven in the morning is a study in private suffering made public. A young man in work boots stared at the floor, his hands still in his lap, not moving. An elderly woman knitted with methodical calm, the needles clicking in a steady rhythm that seemed almost aggressive against the silence. Near the window, a teenager scrolled through her phone with the blank focus of someone who needed to be somewhere else. Nobody spoke to each other, though everyone was aware of everyone else in the particular way that shared anxiety makes possible. The television mounted on the wall played a home renovation program at low volume, and twice a nurse appeared at the door and called a name, and twice someone rose and followed her and did not return. The young man in work boots was still there when I finally stood to leave, hours later. I do not know what he was waiting for. I think about him sometimes.","ko":"오전 11시의 병원 대기실은 공공장소에서 드러나는 개인적 고통에 대한 연구와 같아요. 작업복 부츠를 신은 젊은 남자는 바닥을 바라봤고, 그의 손은 무릎 위에서 움직이지 않고 있었어요. 노인 여성은 조직적인 차분함으로 뜨개질을 했는데, 바늘 소리가 침묵에 대해 거의 공격적으로 느껴지는 일정한 리듬으로 딸깍거렸어요. 창문 근처에서 십대 아이는 다른 곳에 있어야 하는 사람의 공허한 집중력으로 폰을 스크롤했어요. 아무도 서로에게 말을 걸지 않았지만, 공유된 불안이 가능하게 하는 특별한 방식으로 모두가 서로를 인식하고 있었어요. 벽에 설치된 TV는 낮은 볼륨으로 집 리모델링 프로그램을 재생했고, 두 번 간호사가 문에 나타나 이름을 불렀고, 두 번 누군가가 일어나 그녀를 따라갔다가 돌아오지 않았어요. 작업복 부츠를 신은 젊은 남자는 몇 시간 후 내가 마침내 자리를 떴을 때도 여전히 거기 있었어요. 나는 그가 무엇을 기다리고 있었는지 모르겠어요. 나는 가끔 그를 생각해요.","ex":[{"p":"a study in","m":"~에 대한 연구, ~을 잘 보여주는 사례","g":"a study in + 명사 = 어떤 특성을 전형적으로 보여주는 것. a study in contrasts/patience/contradiction처럼 사용","s":"a perfect example of / a vivid illustration of / a portrait of","e":"Her face in that moment was a study in barely concealed disappointment."},{"p":"methodical calm","m":"조직적인 차분함, 체계적인 평온","g":"methodical = 체계적인, 조직적인. calm = 평온. 의도적이고 억제된 평정심을 묘사","s":"deliberate composure / careful quietness / a practiced, controlled stillness","e":"He responded to the crisis with methodical calm that reassured everyone around him."},{"p":"shared anxiety makes possible","m":"공유된 불안이 가능하게 하다","g":"관계절 구조: in the way that shared anxiety makes possible. 집단적 감정이 만들어내는 비언어적 연대를 표현","s":"that only comes from facing the same fear / that fear creates among strangers","e":"There was a strange solidarity in the room — the kind that shared anxiety makes possible."}]},{"id":85,"level":3,"topic":"일상","title":"Getting Lost on Purpose","text":"I had been in the city for four days and had seen only the neighborhood around my hotel, a museum, and the inside of three restaurants that the guidebook had recommended. On the fifth morning I left without a plan, without my phone fully charged, and turned in a direction I had not yet tried. Within twenty minutes I was thoroughly lost and thoroughly relieved. I found a market tucked behind a school, where a woman was selling dried herbs from folding tables and arguing cheerfully with a man about the correct way to prepare something I did not recognize. I bought a small paper bag of something that smelled of anise and dried citrus and carried it for the rest of the day. I never found out what it was. Later, I sat in a small square where old men played cards under the shade of a plane tree and children argued over a bicycle, and I understood that I had been traveling wrong until now — mistaking the map for the place.","ko":"나는 도시에 4일 동안 있었고 호텔 주변 동네, 박물관, 그리고 가이드북이 추천한 세 개의 레스토랑 내부만 봤어요. 다섯 번째 아침에 나는 계획 없이, 배터리가 완전히 충전되지 않은 폰을 들고, 아직 가보지 않은 방향으로 떠났어요. 20분 만에 나는 완전히 길을 잃었고 완전히 안도했어요. 나는 학교 뒤편에 숨겨진 시장을 발견했고, 그곳에서 한 여성이 접이식 테이블에서 건조 허브를 팔면서 내가 인식하지 못하는 무언가를 준비하는 올바른 방법에 대해 한 남자와 즐겁게 언쟁하고 있었어요. 나는 아니스와 건조 감귤 향이 나는 작은 종이 봉지를 사서 하루 종일 들고 다녔어요. 그것이 무엇인지 끝내 알아내지 못했어요. 나중에, 나는 플라타너스 나무 그늘 아래에서 노인들이 카드놀이를 하고 아이들이 자전거를 두고 언쟁하는 작은 광장에 앉아, 내가 지금까지 여행을 잘못하고 있었음을 깨달았어요 — 지도를 장소로 오해하면서요.","ex":[{"p":"tucked behind","m":"~뒤에 자리잡은, 숨겨진","g":"tuck = 쑤셔 넣다. be tucked behind/into/away = 눈에 잘 안 띄는 곳에 자리하다. 묘사 문장에서 자주 사용","s":"hidden behind / nestled just behind / out of sight behind","e":"We found a quiet café tucked behind the main shopping street."},{"p":"arguing cheerfully","m":"즐겁게 언쟁하다","g":"argue + 부사로 논쟁의 분위기를 구체화. cheerfully arguing = 다투지만 적대적이지 않은, 활기찬 논쟁","s":"bickering happily / debating with good humor / sparring in a friendly way","e":"The vendors were arguing cheerfully about prices, clearly enjoying the negotiation."},{"p":"mistaking the map for the place","m":"지도를 장소로 오해하다","g":"mistake A for B = A를 B로 잘못 생각하다. 여행·지식·계획의 한계를 비유하는 문학적 표현","s":"confusing the plan for the experience / treating descriptions as the thing itself","e":"Reading about a culture is not the same as living in it — we risk mistaking the map for the place."}]},{"id":86,"level":3,"topic":"사회","title":"One Last Trip","text":"His granddaughter had booked the train tickets without telling him the price, and when he asked, she shook her head and said it was a gift. He was eighty-one and had not been back to the coast since his wife died six years ago. They had gone every summer for forty years, to the same small hotel with the same creaking elevator and the same view of the water that was different every morning. He spent the journey looking out the window. His granddaughter read a book and occasionally touched his arm when the scenery became particularly beautiful, as if to say: look. Look now. They stayed for three days. He slept better than he had in years. On the final morning he stood at the window for a long time before breakfast, watching the water, and she watched him without saying anything, understanding in the way that the young sometimes understand the old — not fully, but enough.","ko":"그의 손녀는 기차표를 예약하면서 가격을 말하지 않았고, 그가 물었을 때 그녀는 고개를 저으며 선물이라고 했어요. 그는 81세였고 6년 전 아내가 세상을 떠난 이후 해안에 가보지 않았어요. 그들은 40년 동안 매년 여름 같은 작은 호텔로 갔었어요. 삐걱거리는 같은 엘리베이터와 매일 아침 달랐던 같은 바다 전망이 있는 곳으로요. 그는 창밖을 바라보며 여행을 보냈어요. 손녀는 책을 읽다가 경치가 특히 아름다울 때마다 가끔 그의 팔을 건드렸어요. 마치 이렇게 말하는 것처럼: 보세요. 지금 보세요. 그들은 3일을 머물렀어요. 그는 몇 년 만에 가장 잘 잠들었어요. 마지막 아침 그는 아침 식사 전에 오랫동안 창가에 서서 물을 바라봤고, 그녀는 아무 말 없이 그를 지켜봤어요. 젊은이들이 때로 노인들을 이해하는 방식으로 — 완전히는 아니지만, 충분히.","ex":[{"p":"without telling him the price","m":"가격을 말하지 않고","g":"without + 동명사 = ~하지 않고. 행동의 방식을 설명하는 분사구문. 이야기에서 인물의 배려를 나타냄","s":"keeping the cost to herself / not mentioning what it cost","e":"She packed his bags without telling him where they were going."},{"p":"as if to say","m":"마치 ~라고 말하는 것처럼","g":"as if to + 동사 = 말이나 의도를 비언어적으로 암시. 내러티브에서 몸짓의 의미를 전달할 때","s":"in a gesture that meant / as though communicating without words","e":"He paused at the door, as if to say he wasn't sure he wanted to leave."},{"p":"not fully, but enough","m":"완전히는 아니지만, 충분히","g":"단문 구조로 복잡한 감정을 압축. not A, but B 패턴. 내러티브 마무리에서 여운을 주는 표현","s":"partially, but sufficiently / not completely, yet more than enough","e":"She didn't understand everything he'd been through, but she understood enough to be kind."}]},{"id":87,"level":3,"topic":"비즈니스","title":"First Day","text":"The badge did not have my name spelled correctly and I decided this was a good sign. The office was open plan, which meant I could see everyone and no one had any reason to look at me, which was the best possible outcome for the first hour. My manager gave me a tour that lasted twenty-two minutes and introduced me to eleven people whose names I lost immediately after each handshake. My desk was near a window that looked out onto another building's brick wall, which I had already decided I liked. By eleven o'clock I had been given three passwords, a systems access form, a mug from a company offsite two years prior, and a potted succulent from a woman named Priya who said it was basically immortal, which she seemed to intend as reassurance. At lunch I ate at my desk because nobody had invited me and I had not yet learned how to invite myself. The afternoon passed in a sequence of onboarding slides and quiet determination not to ask where the bathroom was a third time.","ko":"배지에 내 이름이 올바르게 쓰여 있지 않았고 나는 이것이 좋은 신호라고 결정했어요. 사무실은 오픈 플랜이었는데, 이는 내가 모든 사람을 볼 수 있고 아무도 나를 쳐다볼 이유가 없다는 것을 의미했어요. 이것이 첫 번째 시간을 위한 최선의 결과였어요. 매니저는 22분 동안 투어를 해줬고 악수할 때마다 곧바로 잊어버린 열한 명의 사람들을 소개해줬어요. 내 책상은 다른 건물의 벽돌 벽을 내다보는 창문 근처였는데, 나는 이미 마음에 든다고 결정했어요. 11시가 될 무렵 나는 세 개의 비밀번호, 시스템 접근 양식, 2년 전 회사 워크숍에서 나온 머그, 그리고 프리야라는 여성에게서 받은 다육 식물을 받았어요. 그녀는 그것이 기본적으로 불멸이라고 했는데, 이것이 안심을 주려는 의도인 것 같았어요. 점심에 나는 아무도 나를 초대하지 않았고 아직 나 자신을 초대하는 법을 배우지 못했기 때문에 책상에서 먹었어요. 오후는 온보딩 슬라이드의 연속과 세 번째로 화장실이 어디냐고 묻지 않으려는 조용한 결의로 지나갔어요.","ex":[{"p":"open plan","m":"오픈 플랜 (칸막이 없는 사무실 구조)","g":"open-plan office = 칸막이 없이 열린 사무 공간. 현대 사무실의 가장 일반적인 구조","s":"an open-layout office / a shared workspace with no partitions","e":"The move to an open-plan layout was meant to encourage collaboration, but many employees missed their privacy."},{"p":"had not yet learned how to invite myself","m":"아직 스스로를 초대하는 법을 배우지 못했다","g":"invite oneself = 초대 없이 참여하다. 신입 직원의 사회적 어색함을 유머러스하게 표현","s":"didn't know how to join in without being asked / hadn't figured out how to insert myself","e":"She hadn't yet learned how to invite herself into the lunch group, so she ate alone for the first week."},{"p":"quiet determination","m":"조용한 결의","g":"quiet = 드러내지 않는. determination = 결심. 큰 소리 없이 내부적으로 다짐하는 태도","s":"silent resolve / an internal commitment / subdued but firm intention","e":"He returned to his desk with a quiet determination to get the project done before the end of the week."}]},{"id":88,"level":3,"topic":"일상","title":"The Regular","text":"Every morning at seven forty-five, the man with the gray umbrella came in and ordered a flat white with no sugar, sat at the corner table by the window, opened a notebook, and did not write in it. Elena had worked the morning shift for two years and had never seen him write a single word. He sat for exactly forty minutes, staring at the page or out the window with an expression she could not read, then closed the notebook, tipped generously, and left. She had named him The Professor, though she suspected he was not a professor. One morning he came in earlier than usual and the corner table was taken. He stood in the entrance for a moment — genuinely uncertain, she thought — then chose a table near the counter and ordered his usual. He did not open the notebook. He drank his coffee quickly and left after fifteen minutes. The next day he was back at seven forty-five. The corner table was free. Things resumed their pattern, and Elena felt, for reasons she could not have explained, that this was a relief.","ko":"매일 아침 7시 45분에 회색 우산을 든 남자가 들어와 설탕 없는 플랫 화이트를 주문하고, 창문 옆 구석 테이블에 앉아 공책을 펼치고는 거기에 아무것도 쓰지 않았어요. 엘레나는 2년 동안 아침 교대를 했고 그가 한 글자도 쓰는 것을 본 적이 없었어요. 그는 정확히 40분 동안 앉아서 페이지나 창밖을 그녀가 읽을 수 없는 표정으로 바라보다가 공책을 닫고, 넉넉하게 팁을 남기고 떠났어요. 그녀는 그를 '교수님'이라고 불렀지만, 그가 교수가 아닐 거라고 생각했어요. 어느 날 아침 그는 평소보다 일찍 들어왔고 구석 테이블이 차 있었어요. 그는 잠시 입구에 서 있었어요 — 그녀는 진심으로 당황한 것 같다고 생각했어요 — 그러다 카운터 근처 테이블을 선택하고 평소 주문을 했어요. 공책을 열지 않았어요. 커피를 빠르게 마시고 15분 후 떠났어요. 다음 날 그는 7시 45분에 돌아왔어요. 구석 테이블이 비어 있었어요. 패턴이 재개됐고, 엘레나는 설명할 수 없는 이유로 이것이 안도감이라고 느꼈어요.","ex":[{"p":"an expression she could not read","m":"그녀가 읽을 수 없는 표정","g":"read = (표정·감정을) 파악하다, 읽다. can't read someone = 그 사람의 감정이나 의도를 알 수 없다","s":"an unreadable look / an expression beyond interpretation / a face she couldn't decipher","e":"He stared back at her with an expression she could not read — neither angry nor forgiving."},{"p":"tipped generously","m":"넉넉하게 팁을 남기다","g":"tip = 팁을 주다. generously = 넉넉하게. 캐릭터 묘사에서 인물의 성격을 드러내는 세부 묘사","s":"left a large tip / gave a good amount extra / was notably generous with gratuity","e":"Despite barely touching his food, he tipped generously and left without complaint."},{"p":"resumed their pattern","m":"패턴이 재개됐다","g":"resume = 재개하다. pattern = 일정한 방식. things resumed = 상황이 원래 궤도로 돌아오다","s":"returned to their usual rhythm / went back to the familiar routine / settled again","e":"After the disruption, life gradually resumed its pattern, and the days began to feel normal again."}]},{"id":89,"level":3,"topic":"사회","title":"The Night Before","text":"I could not sleep the night before my licensing exam and so I stopped trying at two in the morning and made tea and sat at the desk where I had spent most of the last eighteen months. The notes were still arranged the way I always arranged them when I was nervous — by color, by topic, then by color again within each topic, a system that communicated anxiety in neat visual form. I knew the material. This was the problem. I had studied it so thoroughly that I had run out of studying to do and was left only with the waiting, which is a different and worse thing. I went through the notes once more, not because I expected to learn anything but because moving through them was something my hands knew how to do. At five I made breakfast. At six-thirty I put on the clothes I had laid out the night before. At seven I left, twenty minutes earlier than necessary. The day was clear and cold. I had passed, I told myself. I had not. But I was on my way.","ko":"면허 시험 전날 밤 잠들지 못해서 나는 새벽 두 시에 시도를 포기하고 차를 끓이고 지난 18개월의 대부분을 보낸 책상에 앉았어요. 노트들은 내가 긴장할 때 항상 정리하는 방식으로 여전히 배열되어 있었어요 — 색깔별로, 주제별로, 그다음 각 주제 내에서 다시 색깔별로. 불안을 깔끔한 시각적 형태로 전달하는 시스템이었어요. 나는 내용을 알고 있었어요. 이것이 문제였어요. 너무 철저하게 공부해서 공부할 것이 더 이상 없었고 오직 기다림만 남아 있었는데, 이것은 다르고 더 나쁜 것이에요. 나는 무언가를 배울 것을 기대해서가 아니라 그것들을 훑어보는 것이 내 손이 어떻게 해야 하는지 알고 있는 일이었기 때문에 노트를 한 번 더 훑었어요. 다섯 시에 아침을 만들었어요. 여섯 시 반에 전날 밤에 꺼내 놓은 옷을 입었어요. 일곱 시에 필요보다 20분 일찍 떠났어요. 날은 맑고 추웠어요. 나는 합격했다고 스스로에게 말했어요. 그러지 못했어요. 하지만 나는 가고 있었어요.","ex":[{"p":"run out of studying to do","m":"더 이상 공부할 것이 없어지다","g":"run out of = 바닥나다, 다 소진되다. run out of time/options/things to say처럼 활용","s":"exhausted everything there was to study / had nothing left to review","e":"She had run out of material to review days before the exam, which made her more anxious, not less."},{"p":"something my hands knew how to do","m":"내 손이 어떻게 해야 하는지 아는 일","g":"muscle memory(근육 기억)를 시적으로 표현. 의식적 사고 없이 몸이 기억하는 반복된 행동","s":"an action my body could do without thinking / a familiar physical habit","e":"After years of practice, playing scales was something her fingers knew how to do without effort."},{"p":"I had passed, I told myself","m":"나는 합격했다고 스스로에게 말했다 (자기 암시)","g":"tell oneself = 자기 자신에게 말하다, 자기 암시. 현실이 아닌 바람을 표현하는 내러티브 기법","s":"I convinced myself I had passed / I tried to believe I'd done it","e":"He would be fine, he told himself, even as he felt the doubt rising."}]},{"id":90,"level":3,"topic":"사회","title":"The Umbrella","text":"It had been raining steadily since morning, and she had forgotten her umbrella at home in the way that people forget things when they are already running late and already frustrated. She stood under the awning of a convenience store for several minutes, calculating distances and odds, and decided to run for it. She made it approximately half a block before a man appeared beside her, slightly out of breath, holding an open umbrella over both their heads without being asked. He was perhaps sixty, in a business suit, and seemed to find nothing remarkable about what he was doing. They walked four blocks together. He asked where she was going; she told him; he said he could go that way. They did not exchange names. At the corner nearest her office, she turned to thank him and he waved it off in the way that people wave off thanks when they have genuinely not thought about whether thanks was owed. She thought about it for the rest of the day. She told the story for years.","ko":"아침부터 비가 꾸준히 내렸고, 그녀는 이미 늦고 이미 짜증이 난 사람들이 물건을 잊어버리는 방식으로 집에 우산을 두고 왔어요. 그녀는 편의점 차양 아래에서 몇 분 동안 거리와 확률을 계산하다 뛰어가기로 결정했어요. 그녀는 약 반 블록을 뛰다가 옆에 나타난 한 남자가 묻지도 않고 두 사람 모두의 머리 위로 펼쳐진 우산을 들어줬어요. 그는 아마도 60대 정도였고 정장을 입었으며 자신이 하는 일이 특별하다고 생각하지 않는 것 같았어요. 그들은 네 블록을 함께 걸었어요. 그는 어디로 가냐고 물었고, 그녀가 말했더니 그 방향으로 갈 수 있다고 했어요. 그들은 이름을 교환하지 않았어요. 사무실에 가장 가까운 모퉁이에서 그녀가 감사 인사를 하려고 돌아섰을 때 그는 감사가 당연한 것인지 진심으로 생각해보지 않은 사람들이 감사를 물리치는 방식으로 손을 저었어요. 그녀는 그날 나머지 시간 동안 그것을 생각했어요. 그녀는 그 이야기를 수년 동안 했어요.","ex":[{"p":"seemed to find nothing remarkable","m":"특별하다고 생각하지 않는 것 같았다","g":"find + 목적어 + 형용사 = ~이 ~하다고 생각하다. nothing remarkable = 특별할 것 없다는 태도","s":"appeared unbothered by it / acted as if it were perfectly ordinary","e":"She seemed to find nothing remarkable about working sixteen-hour days — it was just her normal."},{"p":"calculating distances and odds","m":"거리와 확률을 계산하다","g":"odds = 확률, 가능성. calculate odds = 가능성을 따지다. 즉흥적 상황 판단을 묘사","s":"weighing her options / figuring out her chances / assessing the situation","e":"He stood at the edge of the platform, calculating distances and odds before making his move."},{"p":"waved it off","m":"손을 저어 물리치다, 대수롭지 않게 여기다","g":"wave off = 손을 흔들어 거부하거나 무시하다. 감사·비판·걱정 등을 가볍게 받아들이지 않을 때","s":"brushed it aside / dismissed it with a gesture / shrugged off the thanks","e":"She tried to apologize but he waved it off, saying there was nothing to forgive."}]},{"id":91,"level":3,"topic":"철학","title":"Freedom and Its Discontents","text":"The liberal tradition holds that freedom from coercion is among the highest political goods — that individuals should be left alone to pursue their own conception of the good life, provided they do not harm others. Yet this negative liberty, as the philosopher Isaiah Berlin famously distinguished it, tells us only what we should be free from, not what we should be free for. A society that removes all obstacles to individual choice without cultivating the conditions for meaningful choice may produce citizens who are formally free yet experientially adrift. The paradox is that genuine freedom may require certain constraints: on market power that forecloses opportunity, on misinformation that corrupts deliberation, on social conditions that narrow the range of lives people can imagine for themselves. Freedom, in other words, is not simply the absence of restriction. It is an achievement — one that requires active, collective effort to sustain.","ko":"자유주의 전통은 강제로부터의 자유가 가장 높은 정치적 선 중 하나라고 주장해요 — 개인은 다른 사람에게 해를 끼치지 않는 한 자신의 좋은 삶에 대한 개념을 추구하도록 내버려 둬야 한다고요. 그러나 철학자 이사야 벌린이 유명하게 구분한 이 소극적 자유는 우리가 무엇으로부터 자유로워야 하는지만 알려주지, 무엇을 위한 자유인지는 알려주지 않아요. 의미 있는 선택의 조건을 함양하지 않고 개인 선택에 대한 모든 장애물을 제거하는 사회는 형식적으로는 자유롭지만 경험적으로는 방향을 잃은 시민들을 만들어낼 수 있어요. 역설은 진정한 자유가 특정 제약을 필요로 할 수 있다는 거예요: 기회를 차단하는 시장 권력에 대한, 숙의를 왜곡하는 허위 정보에 대한, 사람들이 자신을 위해 상상할 수 있는 삶의 범위를 좁히는 사회적 조건에 대한 제약이요. 다시 말해, 자유는 단순히 제한의 부재가 아니에요. 그것은 성취예요 — 유지하기 위해 적극적이고 집단적인 노력이 필요한.","ex":[{"p":"negative liberty","m":"소극적 자유 (방해 부재로서의 자유)","g":"Isaiah Berlin의 개념. negative liberty = 외부 방해가 없는 상태. positive liberty = 자아 실현 능력을 갖춘 상태","s":"freedom from interference / the absence of external constraint","e":"Negative liberty guarantees that no one will stop you from acting; it doesn't ensure you have the means to act."},{"p":"experientially adrift","m":"경험적으로 방향을 잃은","g":"adrift = 표류하는, 방향 없는. experientially = 경험의 차원에서. 철학·사회 논설에서 인간 상태를 묘사","s":"lost in practice despite formal freedom / lacking direction in lived experience","e":"Access to infinite options can leave people feeling experientially adrift rather than liberated."},{"p":"forecloses opportunity","m":"기회를 차단하다, 봉쇄하다","g":"foreclose = 원래 금융 용어(압류)→ 가능성을 완전히 차단하다. foreclose an option/future/discussion","s":"shuts off opportunity / eliminates pathways / bars access to","e":"Concentrated market power forecloses opportunity for smaller players who cannot compete."}]},{"id":92,"level":3,"topic":"사회","title":"The Fragility of Democratic Norms","text":"Democracy is sometimes described as if it were a machine — a set of institutional mechanisms that, once established, will continue to produce legitimate governance indefinitely. This view is dangerously complacent. Democratic institutions are not self-sustaining; they depend on informal norms, shared expectations, and the restraint of powerful actors who could, if they chose, bend the rules in their favor. When those norms erode — when leaders begin to treat legal ambiguity as permission, when opposition parties are delegitimized rather than merely defeated, when independent institutions are packed or sidelined — the machinery of democracy may continue to turn while producing something that is no longer democratic in any meaningful sense. The historians Steven Levitsky and Daniel Ziblatt argue that most modern democratic collapses do not arrive with tanks in the streets but through the incremental hollowing out of norms by elected officials who maintain the appearance of legitimacy while dismantling its substance.","ko":"민주주의는 때로 기계처럼 묘사돼요 — 한번 확립되면 무한정 합법적인 거버넌스를 계속 생산할 제도적 메커니즘의 집합으로요. 이 견해는 위험할 정도로 자기만족적이에요. 민주적 제도는 자기 지속적이지 않아요; 비공식적 규범, 공유된 기대, 그리고 원한다면 자신에게 유리하게 규칙을 구부릴 수 있는 강력한 행위자들의 자제에 의존해요. 그 규범이 침식될 때 — 지도자들이 법적 모호성을 허가로 대하기 시작할 때, 야당이 단순히 패배하는 것이 아니라 정당성을 잃게 될 때, 독립적인 기관이 채워지거나 무력화될 때 — 민주주의의 기계는 의미 있는 어떤 의미에서도 더 이상 민주적이지 않은 것을 생산하면서 계속 돌아갈 수 있어요. 역사가 스티븐 레비츠키와 다니엘 지블라트는 대부분의 현대 민주주의 붕괴는 거리의 탱크와 함께 오지 않고 합법성의 외양을 유지하면서 그 실질을 해체하는 선출된 관계자들에 의한 규범의 점진적인 공동화를 통해 온다고 주장해요.","ex":[{"p":"dangerously complacent","m":"위험할 정도로 자기만족적인","g":"complacent = 현재 상태에 너무 만족하여 위험을 간과하는. dangerously = 정도를 강조","s":"perilously self-satisfied / naively overconfident / blind to real risks","e":"Assuming that democracy is self-correcting is dangerously complacent in today's political environment."},{"p":"incremental hollowing out","m":"점진적인 공동화 (속을 비워가는 과정)","g":"hollow out = 속을 비우다. incremental = 점진적인. 겉은 유지하되 실질이 사라지는 과정","s":"gradual erosion / slow gutting of content / step-by-step dismantling","e":"The incremental hollowing out of press freedom often goes unnoticed until the damage is severe."},{"p":"maintaining the appearance of legitimacy","m":"합법성의 외양을 유지하다","g":"appearance of = 실제는 아니지만 겉보기는 그런. legitimacy = 정당성. 정치 분석의 핵심 개념","s":"keeping up the facade of legality / preserving the look of democratic process","e":"The regime maintained the appearance of legitimacy through staged elections with predetermined results."}]},{"id":93,"level":3,"topic":"철학","title":"Language and the Limits of Thought","text":"The Sapir-Whorf hypothesis — that the language we speak shapes the thoughts we are able to think — has occupied linguists and philosophers for decades. In its strong form, the claim is almost certainly false: speakers of different languages do not inhabit fundamentally different cognitive universes. But in its weak form, the hypothesis captures something important. The vocabulary available to us influences what we notice, what we can articulate precisely, and how readily we can distinguish between concepts. Languages with multiple words for types of snow, for instance, make certain perceptual distinctions more available to their speakers. More consequentially, political and moral language shapes the scope of what seems discussable. Societies that lack words for certain forms of injustice are not unable to experience those injustices — but they may find it harder to name them, and naming is a prerequisite for redress. To expand moral vocabulary is, in some sense, to expand the space of moral possibility.","ko":"사피어-워프 가설 — 우리가 사용하는 언어가 우리가 생각할 수 있는 사고를 형성한다는 것 — 은 수십 년 동안 언어학자들과 철학자들을 점령해왔어요. 강한 형태로는 주장이 거의 확실히 거짓이에요: 다른 언어를 사용하는 사람들은 근본적으로 다른 인지 세계에 살지 않아요. 그러나 약한 형태로는 가설이 중요한 무언가를 포착해요. 우리에게 이용 가능한 어휘는 우리가 알아채는 것, 정확하게 표현할 수 있는 것, 그리고 개념들을 얼마나 쉽게 구분할 수 있는지에 영향을 미쳐요. 예를 들어, 눈의 종류에 대한 여러 단어를 가진 언어는 특정 지각적 구분을 화자들에게 더 쉽게 이용 가능하게 해요. 더 중요하게는, 정치적·도덕적 언어가 토론 가능해 보이는 것의 범위를 형성해요. 특정 형태의 불의에 대한 단어가 없는 사회는 그 불의를 경험할 수 없는 것이 아니에요 — 그러나 그것들을 명명하기가 더 어려울 수 있고, 명명은 구제의 전제 조건이에요. 도덕적 어휘를 확장하는 것은 어떤 의미에서 도덕적 가능성의 공간을 확장하는 거예요.","ex":[{"p":"in its strong/weak form","m":"강한/약한 형태로 (주장의 버전)","g":"학술적 논증에서 주장의 강도를 구분하는 표현. strong claim = 극단적 주장, weak claim = 온건한 주장","s":"in its most extreme version / in its more modest interpretation","e":"In its strong form, the theory is hard to defend; in its weak form, it offers real insights."},{"p":"a prerequisite for redress","m":"구제의 전제 조건","g":"prerequisite = 필요 조건. redress = 잘못을 바로잡음. 사회 변화 논의에서 자주 등장","s":"a necessary first step toward correction / required before justice can be sought","e":"Public acknowledgment of a historical wrong is often a prerequisite for meaningful redress."},{"p":"the scope of what seems discussable","m":"토론 가능해 보이는 것의 범위","g":"scope = 범위. discussable = 논의할 수 있는. 언어·정치·문화가 가능한 담론의 영역을 어떻게 규정하는지","s":"the range of what can be openly debated / the boundaries of acceptable conversation","e":"Political language can quietly narrow the scope of what seems discussable without anyone noticing."}]},{"id":94,"level":3,"topic":"문화","title":"The Price of Everything","text":"The commercialization of art is as old as patronage and as new as algorithmic playlist curation. Yet the tension it produces — between the work made for audiences and the work made for its own sake — has never been fully resolved, nor is it likely to be. The market is an efficient mechanism for distributing what people want, but it has no apparatus for distinguishing what people want from what they need, or what they enjoy from what enlarges them. An artist who subordinates creative vision to commercial demand may produce work that is polished and successful and spiritually inert. A culture that prizes entertainment over challenge, comfort over provocation, risks mistaking competence for achievement and popularity for importance. This is not an argument against commercial art; it is an argument against the assumption that commercial success is a reliable measure of artistic value. The two can coincide. The error is in assuming they necessarily do.","ko":"예술의 상업화는 후원만큼 오래됐고 알고리즘 플레이리스트 큐레이션만큼 새로워요. 하지만 그것이 만들어내는 긴장 — 청중을 위해 만들어진 작품과 작품 자체를 위해 만들어진 것 사이 — 은 완전히 해결된 적이 없고 해결될 것 같지도 않아요. 시장은 사람들이 원하는 것을 배분하는 효율적인 메커니즘이지만, 사람들이 원하는 것과 필요한 것을, 또는 그들이 즐기는 것과 그들을 성장시키는 것을 구분하는 장치가 없어요. 창작적 비전을 상업적 수요에 종속시키는 예술가는 세련되고 성공적이지만 영적으로 생기 없는 작품을 생산할 수 있어요. 도전보다 오락을, 도발보다 편안함을 중시하는 문화는 능숙함을 성취로, 인기를 중요성으로 혼동할 위험이 있어요. 이것은 상업적 예술에 반대하는 주장이 아니에요; 상업적 성공이 예술적 가치의 신뢰할 수 있는 척도라는 가정에 반대하는 주장이에요. 두 가지가 일치할 수 있어요. 오류는 그것들이 반드시 그렇다고 가정하는 거예요.","ex":[{"p":"spiritually inert","m":"영적으로 생기 없는, 내면적 울림이 없는","g":"inert = 활동이나 반응이 없는. spiritually inert = 표면적으로 완성됐지만 깊이나 의미가 없는 작품","s":"emotionally hollow / lacking inner depth / technically skilled but soulless","e":"The film was beautifully shot but ultimately spiritually inert — it left nothing behind."},{"p":"subordinates vision to demand","m":"비전을 수요에 종속시키다","g":"subordinate A to B = A를 B보다 낮은 위치에 두다. 창작 vs 상업의 긴장을 표현하는 핵심 구조","s":"sacrifices artistic vision for commercial appeal / bends creativity to market pressure","e":"When studios subordinate vision to demand, the result is films designed to please rather than to matter."},{"p":"the two can coincide","m":"두 가지가 일치할 수 있다","g":"coincide = 동시에 일어나다, 일치하다. 대립되는 두 개념이 함께 실현 가능하다는 논증 구조","s":"both can happen together / commercial and artistic success can align","e":"Quality and accessibility can coincide — the assumption that they cannot is itself a form of elitism."}]},{"id":95,"level":3,"topic":"경제","title":"What Work Is For","text":"For most of human history, work was defined by necessity: you labored to survive. The twentieth century introduced, for a significant portion of humanity, a different possibility — that work could be a source of meaning, identity, and self-actualization, not merely subsistence. This expectation has proven both liberating and tyrannical. Liberating because it expanded what people could demand from their working lives. Tyrannical because it subjected every job to a test it was never designed to pass: not merely does this work pay, but does it fulfill me? The crisis of meaning in modern work is inseparable from this inflation of expectation. At the same time, the automation of routine tasks and the platform economy's disaggregation of stable employment raise a different and more structural question: what happens to identity, social cohesion, and civic life when the institution that has organized both time and selfhood for generations begins to dissolve?","ko":"인류 역사의 대부분 동안 일은 필요에 의해 정의됐어요: 생존을 위해 일했어요. 20세기는 상당한 인류에게 다른 가능성을 도입했어요 — 일이 단순한 생계가 아닌 의미, 정체성, 자아실현의 원천이 될 수 있다는 것이요. 이 기대는 해방적이면서도 전제적인 것으로 증명됐어요. 해방적인 이유는 사람들이 직업 생활에서 요구할 수 있는 것을 확장했기 때문이에요. 전제적인 이유는 모든 직업을 통과하도록 설계된 적 없는 테스트에 종속시켰기 때문이에요: 이 일이 돈을 지불하는가만이 아니라 나를 충족시키는가라는 테스트요. 현대 일의 의미 위기는 이 기대의 인플레이션과 불가분의 관계에 있어요. 동시에, 일상적 업무의 자동화와 플랫폼 경제의 안정적 고용 해체는 다르고 더 구조적인 질문을 제기해요: 세대 동안 시간과 자아 모두를 조직해온 제도가 해체되기 시작할 때 정체성, 사회적 결속, 시민 생활에는 어떤 일이 일어나는가?","ex":[{"p":"both liberating and tyrannical","m":"해방적이면서도 전제적인","g":"both A and B = A이면서 동시에 B. liberating ↔ tyrannical의 역설적 병치가 논설 핵심 구조","s":"at once freeing and oppressive / simultaneously empowering and burdensome","e":"The expectation to love your work is both liberating and tyrannical, depending on your circumstances."},{"p":"inflation of expectation","m":"기대의 인플레이션 (기대치가 지나치게 높아진 상태)","g":"inflation = 경제 용어를 비유적으로 사용. 기대가 지나치게 부풀어 현실과 괴리가 생긴 상태","s":"escalating expectations / unrealistically high demands / the rise in what people feel entitled to","e":"The inflation of expectation around romantic relationships may contribute to higher rates of disappointment."},{"p":"disaggregation of stable employment","m":"안정적 고용의 해체·분산화","g":"disaggregation = 통합된 것을 쪼개 흩어버림. 플랫폼 경제의 긱 워크화를 학술적으로 표현","s":"fragmentation of secure work / breaking apart of traditional employment structures","e":"The disaggregation of stable employment into gig work transfers risk from corporations to individuals."}]},{"id":96,"level":3,"topic":"사회","title":"The Urban Paradox","text":"The city was supposed to be the antidote to loneliness. It concentrates people, generates serendipitous encounters, and offers a density of social possibility unmatched by any other form of human settlement. Yet surveys consistently find that urban residents report higher levels of loneliness than their rural counterparts, and the trend appears to be worsening. The paradox is partly architectural: the design of modern cities optimizes for movement and transaction rather than for lingering and spontaneous sociality. It is partly economic: the cost of urban living pushes people into longer commutes and smaller dwellings, reducing the time and space for neighboring. And it is partly cultural: the urban ethos of self-sufficiency and non-interference, while respectful of privacy, discourages the kind of low-stakes, ongoing social contact that constitutes the connective tissue of community. Proximity, it turns out, is necessary but not sufficient for belonging.","ko":"도시는 외로움에 대한 해독제가 되기로 했어요. 사람들을 집중시키고, 뜻밖의 만남을 만들어내며, 다른 어떤 형태의 인간 정주지도 따라올 수 없는 사회적 가능성의 밀도를 제공해요. 그러나 설문 조사들은 일관되게 도시 거주자들이 농촌 상대방보다 더 높은 외로움 수준을 보고하며, 추세는 악화되는 것으로 나타나고 있어요. 역설은 부분적으로 건축적이에요: 현대 도시의 설계는 머무름과 자발적인 사교성보다 이동과 거래에 최적화되어 있어요. 부분적으로 경제적이에요: 도시 생활 비용이 사람들을 더 긴 출퇴근과 더 작은 주거지로 밀어 이웃과의 시간과 공간을 줄여요. 그리고 부분적으로 문화적이에요: 자기 충족과 불간섭이라는 도시적 에토스는 프라이버시를 존중하지만, 공동체의 결합 조직을 구성하는 종류의 저위험적이고 지속적인 사회적 접촉을 억제해요. 근접성은 소속감에 필요하지만 충분하지는 않은 것으로 밝혀졌어요.","ex":[{"p":"serendipitous encounters","m":"뜻밖의 만남, 우연한 좋은 만남","g":"serendipity = 뜻밖의 행운. serendipitous = 우연히 좋은 일이 일어나는. 도시의 우연성을 긍정적으로 표현","s":"chance meetings / unexpected social moments / spontaneous connections","e":"Cities are designed around the possibility of serendipitous encounters — running into someone at a café."},{"p":"connective tissue of community","m":"공동체의 결합 조직","g":"connective tissue = 신체의 결합 조직 → 비유: 공동체를 하나로 묶는 비공식적 사회적 유대","s":"the social glue that holds communities together / the informal bonds of neighborhood life","e":"Small talk and casual interaction are the connective tissue of community — often undervalued."},{"p":"proximity is necessary but not sufficient","m":"근접성은 필요하지만 충분하지는 않다","g":"필요조건·충분조건의 철학적 구분. A is necessary but not sufficient for B = A가 없으면 B 불가, 그러나 A만으론 B 보장 안됨","s":"being close in space is not the same as being connected / nearness alone doesn't create belonging","e":"Shared geography is necessary but not sufficient for genuine community — trust and time matter too."}]},{"id":97,"level":3,"topic":"문화","title":"Against Accumulation","text":"Consumerism, in its current form, is not simply an economic behavior — it is a comprehensive worldview that equates acquisition with progress, novelty with improvement, and the size of one's possessions with the quality of one's life. This conflation has proven remarkably resilient, surviving repeated critiques from philosophers, environmentalists, and spiritual traditions alike. One reason for its persistence is that it partially works: consumption does produce satisfaction, at least temporarily and at least for some. The problem is not that objects bring pleasure but that the system built around their relentless acquisition extracts enormous costs — environmental, social, and psychological — that are systematically excluded from the price tag. We have built an economy that is extraordinarily efficient at producing things and extraordinarily poor at accounting for what their production and disposal cost. The path forward is not asceticism but honest accounting — a reckoning with what things actually cost, and who pays.","ko":"현재 형태의 소비주의는 단순한 경제적 행동이 아니에요 — 획득을 진보와, 참신함을 개선과, 소유물의 크기를 삶의 질과 동일시하는 포괄적인 세계관이에요. 이 혼동은 철학자, 환경론자, 영적 전통 모두의 반복된 비판에도 살아남아 놀랍도록 회복력 있는 것으로 증명됐어요. 지속성의 한 가지 이유는 부분적으로 효과가 있다는 거예요: 소비는 만족을 만들어내요, 적어도 일시적으로 그리고 적어도 일부에게는요. 문제는 물건이 기쁨을 준다는 것이 아니라 그것들의 끊임없는 획득을 중심으로 구축된 시스템이 — 환경적, 사회적, 심리적 — 가격표에서 체계적으로 제외된 엄청난 비용을 추출한다는 거예요. 우리는 물건을 생산하는 데 엄청나게 효율적이고 그 생산과 폐기가 무엇을 비용으로 치르는지, 누가 지불하는지를 설명하는 데 엄청나게 형편없는 경제를 구축했어요. 앞으로 나아가는 길은 금욕주의가 아니라 정직한 회계예요 — 물건이 실제로 무엇을 비용으로 치르는지, 그리고 누가 지불하는지에 대한 정산이요.","ex":[{"p":"equates acquisition with progress","m":"획득을 진보와 동일시하다","g":"equate A with B = A를 B와 같다고 보다. 소비주의의 핵심 오류를 지적하는 표현","s":"treats buying more as a sign of advancement / conflates ownership with improvement","e":"A culture that equates acquisition with progress will always struggle to accept limits."},{"p":"systematically excluded from the price tag","m":"가격표에서 체계적으로 제외된","g":"externality(외부 효과) 개념을 일상 언어로 표현. 환경·사회적 비용이 상품 가격에 반영되지 않는 문제","s":"not included in the listed cost / left out of what consumers see / invisible in market prices","e":"Carbon emissions are systematically excluded from the price tag of products that generate them."},{"p":"honest accounting","m":"정직한 회계, 진실한 비용 계산","g":"accounting = 회계 → 비유적으로 어떤 행동의 진짜 비용을 따지는 것. a reckoning = 정산","s":"a truthful reckoning / facing the full costs / transparency about real consequences","e":"Progress on climate will require honest accounting of what current lifestyles actually cost the planet."}]},{"id":98,"level":3,"topic":"철학","title":"Where Science Ends","text":"Science is the most powerful method humanity has developed for understanding the natural world. Its power lies in its constraints: falsifiability, peer review, reproducibility, and a principled indifference to what its practitioners might prefer to be true. These constraints are also its limits. Science can tell us what is and what tends to cause what. It cannot tell us what matters, what we should do about it, or how we ought to live. The fact that a fetus can feel pain at a given gestational age is a scientific question. Whether that fact should determine abortion policy is not — it is a question of values, rights, and competing moral claims that no experiment can resolve. The confusion of empirical and normative questions is among the most common and consequential errors in contemporary public discourse. Scientism — the view that science is the only valid form of knowledge — is not science; it is a philosophical claim that science itself cannot adjudicate.","ko":"과학은 자연 세계를 이해하기 위해 인류가 개발한 가장 강력한 방법이에요. 그것의 힘은 제약에 있어요: 반증 가능성, 동료 심사, 재현성, 그리고 실천가들이 사실이길 선호하는 것에 대한 원칙적 무관심이요. 이 제약들은 또한 그것의 한계이기도 해요. 과학은 무엇이 있고 무엇이 무엇을 야기하는 경향이 있는지 알려줄 수 있어요. 무엇이 중요한지, 그것에 대해 무엇을 해야 하는지, 또는 어떻게 살아야 하는지는 알려줄 수 없어요. 태아가 특정 임신 나이에 통증을 느낄 수 있는지의 사실은 과학적 질문이에요. 그 사실이 낙태 정책을 결정해야 하는지 여부는 그렇지 않아요 — 그것은 어떤 실험도 해결할 수 없는 가치, 권리, 경쟁하는 도덕적 주장의 질문이에요. 경험적 질문과 규범적 질문의 혼동은 현대 공론 담론에서 가장 흔하고 중대한 오류 중 하나예요. 과학주의 — 과학이 유일한 유효한 형태의 지식이라는 견해 — 는 과학이 아니에요; 과학 자체가 판결할 수 없는 철학적 주장이에요.","ex":[{"p":"falsifiability","m":"반증 가능성","g":"Karl Popper의 과학철학 개념. 과학적 주장은 틀렸음을 증명할 수 있어야 한다는 원칙","s":"the ability to be proven wrong / openness to disproof / testability","e":"Falsifiability is what distinguishes scientific hypotheses from unfalsifiable ideological claims."},{"p":"empirical vs normative questions","m":"경험적 질문 vs 규범적 질문","g":"empirical = 관찰·데이터로 답할 수 있는. normative = 가치판단에 관한. 과학과 윤리의 경계를 설명하는 핵심 구분","s":"questions of fact vs questions of value / what is vs what ought to be","e":"Mixing empirical and normative questions leads to the false belief that science alone can tell us how to live."},{"p":"cannot adjudicate","m":"판결할 수 없다, 결정할 수 없다","g":"adjudicate = 공식적으로 판단·판결하다. 어떤 영역이 특정 질문을 해결할 권한이 없음을 표현","s":"is not equipped to settle / has no authority to resolve / cannot determine","e":"Science can inform the debate on genetic enhancement, but it cannot adjudicate the ethical questions it raises."}]},{"id":99,"level":3,"topic":"사회","title":"The Inheritance We Did Not Choose","text":"Every generation inherits a world it did not create and a set of problems it did not cause. This is the normal condition of historical life. What is perhaps unusual about the present moment is the scale and the directionality of the inheritance: younger generations are, by most measures, receiving a worse deal than their parents did in terms of housing costs, job security, pension adequacy, and environmental conditions, while simultaneously bearing the costs of decisions made decades before they were born. The political economy of this transfer is rarely named explicitly, because those who made the relevant decisions — and who continue to hold disproportionate political and economic power — have obvious incentives not to frame it as a question of intergenerational justice. Yet justice across time is as real a moral category as justice across space. Indifference to the conditions we bequeath to those who come after us is not neutrality. It is a choice — and a consequential one.","ko":"모든 세대는 자신이 만들지 않은 세계와 자신이 야기하지 않은 일련의 문제들을 물려받아요. 이것이 역사적 삶의 정상적인 조건이에요. 현재 순간에 어쩌면 특이한 것은 상속의 규모와 방향성이에요: 젊은 세대는 대부분의 척도에서 주택 비용, 고용 안정성, 연금 적절성, 환경 조건 면에서 부모 세대보다 더 나쁜 조건을 받고 있으면서, 동시에 태어나기 수십 년 전에 내려진 결정들의 비용을 부담하고 있어요. 이 이전의 정치 경제학은 명시적으로 거의 명명되지 않는데, 관련 결정을 내렸고 — 계속해서 불균형적인 정치적·경제적 권력을 가진 — 사람들이 그것을 세대 간 정의의 문제로 프레임하지 않을 명백한 유인이 있기 때문이에요. 그러나 시간을 넘어선 정의는 공간을 넘어선 정의만큼 실제적인 도덕적 범주예요. 우리 다음에 오는 사람들에게 물려주는 조건에 대한 무관심은 중립이 아니에요. 그것은 선택이에요 — 그리고 중대한 선택이에요.","ex":[{"p":"intergenerational justice","m":"세대 간 정의","g":"intergenerational = 세대 간. justice = 정의. 현재 세대의 결정이 미래 세대에 미치는 도덕적 책임","s":"fairness across generations / what we owe to those who come after us","e":"Climate policy is fundamentally a question of intergenerational justice — who bears the costs of today's choices."},{"p":"disproportionate political power","m":"불균형적인 정치 권력","g":"disproportionate = 비례에 맞지 않는, 과도한. 노인 세대가 정치적으로 과잉 대표되는 문제를 지적","s":"outsized political influence / power exceeding their numbers / political weight beyond their share","e":"Older voters hold disproportionate political power in aging democracies, shaping policy in their favor."},{"p":"we bequeath to those who come after us","m":"다음에 오는 사람들에게 물려주다","g":"bequeath = 유언으로 물려주다 → 비유적으로 다음 세대에 남기다. formal하고 격식 있는 표현","s":"leave for future generations / pass on to those who follow / hand down to our successors","e":"The environmental legacy we bequeath to those who come after us is being shaped right now."}]},{"id":100,"level":3,"topic":"사회","title":"Navigating the Noise","text":"We live in the most information-rich environment in human history, and arguably the worst-equipped to evaluate it. The volume of content produced daily now exceeds any individual's ability to process, and the systems that filter it — search algorithms, social media feeds, recommendation engines — are optimized not for accuracy or depth but for engagement, which is a different and sometimes opposed criterion. The result is an epistemic environment in which it is increasingly difficult to distinguish signal from noise, evidence from assertion, and expertise from performance. This is not primarily a problem of bad actors, though they exist and exploit it. It is a structural problem arising from the misalignment of incentives. The appropriate response is not nostalgia for a mythologized past of reliable information, which never quite existed, but the cultivation of habits of mind: sustained attention, tolerance of complexity, calibrated uncertainty, and a genuine willingness to be wrong. These are not merely intellectual virtues. In a democracy, they are civic ones.","ko":"우리는 인류 역사에서 가장 정보가 풍부한 환경에서 살고 있고, 그것을 평가하는 데 가장 형편없이 갖춰진 환경에서도 살고 있어요. 매일 생산되는 콘텐츠의 양은 이제 어떤 개인의 처리 능력도 초과하고, 그것을 필터링하는 시스템들 — 검색 알고리즘, 소셜 미디어 피드, 추천 엔진 — 은 정확성이나 깊이가 아닌 참여도에 최적화되어 있어요. 이것은 다르고 때로는 대립하는 기준이에요. 결과는 신호와 소음을, 증거와 주장을, 전문성과 퍼포먼스를 점점 더 구별하기 어려운 인식론적 환경이에요. 이것은 주로 나쁜 행위자들의 문제가 아니에요, 그들이 존재하고 그것을 이용하긴 하지만요. 인센티브의 불일치에서 발생하는 구조적 문제예요. 적절한 대응은 결코 정확히 존재하지 않았던 신뢰할 수 있는 정보의 신화화된 과거에 대한 향수가 아니라 마음의 습관 함양이에요: 지속적인 주의, 복잡성에 대한 관용, 조율된 불확실성, 그리고 틀릴 수 있다는 진정한 의지요. 이것들은 단순히 지적인 덕목이 아니에요. 민주주의에서 그것들은 시민적 덕목이에요.","ex":[{"p":"epistemic environment","m":"인식론적 환경 (지식·정보가 구성되는 맥락)","g":"epistemic = 인식론의. epistemology = 지식의 본질과 한계를 연구하는 철학. 정보 생태계를 학술적으로 표현","s":"the information landscape we inhabit / the context in which knowledge is formed and shared","e":"Social media has fundamentally altered the epistemic environment in which citizens make political decisions."},{"p":"signal from noise","m":"신호를 소음에서 구별하다","g":"signal = 의미 있는 정보. noise = 무의미한 정보. 통신 공학 용어가 정보 비평에 비유적으로 사용","s":"meaningful information from background clutter / facts from misinformation","e":"In today's media landscape, distinguishing signal from noise requires active critical effort."},{"p":"calibrated uncertainty","m":"조율된 불확실성 (확신의 정도를 증거에 맞게 조정하는 것)","g":"calibrated = 정밀하게 조정된. 100% 확신도 아니고 완전한 회의도 아닌, 증거에 비례한 믿음의 정도","s":"appropriate confidence levels / holding beliefs proportional to evidence / intellectual humility with precision","e":"Good thinkers practice calibrated uncertainty — they're not wishy-washy, but they don't overclaim either."}]}];

/* ── STORAGE ── */
var SK='rm_v4';
function load(){try{return JSON.parse(localStorage.getItem(SK))||{};}catch(e){return {};}}
function save(s){localStorage.setItem(SK,JSON.stringify(s));}
function getSt(id){var s=load();return s[id]||{done:false,due:null,rating:null,ct:0};}
function setSt(id,u){var s=load();var o=getSt(id);s[id]={done:o.done,due:o.due,rating:o.rating,ct:o.ct};for(var k in u)s[id][k]=u[k];save(s);}
function today(){return new Date().toISOString().slice(0,10);}
function addDays(n){return new Date(Date.now()+n*864e5).toISOString().slice(0,10);}
function isDue(id){var st=getSt(id);if(!st.done||!st.due)return false;return st.due<=today();}
function isNew(id){return !getSt(id).done;}
function srs(id,r){var days=r==='easy'?7:r==='ok'?3:1;setSt(id,{done:true,due:addDays(days),rating:r,ct:(getSt(id).ct||0)+1});updateStreak();}
function updateStreak(){var s=load();var t=today();var y=addDays(-1);if(s._day===t)return;s._streak=(s._day===y?(s._streak||0)+1:1);s._day=t;save(s);}
function getQueue(){var due=DATA.filter(function(p){return isDue(p.id);});var nw=DATA.filter(function(p){return isNew(p.id);}).slice(0,Math.max(0,5-due.length));return due.concat(nw);}

/* ── SCREENS ── */
function showScreen(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});document.getElementById(id).classList.add('active');}

function goHome(){
  stopTTS();stopTimer();
  showScreen('home');
  var s=load();var done=0;var due=0;
  DATA.forEach(function(p){if(getSt(p.id).done)done++;if(isDue(p.id))due++;});
  document.getElementById('statDone').textContent=done;
  document.getElementById('statDue').textContent=due;
  document.getElementById('statStreak').textContent=s._streak||0;
  var bar=document.getElementById('todayDueBar');
  var q=getQueue();
  if(q.length){bar.style.display='block';bar.textContent='오늘 학습: '+q.length+'개 준비됨';}
  else{bar.style.display='none';}
}

var currentFilter='all';
function goList(f){
  stopTTS();
  showScreen('list');
  currentFilter=f||'all';
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.toggle('active',b.dataset.f===currentFilter);});
  renderList();
}
function renderList(){
  var lvc={1:'var(--lv1)',2:'var(--lv2)',3:'var(--lv3)'};
  var lvn={1:'Accessible',2:'Intermediate',3:'Advanced'};
  var items=DATA;
  if(currentFilter==='lv1')items=DATA.filter(function(p){return p.level===1;});
  else if(currentFilter==='lv2')items=DATA.filter(function(p){return p.level===2;});
  else if(currentFilter==='lv3')items=DATA.filter(function(p){return p.level===3;});
  else if(currentFilter==='new')items=DATA.filter(function(p){return isNew(p.id);});
  else if(currentFilter==='due')items=DATA.filter(function(p){return isDue(p.id);});
  else if(currentFilter==='done')items=DATA.filter(function(p){return getSt(p.id).done;});
  document.getElementById('paraList').innerHTML=items.map(function(p){
    var st=getSt(p.id);var badge='';var nxt='';
    if(isDue(p.id)){badge='<span class="badge badge-due">복습</span>';nxt='오늘';}
    else if(isNew(p.id)){badge='<span class="badge badge-new">신규</span>';}
    else{badge='<span class="badge badge-done">완료</span>';nxt=st.due||'';}
    return '<button class="para-card" data-id="'+p.id+'">'
      +'<div class="para-lv" style="background:'+lvc[p.level]+'"></div>'
      +'<div class="para-num">'+p.id+'</div>'
      +'<div class="para-info"><div class="para-title">'+p.title+'</div>'
      +'<div class="para-topic">'+p.topic+' &middot; Lv.'+p.level+' '+lvn[p.level]+'</div></div>'
      +'<div class="para-right">'+badge+'<div class="para-next">'+nxt+'</div></div></button>';
  }).join('');
  document.getElementById('paraList').querySelectorAll('.para-card').forEach(function(btn){
    btn.addEventListener('click',function(){startPara(parseInt(btn.dataset.id));});
  });
}

function startToday(){var q=getQueue();if(!q.length){alert('오늘 학습할 항목이 없어요!\n목록에서 직접 선택해보세요.');return;}startPara(q[0].id);}

/* ── TTS — Google Translate, 문장 단위 분할 재생 ── */
var _audio=null;
var _ttsQueue=[];
var _ttsOnEnd=null;
var ttsPaused=false;
var ttsSpeed=0.9; /* 기본: 보통 */

function stopTTS(){
  _ttsQueue=[];
  _ttsOnEnd=null;
  if(_audio){_audio.onended=null;_audio.pause();_audio=null;}
  ttsPaused=false;
}

/* 긴 텍스트를 문장 단위로 쪼개서 순서대로 재생 */
function playTTS(text, onEndCb){
  stopTTS();
  _ttsOnEnd=onEndCb||null;
  /* 문장 분리 */
  var sents=(text.match(/[^.!?]+[.!?]+/g)||[text]).map(function(s){return s.trim();}).filter(function(s){return s.length>0;});
  _ttsQueue=sents.slice();
  _playNextTTS();
}

function _playNextTTS(){
  if(_ttsQueue.length===0){
    if(_ttsOnEnd)_ttsOnEnd();
    return;
  }
  var sent=_ttsQueue.shift();
  var url='https://translate.google.com/translate_tts?ie=UTF-8&tl=en-US&client=tw-ob&q='+encodeURIComponent(sent);
  _audio=new Audio(url);
  _audio.playbackRate=ttsSpeed;
  _audio.onended=function(){_audio=null;if(!ttsPaused)_playNextTTS();};
  _audio.play().catch(function(){
    /* CORS 차단 → fallback으로 전체 텍스트 한번에 */
    _audio=null;
    _ttsQueue=[];
    _fallbackTTS(sent+' '+_ttsQueue.join(' '), _ttsOnEnd);
  });
}

function _fallbackTTS(text, onEndCb){
  if(!window.speechSynthesis)return;
  var vv=speechSynthesis.getVoices();
  var v=vv.find(function(x){return x.lang==='en-US'&&x.localService;})
    ||vv.find(function(x){return x.lang==='en-US';})
    ||vv.find(function(x){return x.lang.startsWith('en');});
  var u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';u.rate=0.82;
  if(v)u.voice=v;
  if(onEndCb)u.onend=onEndCb;
  speechSynthesis.cancel();
  setTimeout(function(){speechSynthesis.speak(u);},100);
}

function togglePauseTTS(){
  if(!_audio)return false;
  if(ttsPaused){
    _audio.play();
    ttsPaused=false;
    return true;
  } else {
    _audio.pause();
    ttsPaused=true;
    return false;
  }
}

/* ── STEP 2: LISTEN ── */
function stepListen(body){
  stopTimer();
  body.innerHTML=lvBadgeHTML()
    +'<div class="tts-card">'
    +'<div class="tts-icon">&#127911;</div>'
    +'<div class="tts-status" id="ttsStatus">재생 중…</div>'
    +'<div class="tts-controls">'
    +'<button class="tts-btn" id="ttsPlayPause">&#9646;&#9646; 일시정지</button>'
    +'<button class="tts-btn" id="ttsReplay">&#8635; 다시</button>'
    +'</div>'
    +'<div class="speed-bar">'
    +'<button class="speed-btn" data-spd="0.7">&#127746; 느리게</button>'
    +'<button class="speed-btn active" data-spd="0.9">&#9654; 보통</button>'
    +'<button class="speed-btn" data-spd="1.15">&#9193; 빠르게</button>'
    +'</div></div>'
    +'<div class="reading-card"><div class="reading-title">'+CUR.title+'</div><div>'+CUR.text+'</div></div>'
    +'<div class="ko-card">'+CUR.ko+'</div>'
    +'<button class="next-btn" id="listenNext">쉐도잉으로 &#8594;</button>'
    +'<div class="next-hint">Enter 키로도 진행 &nbsp;|&nbsp; Space = 일시정지/재생</div>';

  /* 속도 버튼 */
  body.querySelectorAll('.speed-btn').forEach(function(btn){
    if(parseFloat(btn.dataset.spd)===ttsSpeed)btn.classList.add('active');
    else btn.classList.remove('active');
    btn.addEventListener('click',function(){
      body.querySelectorAll('.speed-btn').forEach(function(b){b.classList.remove('active');});
      btn.classList.add('active');
      ttsSpeed=parseFloat(btn.dataset.spd);
      /* 현재 재생 중이면 재시작 */
      playTTS(CUR.text,function(){updateListenStatus('재생 완료 ✓');updatePlayPauseBtn(false);});
      updateListenStatus('재생 중…');updatePlayPauseBtn(true);
    });
  });

  document.getElementById('listenNext').addEventListener('click',advance);
  document.getElementById('ttsReplay').addEventListener('click',function(){
    playTTS(CUR.text,function(){updateListenStatus('재생 완료 ✓');updatePlayPauseBtn(false);});
    updateListenStatus('재생 중…');updatePlayPauseBtn(true);
  });
  document.getElementById('ttsPlayPause').addEventListener('click',function(){
    var playing=togglePauseTTS();
    updatePlayPauseBtn(playing);
    updateListenStatus(playing?'재생 중…':'일시정지');
  });

  playTTS(CUR.text,function(){updateListenStatus('재생 완료 ✓');updatePlayPauseBtn(false);});
}
function updateListenStatus(txt){var el=document.getElementById('ttsStatus');if(el)el.textContent=txt;}
function updatePlayPauseBtn(isPlaying){
  var btn=document.getElementById('ttsPlayPause');
  if(!btn)return;
  btn.textContent=isPlaying?'⏸ 일시정지':'▶ 재생';
}

function stepShadow(body){

function renderShadow(){
  var body=document.getElementById('studyBody');

    +sHtml
    +'<div class="shadow-controls">'
    +'<button class="shadow-btn" id="replayBtn">&#128266; 다시 (Space)</button>'
    +'<button class="shadow-btn" id="nextSBtn">다음 &#9654;</button>'
    +'</div></div>'
    +'<div style="font-size:13px;color:var(--muted);text-align:center;margin-top:4px">자기 평가</div>'
    +'<div class="rating-wrap">'
    +'<button class="rating-btn r-hard" data-r="hard">&#128517; 어려웠어 <span class="rating-detail">1일 후</span></button>'
    +'<button class="rating-btn r-ok" data-r="ok">&#128522; 괜찮았어 <span class="rating-detail">3일 후</span></button>'
    +'<button class="rating-btn r-easy" data-r="easy">&#128170; 완벽해! <span class="rating-detail">7일 후</span></button>'
    +'</div>';

  document.getElementById('replayBtn').addEventListener('click',replayShadow);
  document.getElementById('nextSBtn').addEventListener('click',nextShadow);
  body.querySelectorAll('.shadow-sent').forEach(function(el){
    el.addEventListener('click',function(){SIDX=parseInt(el.dataset.i);renderShadow();});
  });
  body.querySelectorAll('.rating-btn').forEach(function(btn){
    btn.addEventListener('click',function(){rate(btn.dataset.r);});
  });
  replayShadow();
}
function replayShadow(){
  playTTS(SENTS[SIDX]);
}
function nextShadow(){
  if(SIDX<SENTS.length-1){
    SIDX++;
    renderShadow();
    var el=document.querySelector('.s-active');
    if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
  }
}

function rate(r){
  stopTimer();stopTTS();
  srs(CUR.id,r);
  stepComplete(document.getElementById('studyBody'));
}

/* ── COMPLETE ── */
function stepComplete(body){
  var st=getSt(CUR.id);
  var rl={hard:'&#128517; 어려웠어요',ok:'&#128522; 괜찮았어요',easy:'&#128170; 완벽했어요!'}[st.rating]||'';
  var nextP=getQueue().find(function(p){return p.id!==CUR.id;});
  body.innerHTML='<div class="complete-card">'
    +'<div class="complete-icon">&#127881;</div>'
    +'<div class="complete-title">완료!</div>'
    +'<div class="complete-sub">'+rl+'<br><span style="font-family:var(--mono);font-size:11px;color:var(--dim)">다음 복습: '+st.due+'</span></div>'
    +(nextP?'<button class="next-btn" style="margin-bottom:10px" id="nextParaBtn">다음 문단 &#8594;</button>':'')
    +'<button class="btn-secondary" id="completeHome">홈으로</button>'
    +'<button class="btn-secondary" id="completeList">목록 보기</button>'
    +'</div>';
  if(nextP)document.getElementById('nextParaBtn').addEventListener('click',function(){startPara(nextP.id);});
  document.getElementById('completeHome').addEventListener('click',goHome);
  document.getElementById('completeList').addEventListener('click',function(){goList('all');});
}

/* ── KEYBOARD ── */
document.addEventListener('keydown',function(e){
  /* Backspace = go back */
  if(e.key==='Backspace'&&!['INPUT','TEXTAREA'].includes(document.activeElement.tagName)){
    e.preventDefault();
    var studyActive=document.getElementById('study').classList.contains('active');
    var listActive=document.getElementById('list').classList.contains('active');
    if(studyActive)goHome();
    else if(listActive)goHome();
    return;
  }

  var studyActive=document.getElementById('study').classList.contains('active');
  if(!studyActive)return;
  var tag=document.activeElement.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='BUTTON')return;

  if(e.key===' '||e.key==='Spacebar'){
    e.preventDefault();
    if(STEP===3){
      /* Shadow: space = replay current sentence */
      replayShadow();
    } else if(STEP===2){
      /* Listen: space = pause/resume */
      var playing=togglePauseTTS();
      updatePlayPauseBtn(playing);
      updateListenStatus(playing?'재생 중…':'일시정지');
    }
    return;
  }

  if(e.key==='Enter'){
    if(STEP===1)advance();
    else if(STEP===2)advance();
  }
});

/* ── INIT ── */
document.getElementById('btnToday').addEventListener('click',startToday);
document.getElementById('btnList').addEventListener('click',function(){goList('all');});
document.getElementById('btnDue').addEventListener('click',function(){goList('due');});
document.getElementById('btnReset').addEventListener('click',function(){
  if(confirm('모든 학습 기록을 초기화할까요?\n완료, 복습 일정, 연속 일수가 모두 삭제됩니다.')){
    localStorage.removeItem(SK);
    renderList();
    goHome();
  }
});
document.getElementById('listBack').addEventListener('click',goHome);
document.getElementById('studyBack').addEventListener('click',goHome);
document.querySelectorAll('.filter-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');currentFilter=btn.dataset.f;renderList();
  });
});

/* voices를 미리 로드해두기 (브라우저 초기화 지연 방지) */
if(window.speechSynthesis){
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged=function(){speechSynthesis.getVoices();};
}
goHome();
</script>
</body>
</html>
