m":"일관되게 나타나다·실천하다","g":"show up = 나타나다. consistently = 일관되게. 꾸준함을 강조하는 핵심 표현","s":"being consistently present / turning up reliably / staying the course","e":"The secret to any long-term goal is simply showing up consistently, day after day."}]},{"id":41,"level":2,"topic":"과학·기술","title":"The Nature of Scientific Progress","text":"Science does not progress in a straight line — it moves in fits and starts, through dead ends, false starts, and occasional breakthroughs. New discoveries often overturn what was previously considered settled knowledge. This is not a weakness of science but its greatest strength: the willingness to revise conclusions in the light of new evidence. Unlike belief systems that resist contradiction, science actively seeks to be proven wrong. Understanding this iterative, self-correcting nature of science helps us engage with it more intelligently and with appropriate humility.","ko":"과학은 직선으로 진보하지 않아요 — 막다른 길, 잘못된 시작, 그리고 가끔의 돌파구를 통해 단속적으로 움직여요. 새로운 발견은 종종 이전에 확립된 지식으로 여겨졌던 것을 뒤집어요. 이것은 과학의 약점이 아니라 가장 큰 강점이에요: 새로운 증거에 비추어 결론을 수정하려는 의지요. 모순에 저항하는 믿음 체계와 달리, 과학은 적극적으로 틀렸음을 증명하려 해요. 과학의 이 반복적이고 자기 수정적인 특성을 이해하면 적절한 겸손함으로 더 지능적으로 참여할 수 있어요.","ex":[{"p":"in fits and starts","m":"단속적으로, 들쑥날쑥하게","g":"fits and starts = 일관성 없이 갑자기 시작했다 멈추는 방식","s":"unevenly / inconsistently / in bursts rather than steadily","e":"Progress on the project has been happening in fits and starts."},{"p":"in the light of new evidence","m":"새로운 증거에 비추어","g":"in the light of = ~를 고려하여, ~에 비추어. in light of와 같은 의미","s":"given new evidence / considering new findings / based on new data","e":"The guidelines were updated in the light of new evidence about the treatment."},{"p":"self-correcting nature","m":"자기 수정적 특성","g":"self-correcting = 스스로 오류를 수정하는. self-healing, self-regulating처럼 self- 접두사 활용","s":"ability to self-revise / error-correcting mechanism","e":"The self-correcting nature of science is what makes it more reliable than other ways of knowing."}]},{"id":42,"level":2,"topic":"과학·기술","title":"Artificial Intelligence and Human Creativity","text":"The rise of artificial intelligence has sparked intense debate about the future of human creativity. Some fear that AI will render creative professionals obsolete, while others argue that it will serve as a powerful new tool for augmenting human imagination. The truth is likely somewhere in between. AI excels at pattern recognition and remixing existing data, but it does not experience the world in the way that gives rise to truly original expression. Human creativity is rooted in lived experience, emotion, and meaning — qualities that remain distinctly human. The most productive future may be one where humans and AI collaborate, each contributing what the other cannot.","ko":"인공지능의 부상은 인간 창의성의 미래에 대한 뜨거운 논쟁을 불러일으켰어요. 일부는 AI가 창의적인 전문가들을 쓸모없게 만들 것을 두려워하고, 다른 사람들은 인간의 상상력을 증대시키는 강력한 새 도구로 기능할 것이라고 주장해요. 진실은 아마 그 중간 어딘가에 있을 거예요. AI는 패턴 인식과 기존 데이터 재혼합에 탁월하지만, 진정으로 독창적인 표현을 낳는 방식으로 세상을 경험하지는 않아요. 인간의 창의성은 살아있는 경험, 감정, 의미에 뿌리를 두고 있어요 — 확실히 인간적인 특성들이에요. 가장 생산적인 미래는 인간과 AI가 협력하여 각자가 다른 쪽이 할 수 없는 것을 기여하는 것일 수 있어요.","ex":[{"p":"render creative professionals obsolete","m":"창의적인 전문가들을 쓸모없게 만들다","g":"render + 목적어 + 형용사 = ~를 ~하게 만들다. obsolete = 더 이상 필요 없는","s":"make creative workers redundant / replace human creatives / put artists out of work","e":"Automation has rendered many routine jobs obsolete, but new roles have also emerged."},{"p":"augmenting human imagination","m":"인간의 상상력을 증대시키다","g":"augment = 증가시키다, 보강하다. augmented reality(증강 현실)와 같은 어근","s":"enhancing human creativity / expanding human capability / amplifying imagination","e":"AI tools are increasingly capable of augmenting human imagination in design work."},{"p":"gives rise to","m":"~를 낳다, 야기하다","g":"give rise to = 결과를 만들어내다. lead to와 비슷하지만 더 격식적","s":"leads to / produces / results in / brings about","e":"Poor communication often gives rise to misunderstandings and conflict."}]},{"id":43,"level":2,"topic":"과학·기술","title":"The Internet of Things","text":"The Internet of Things refers to the growing network of physical devices — from refrigerators to streetlights — that are connected to the internet and able to send and receive data. This connectivity promises enormous benefits, from more efficient energy use in smart homes to real-time monitoring of patients in healthcare settings. However, it also introduces significant new risks around privacy and cybersecurity. Every connected device is a potential entry point for hackers, and the personal data generated by these devices is enormously valuable to both corporations and governments. As our environments become increasingly 'smart,' the question of who controls that intelligence becomes urgent.","ko":"사물 인터넷은 냉장고에서 가로등까지 인터넷에 연결되어 데이터를 송수신할 수 있는 물리적 기기의 성장하는 네트워크를 말해요. 이 연결성은 스마트 홈에서의 더 효율적인 에너지 사용부터 의료 환경에서 환자의 실시간 모니터링까지 엄청난 이점을 약속해요. 그러나 개인 정보와 사이버 보안에 관한 중요한 새로운 위험도 도입해요. 연결된 모든 기기는 해커들의 잠재적인 진입점이며, 이러한 기기들이 생성하는 개인 데이터는 기업과 정부 모두에게 엄청나게 가치가 있어요. 환경이 점점 더 '스마트'해질수록 그 지능을 누가 통제하는지의 문제가 시급해져요.","ex":[{"p":"entry point for hackers","m":"해커들의 진입점","g":"entry point = 진입 가능한 지점. 보안에서 공격자가 시스템에 접근할 수 있는 취약점","s":"vulnerability for attackers / security gap / access point for cybercriminals","e":"An unprotected device on your network is an entry point for hackers."},{"p":"enormously valuable to","m":"~에게 엄청나게 가치가 있는","g":"enormously = 엄청나게. enormously + 형용사로 강조. valuable to + 사람/집단","s":"extremely useful for / highly prized by / of great worth to","e":"Customer data is enormously valuable to companies building personalized services."},{"p":"becomes urgent","m":"시급해지다","g":"urgent = 즉각적인 조치가 필요한. becomes urgent = 점점 시급해지다","s":"grows increasingly pressing / can no longer be ignored / demands immediate attention","e":"As climate change accelerates, the need for policy action becomes urgent."}]},{"id":44,"level":2,"topic":"과학·기술","title":"The Science of Memory","text":"Memory is not a recording device — it is a reconstructive process. Every time we recall a memory, we are not playing it back like a video; we are rebuilding it from fragments, influenced by our current mood, beliefs, and context. This is why eyewitness testimony is far less reliable than courts have historically assumed, and why false memories can feel completely real. Sleep plays a crucial role in memory consolidation — the process by which short-term experiences become long-term memories. Understanding how memory actually works can help us learn more effectively and be more appropriately humble about the certainty of our own recollections.","ko":"기억은 녹음 장치가 아니에요 — 재구성 과정이에요. 기억을 떠올릴 때마다 우리는 그것을 비디오처럼 재생하는 게 아니에요; 현재 기분, 믿음, 맥락에 영향을 받아 파편에서 다시 구축해요. 이것이 목격자 증언이 법원이 역사적으로 가정해온 것보다 훨씬 덜 신뢰할 수 있는 이유이고, 거짓 기억이 완전히 실제처럼 느껴질 수 있는 이유예요. 수면은 기억 통합에 중요한 역할을 해요 — 단기 경험이 장기 기억이 되는 과정이요. 기억이 실제로 어떻게 작동하는지 이해하면 더 효과적으로 배우고 자신의 기억의 확실성에 대해 더 적절하게 겸손해질 수 있어요.","ex":[{"p":"reconstructive process","m":"재구성 과정","g":"reconstructive = 다시 구성하는. memory as reconstruction은 인지 심리학의 핵심 개념","s":"process of rebuilding / active recreation rather than playback","e":"Memory is a reconstructive process, which is why it can be surprisingly unreliable."},{"p":"eyewitness testimony","m":"목격자 증언","g":"eyewitness = 직접 목격한 사람. testimony = 증언. 법정 용어","s":"witness accounts / firsthand reports / direct observation evidence","e":"Eyewitness testimony has been shown to be highly unreliable in psychological studies."},{"p":"memory consolidation","m":"기억 통합","g":"consolidation = 굳히기, 통합. 단기 기억이 장기 기억으로 전환되는 신경과학적 과정","s":"the process of forming long-term memories / the solidification of learning","e":"Getting enough sleep is essential for memory consolidation after studying."}]},{"id":45,"level":2,"topic":"과학·기술","title":"Renewable Energy and the Future","text":"The global shift toward renewable energy is one of the most significant economic and technological transitions in human history. Solar and wind power have dropped dramatically in cost over the past decade, making them increasingly competitive with fossil fuels even without subsidies. The main remaining challenge is not generation but storage — how to capture excess energy when the sun is shining and the wind is blowing, and release it when they are not. Battery technology and grid modernization are advancing rapidly to meet this challenge. The transition will require investment, political will, and international cooperation, but the technical feasibility of a clean energy future has never been clearer.","ko":"재생 가능 에너지로의 전 세계적 전환은 인류 역사에서 가장 중요한 경제적·기술적 전환 중 하나예요. 태양열과 풍력의 비용은 지난 10년 동안 급격히 떨어져, 보조금 없이도 화석 연료와 점점 더 경쟁력이 있어지고 있어요. 남은 주요 도전은 발전이 아니라 저장이에요 — 태양이 비치고 바람이 부는 때의 과잉 에너지를 어떻게 포착하고, 그렇지 않을 때 방출하는지요. 배터리 기술과 전력망 현대화가 이 도전을 충족하기 위해 빠르게 발전하고 있어요. 전환은 투자, 정치적 의지, 국제 협력이 필요하겠지만, 청정 에너지 미래의 기술적 실현 가능성은 어느 때보다 명확해요.","ex":[{"p":"dropped dramatically in cost","m":"비용이 급격히 떨어지다","g":"drop dramatically = 급격히 하락하다. cost가 주어인 경우 prices/costs dropped","s":"fallen sharply in price / declined steeply in cost","e":"The cost of solar panels has dropped dramatically over the past fifteen years."},{"p":"political will","m":"정치적 의지","g":"will = 의지. political will = 정치 지도자들이 어떤 일을 추진하려는 의지","s":"government commitment / political determination / policy resolve","e":"The technology exists — what's needed now is the political will to implement it."},{"p":"technical feasibility","m":"기술적 실현 가능성","g":"feasibility = 실행 가능성. technical feasibility study = 기술적 타당성 조사","s":"practical possibility / technical viability / whether it can be done technically","e":"The technical feasibility of the project was confirmed, but funding remains uncertain."}]},{"id":46,"level":2,"topic":"과학·기술","title":"The Psychology of Technology Addiction","text":"Technology companies have invested billions of dollars in understanding and exploiting the psychological vulnerabilities that make their products hard to put down. Variable reward schedules, social validation loops, and infinite scroll are all deliberate design choices intended to maximize the time users spend on platforms. This is not accidental — it is the product of research into behavioural psychology applied at scale. Recognizing that our struggles with technology are partly engineered — not purely a failure of personal discipline — is an important first step. From there, we can advocate for better design practices and make more intentional choices about how we use these tools.","ko":"기술 회사들은 자신들의 제품을 내려놓기 어렵게 만드는 심리적 취약성을 이해하고 활용하는 데 수십억 달러를 투자했어요. 가변적인 보상 일정, 사회적 검증 루프, 그리고 무한 스크롤은 모두 사용자들이 플랫폼에서 보내는 시간을 극대화하기 위한 의도적인 디자인 선택이에요. 이것은 우연이 아니에요 — 규모에 적용된 행동 심리학 연구의 산물이에요. 기술과의 우리의 어려움이 부분적으로 설계된 것임을 인식하는 것 — 순전히 개인적 절제의 실패가 아니라 — 은 중요한 첫 번째 단계예요. 거기서부터 더 나은 디자인 관행을 주창하고 이러한 도구를 어떻게 사용할지에 대한 더 의도적인 선택을 할 수 있어요.","ex":[{"p":"variable reward schedules","m":"가변적인 보상 일정","g":"variable reward = 언제 보상이 올지 모르는 구조. 슬롯머신과 같은 원리로 중독성 높음","s":"unpredictable reward patterns / intermittent reinforcement","e":"Social media uses variable reward schedules to keep users checking compulsively."},{"p":"applied at scale","m":"규모에 적용된, 대규모로 적용된","g":"at scale = 대규모로. scale up = 규모를 확장하다. applied at scale = 광범위하게 실행된","s":"deployed broadly / implemented at a massive level / used across millions of users","e":"A small design change applied at scale can influence millions of people's behavior."},{"p":"advocate for","m":"~를 주창하다, 지지하다","g":"advocate for + 명사/동명사 = ~를 강력히 지지하고 촉구하다","s":"push for / campaign for / stand up for","e":"We need to advocate for digital products that respect users' time and attention."}]},{"id":47,"level":2,"topic":"과학·기술","title":"Genetics and Identity","text":"The mapping of the human genome in 2003 opened up profound questions about the relationship between our genes and who we are. Genetics influences everything from disease risk to personality traits, but it does not determine them. The field of epigenetics has shown that our environment and experiences can actually switch genes on or off, blurring the line between nature and nurture. Your DNA is not a fixed blueprint but a dynamic system that interacts with the world around you. This understanding frees us from genetic fatalism while still respecting the real influence our biology has on our lives.","ko":"2003년 인간 게놈 매핑은 우리의 유전자와 우리가 어떤 사람인지의 관계에 대한 심오한 질문을 열었어요. 유전학은 질병 위험에서 성격 특성까지 모든 것에 영향을 미치지만, 그것들을 결정하지는 않아요. 후성 유전학 분야는 환경과 경험이 실제로 유전자를 켜거나 끌 수 있어, 천성과 양육의 경계를 흐릴 수 있다는 것을 보여줬어요. 당신의 DNA는 고정된 청사진이 아니라 주변 세계와 상호 작용하는 역동적인 시스템이에요. 이 이해는 생물학이 우리 삶에 미치는 실제 영향을 존중하면서도 유전적 숙명론에서 우리를 자유롭게 해줘요.","ex":[{"p":"blurring the line between","m":"~사이의 경계를 흐리다","g":"blur = 흐리게 하다. blur the line/boundary between A and B = A와 B의 경계를 모호하게 하다","s":"obscuring the distinction between / making the boundary less clear between","e":"Remote work has blurred the line between professional and personal life."},{"p":"genetic fatalism","m":"유전적 숙명론","g":"fatalism = 모든 것이 운명으로 정해졌다는 믿음. genetic fatalism = 유전자가 운명을 결정한다는 생각","s":"the belief that genes determine your destiny / genetic determinism","e":"Epigenetics challenges genetic fatalism by showing that lifestyle affects gene expression."},{"p":"interacts with","m":"~와 상호 작용하다","g":"interact with = 서로 영향을 주고받다. interaction = 상호 작용","s":"engages with / works in conjunction with / responds to","e":"Your mindset interacts with your biology in ways scientists are only beginning to understand."}]},{"id":48,"level":2,"topic":"과학·기술","title":"The Attention Economy","text":"We are living through a historic competition for human attention. Every news website, app, and streaming service is competing not just for your money but for your time and mental bandwidth. This has come to be called the attention economy — a system in which attention itself is the scarce resource being bought and sold. The more attention a platform captures, the more advertising revenue it generates. The challenge for individuals is that the incentives of this economy are often at odds with their own well-being and productivity. Reclaiming your attention may be the defining act of self-determination in the digital age.","ko":"우리는 인간의 주의를 위한 역사적인 경쟁 속에서 살고 있어요. 모든 뉴스 웹사이트, 앱, 스트리밍 서비스가 단순히 돈뿐만 아니라 시간과 정신적 대역폭을 위해 경쟁하고 있어요. 이것은 주의 경제라고 불리게 됐어요 — 주의 자체가 사고 팔리는 희소 자원인 시스템이에요. 플랫폼이 더 많은 주의를 포착할수록 더 많은 광고 수익을 창출해요. 개인에게 도전은 이 경제의 인센티브가 종종 자신의 웰빙과 생산성과 상충한다는 거예요. 주의를 되찾는 것이 디지털 시대의 자기 결정의 결정적인 행위일 수 있어요.","ex":[{"p":"mental bandwidth","m":"정신적 대역폭, 인지 용량","g":"bandwidth = 데이터 처리 용량 → 비유적으로 정신적 처리 능력. 구어체에서 자주 사용","s":"cognitive capacity / mental energy / attention capacity","e":"After a day of back-to-back meetings, I have no mental bandwidth left for deep work."},{"p":"at odds with","m":"~와 상충하다, 어긋나다","g":"at odds with = in conflict with. be at odds with someone = 의견이 다르다","s":"in conflict with / incompatible with / working against","e":"The company's stated values were clearly at odds with its actual business practices."},{"p":"self-determination","m":"자기 결정, 자율성","g":"self-determination = 자신의 삶과 선택을 스스로 통제하는 능력. political context에서도 사용","s":"personal autonomy / the right to choose your own path / agency over your life","e":"Protecting your attention is an act of self-determination in a distracted world."}]},{"id":49,"level":2,"topic":"과학·기술","title":"Climate Change and Human Behavior","text":"The scientific consensus on climate change is overwhelming: human activity is driving significant changes to the Earth's climate with potentially catastrophic long-term consequences. Yet despite this evidence, collective action has been frustratingly slow. Psychologists point to several reasons: the scale of the problem makes it feel abstract and overwhelming, the costs of inaction are deferred to the future, and tribal political identities have distorted the issue into a culture war. Effective climate communication increasingly focuses on local, tangible impacts and on solutions rather than problems. Individual action matters, but systemic change — in policy, industry, and infrastructure — is ultimately what the scale of this challenge requires.","ko":"기후 변화에 대한 과학적 합의는 압도적이에요: 인간의 활동이 잠재적으로 재앙적인 장기적 결과를 가진 지구 기후의 중요한 변화를 이끌고 있어요. 하지만 이 증거에도 불구하고 집단적 행동은 답답할 만큼 느렸어요. 심리학자들은 몇 가지 이유를 지적해요: 문제의 규모가 그것을 추상적이고 압도적으로 느끼게 만들고, 행동하지 않는 비용이 미래로 미뤄지고, 부족적 정치적 정체성이 문제를 문화 전쟁으로 왜곡했어요. 효과적인 기후 커뮤니케이션은 점점 더 지역적이고 구체적인 영향과 문제보다는 해결책에 초점을 맞춰요. 개인의 행동은 중요하지만, 정책, 산업, 인프라에서의 시스템적 변화가 궁극적으로 이 도전의 규모가 요구하는 것이에요.","ex":[{"p":"scientific consensus","m":"과학적 합의","g":"consensus = 합의, 일치된 의견. scientific consensus = 과학계 전반의 공통된 결론","s":"the scientific agreement / what scientists broadly agree on","e":"The scientific consensus on vaccine safety is clear and well-established."},{"p":"deferred to the future","m":"미래로 미뤄지다","g":"defer = 연기하다. deferred costs = 나중에 치르게 되는 비용","s":"pushed back to later / postponed to future generations / delayed indefinitely","e":"The costs of environmental damage are often deferred to the future and to others."},{"p":"systemic change","m":"시스템적 변화","g":"systemic = 체계 전반에 걸친. systemic change ↔ individual change","s":"structural reform / large-scale change / change at the system level","e":"Individual recycling matters, but systemic change in industry is what will make the real difference."}]},{"id":50,"level":2,"topic":"과학·기술","title":"The Promise and Peril of Big Data","text":"We are generating more data than at any other point in human history, and the ability to analyze that data at scale is transforming medicine, business, and governance. Big data allows patterns to emerge that would be invisible to any individual observer — predicting disease outbreaks, optimizing supply chains, and personalizing education. But the same technology that enables these benefits also enables unprecedented surveillance, manipulation, and discrimination. Data collected for one purpose can easily be repurposed by corporations and governments. The challenge of the data age is not technological but ethical: how do we harness these capabilities while protecting privacy, consent, and human dignity?","ko":"우리는 인류 역사의 어느 시점보다 더 많은 데이터를 생성하고 있으며, 규모에 맞게 그 데이터를 분석하는 능력이 의학, 비즈니스, 거버넌스를 변환하고 있어요. 빅 데이터는 어떤 개별 관찰자에게도 보이지 않을 패턴이 나타나도록 해요 — 질병 발생을 예측하고, 공급망을 최적화하고, 교육을 개인화하는 것이요. 하지만 이러한 이점을 가능하게 하는 동일한 기술이 전례 없는 감시, 조작, 차별도 가능하게 해요. 한 가지 목적으로 수집된 데이터는 기업과 정부에 의해 쉽게 다른 목적으로 재사용될 수 있어요. 데이터 시대의 도전은 기술적이 아니라 윤리적이에요: 개인 정보, 동의, 인간 존엄성을 보호하면서 이러한 능력을 어떻게 활용하나요?","ex":[{"p":"at scale","m":"대규모로","g":"at scale = 대규모로, 광범위하게. scale up(규모 확장)과 연관. 기술·비즈니스에서 자주 사용","s":"at a large scale / across many cases / broadly and systematically","e":"The real benefit of AI comes when it can be applied at scale across an entire system."},{"p":"repurposed by","m":"~에 의해 다른 목적으로 재사용되다","g":"repurpose = 원래 목적 외의 용도로 사용하다. re- 접두사 = 다시","s":"used for different purposes by / redirected by / applied differently by","e":"Health data collected by fitness apps can easily be repurposed by insurance companies."},{"p":"harness these capabilities","m":"이러한 능력을 활용하다","g":"harness = 말에 마구를 달다 → 에너지나 능력을 통제해서 활용하다. harness power, harness potential","s":"leverage these capabilities / make use of these abilities / tap into this power","e":"The goal is to harness the capabilities of AI while keeping humans in control."}]},{"id":51,"level":2,"topic":"과학·기술","title":"How Vaccines Work","text":"Vaccines are one of the most effective public health interventions ever developed. They work by introducing a harmless version of a pathogen into the body, training the immune system to recognize and fight it. When the real pathogen arrives, the immune system can respond quickly, preventing serious illness. Modern mRNA vaccines represent a significant advance, allowing vaccines to be designed and produced faster than ever before. The widespread hesitancy around vaccines highlights the importance of clear, accessible science communication.","ko":"백신은 지금까지 개발된 가장 효과적인 공중 보건 중재 중 하나예요. 무해한 버전의 병원체를 몸에 도입하여 면역 체계가 그것을 인식하고 싸우도록 훈련시켜요. 실제 병원체가 도착하면 면역 체계가 빠르게 반응하여 심각한 질병을 예방해요. 현대 mRNA 백신은 이전보다 훨씬 빠르게 설계하고 생산할 수 있게 하는 중요한 발전이에요. 백신에 대한 광범위한 망설임은 명확하고 접근 가능한 과학 커뮤니케이션의 중요성을 강조해요.","ex":[{"p":"public health interventions","m":"공중 보건 중재","g":"intervention = 개입, 중재. public health interventions = 정책·백신·프로그램 등 건강을 위한 조치","s":"health measures / preventive strategies / population-level health tools","e":"Hand-washing is one of the simplest and most effective public health interventions."},{"p":"respond quickly","m":"빠르게 반응하다","g":"respond to = ~에 반응하다. respond quickly/effectively/appropriately처럼 부사와 함께 사용","s":"react rapidly / mount a swift response","e":"A trained immune system can respond quickly to familiar threats."},{"p":"widespread hesitancy","m":"광범위한 망설임·거부감","g":"hesitancy = 주저함. vaccine hesitancy는 백신 접종을 꺼리는 현상을 가리키는 공식 용어","s":"broad reluctance / general resistance / pervasive doubt","e":"Widespread hesitancy about new treatments can slow down important medical progress."}]},{"id":52,"level":2,"topic":"과학·기술","title":"The Human Microbiome","text":"The human body contains trillions of microorganisms — bacteria, viruses, and fungi — that together make up the microbiome. Far from being harmful, most of these microbes are essential to our health. They help digest food, regulate the immune system, and even influence mood and mental health. Research suggests that the diversity of the gut microbiome is linked to a wide range of health outcomes, from metabolic conditions to depression. Diet, antibiotics, and stress all affect this ecosystem. Taking care of your gut health is increasingly understood as central to overall well-being.","ko":"인체에는 수조 개의 미생물 — 박테리아, 바이러스, 곰팡이 — 이 있으며, 이들이 함께 마이크로바이옴을 구성해요. 해롭기는커녕 이 미생물들 대부분은 건강에 필수적이에요. 음식 소화를 돕고, 면역 체계를 조절하고, 심지어 기분과 정신 건강에도 영향을 미쳐요. 연구는 장 마이크로바이옴의 다양성이 대사 질환에서 우울증까지 광범위한 건강 결과와 연관이 있다고 제안해요. 식단, 항생제, 스트레스 모두 이 생태계에 영향을 미쳐요. 장 건강을 돌보는 것이 전반적인 웰빙의 핵심으로 점점 더 이해되고 있어요.","ex":[{"p":"far from being harmful","m":"해롭기는커녕","g":"far from + 동명사/형용사 = ~와는 거리가 멀다. 강한 반전 표현","s":"rather than being harmful / instead of being dangerous / anything but harmful","e":"Far from being a waste of time, daydreaming can boost creativity significantly."},{"p":"linked to a wide range of","m":"광범위한 ~와 연관이 있다","g":"be linked to = be associated with. a wide range of = 매우 다양한","s":"connected to numerous / associated with a broad spectrum of","e":"Sleep quality has been linked to a wide range of physical and mental health outcomes."},{"p":"central to overall well-being","m":"전반적인 웰빙의 핵심인","g":"central to = 핵심적인. well-being = 건강과 행복을 포함한 전반적인 상태","s":"essential to total health / fundamental to how we feel overall","e":"Social connection is central to overall well-being at every stage of life."}]},{"id":53,"level":2,"topic":"과학·기술","title":"Quantum Computing","text":"Quantum computing represents a fundamentally different approach to processing information. While classical computers use bits that are either 0 or 1, quantum computers use qubits, which can exist in multiple states simultaneously through a phenomenon called superposition. This allows quantum computers to perform certain types of calculations exponentially faster than classical machines. Practical applications include drug discovery, cryptography, and climate modeling. However, quantum computers are still largely experimental and face significant engineering challenges around stability and error correction. The technology is promising but still years away from widespread real-world deployment.","ko":"양자 컴퓨팅은 정보 처리에 근본적으로 다른 접근 방식을 나타내요. 고전 컴퓨터는 0 또는 1인 비트를 사용하지만, 양자 컴퓨터는 중첩이라는 현상을 통해 여러 상태에 동시에 존재할 수 있는 큐비트를 사용해요. 이를 통해 양자 컴퓨터는 특정 유형의 계산을 고전적 기계보다 기하급수적으로 더 빠르게 수행할 수 있어요. 실용적인 응용에는 신약 발견, 암호학, 기후 모델링이 포함돼요. 하지만 양자 컴퓨터는 여전히 대체로 실험적이며 안정성과 오류 수정에 관한 중요한 엔지니어링 도전에 직면해 있어요. 기술은 유망하지만 광범위한 실제 배포까지는 아직 몇 년이 걸릴 거예요.","ex":[{"p":"simultaneously","m":"동시에","g":"simultaneous = 동시의. at the same time과 같지만 더 격식적·학술적 표현","s":"at the same time / all at once / concurrently","e":"Quantum bits can represent multiple values simultaneously, unlike classical bits."},{"p":"exponentially faster","m":"기하급수적으로 더 빠르게","g":"exponential = 지수적. 단순히 빠른 것이 아니라 배수로 증가하는 속도를 의미","s":"dramatically faster / orders of magnitude quicker","e":"As data sets grow, the right algorithm can make processing exponentially faster."},{"p":"years away from","m":"~까지 아직 몇 년이 걸리다","g":"years away from + 명사/동명사 = 실현까지 수 년이 남다","s":"still a long way from / not yet close to / some time off from","e":"Self-driving cars on every road are still years away from becoming a reality."}]},{"id":54,"level":2,"topic":"과학·기술","title":"The Ethics of Artificial Intelligence","text":"As artificial intelligence becomes more powerful and more embedded in everyday life, the ethical questions it raises become more urgent. Who is responsible when an AI system makes a harmful decision? How do we prevent algorithmic bias from reinforcing existing inequalities? What does it mean for human dignity when machines can outperform us in cognitive tasks? These questions do not have simple answers, and different cultures and political systems will approach them differently. The decisions made now about how to develop, deploy, and regulate AI will shape society for generations. Getting these foundational choices right matters enormously.","ko":"인공지능이 더 강력해지고 일상생활에 더 깊이 내장됨에 따라, 그것이 제기하는 윤리적 질문들이 더 시급해지고 있어요. AI 시스템이 해로운 결정을 내릴 때 누가 책임을 지나요? 알고리즘 편향이 기존 불평등을 강화하지 않도록 어떻게 막나요? 기계가 인지적 작업에서 우리를 능가할 수 있을 때 인간 존엄성에는 어떤 의미가 있나요? 이 질문들은 단순한 답이 없으며, 다른 문화와 정치 체계가 다르게 접근할 거예요. AI를 어떻게 개발하고 배포하고 규제할지에 대해 지금 내리는 결정이 여러 세대에 걸쳐 사회를 형성할 거예요. 이 근본적인 선택을 올바르게 하는 것이 엄청나게 중요해요.","ex":[{"p":"embedded in everyday life","m":"일상생활에 내장되다","g":"embedded = 깊이 박혀있는. be embedded in = ~에 녹아들다, 뿌리내리다","s":"woven into daily life / integrated into everyday experience","e":"Smartphones have become so embedded in everyday life that many feel lost without them."},{"p":"algorithmic bias","m":"알고리즘 편향","g":"algorithmic = 알고리즘의. bias = 편향. AI가 학습 데이터의 편향을 그대로 반영하는 문제","s":"AI bias / computational prejudice / data-driven discrimination","e":"Algorithmic bias in hiring tools can systematically disadvantage certain groups of applicants."},{"p":"foundational choices","m":"근본적인 선택","g":"foundational = 기초적인, 근본적인. foundational decisions/values/principles처럼 사용","s":"fundamental decisions / core choices / basic principles we set now","e":"The foundational choices made in the early days of the internet still shape how it works today."}]},{"id":55,"level":2,"topic":"과학·기술","title":"The Brain and Exercise","text":"The relationship between physical exercise and brain health is far deeper than most people realize. Exercise increases blood flow to the brain, promotes the growth of new neurons — a process called neurogenesis — and releases chemicals like BDNF that support learning and memory. Studies consistently show that physically active people have better cognitive function, lower rates of depression, and a reduced risk of dementia as they age. Even a single bout of moderate exercise can improve focus and mood for several hours afterward. The brain, it turns out, is one of the biggest beneficiaries of a good workout.","ko":"신체 운동과 뇌 건강의 관계는 대부분의 사람들이 깨닫는 것보다 훨씬 더 깊어요. 운동은 뇌로의 혈류를 증가시키고, 신경발생이라는 과정인 새로운 뉴런의 성장을 촉진하며, 학습과 기억을 지원하는 BDNF 같은 화학물질을 방출해요. 연구들은 신체적으로 활발한 사람들이 더 좋은 인지 기능, 더 낮은 우울증 비율, 나이가 들면서 감소된 치매 위험을 가진다는 것을 일관되게 보여줘요. 단 한 번의 적당한 운동도 이후 몇 시간 동안 집중력과 기분을 향상시킬 수 있어요. 알고 보면 뇌가 좋은 운동의 가장 큰 수혜자 중 하나예요.","ex":[{"p":"neurogenesis","m":"신경발생 — 새로운 뉴런이 생성되는 과정","g":"neuro- = 신경. genesis = 생성. 성인 뇌에서도 새 신경세포가 만들어진다는 개념","s":"the growth of new brain cells / formation of new neurons","e":"Regular aerobic exercise has been shown to promote neurogenesis in the hippocampus."},{"p":"a single bout of","m":"단 한 번의 ~","g":"bout = 한 차례, 한 번의 활동. a bout of exercise/illness/coughing처럼 사용","s":"a single session of / one episode of / just one round of","e":"Even a single bout of brisk walking can lift your mood for the rest of the day."},{"p":"beneficiaries of","m":"~의 수혜자","g":"beneficiary = 혜택을 받는 사람/것. benefit에서 파생. 법률·금융에서도 사용","s":"those who gain most from / the biggest winners from","e":"Children are among the greatest beneficiaries of high-quality early education."}]},{"id":56,"level":2,"topic":"과학·기술","title":"Space Exploration Today","text":"Space exploration has entered a new era marked by the growing involvement of private companies alongside national space agencies. Reusable rockets developed by companies like SpaceX have dramatically reduced the cost of launching payloads into orbit. Missions to the Moon, Mars, and beyond are being planned and funded with a speed and ambition that was unimaginable a decade ago. Beyond scientific discovery, space exploration drives technological innovation that benefits life on Earth — from GPS to water purification systems. The ultimate question is whether humanity can use the ingenuity that takes us to the stars to also solve the pressing problems we face here at home.","ko":"우주 탐사는 국가 우주 기관과 함께 민간 기업의 참여가 늘어나는 특징을 가진 새로운 시대에 진입했어요. SpaceX 같은 기업들이 개발한 재사용 가능한 로켓은 페이로드를 궤도에 올리는 비용을 극적으로 줄였어요. 달, 화성, 그 너머로의 임무가 10년 전에는 상상할 수 없었던 속도와 야망으로 계획되고 자금을 지원받고 있어요. 과학적 발견을 넘어, 우주 탐사는 GPS에서 수질 정화 시스템까지 지구 생활에 이익을 주는 기술 혁신을 이끌어요. 궁극적인 질문은 인류가 우리를 별로 데려가는 독창성을 집에서 직면한 시급한 문제들을 해결하는 데도 사용할 수 있느냐예요.","ex":[{"p":"marked by","m":"~로 특징지어지는","g":"be marked by = ~라는 특징이 있다. characterized by와 같은 의미","s":"characterized by / defined by / distinguished by","e":"The twentieth century was marked by extraordinary technological and social change."},{"p":"drives technological innovation","m":"기술 혁신을 이끌다","g":"drive = 이끌다, 촉진하다. drive innovation/growth/change처럼 활용","s":"spurs technological advances / fuels innovation / pushes technology forward","e":"Competition between companies often drives technological innovation more effectively than regulation."},{"p":"pressing problems","m":"시급한 문제들","g":"pressing = 즉각적인 대응이 필요한. pressing issue/concern/need처럼 사용","s":"urgent challenges / immediate issues / critical problems that need solving now","e":"We need leaders who can address the most pressing problems facing society today."}]},{"id":57,"level":2,"topic":"과학·기술","title":"Nutrition Science and Confusion","text":"Few fields generate as much public confusion as nutrition science. Every few years, a food once considered unhealthy is rehabilitated, and a once-celebrated superfood falls from grace. This volatility is partly a result of how nutrition research is conducted — mostly through observational studies that can show correlation but not causation. Media coverage that simplifies complex findings into dramatic headlines makes things worse. The safest guidance from nutrition science is also the most boring: eat mostly whole foods, mostly plants, not too much, and avoid ultra-processed products. This advice has remained consistent while dietary fads come and go.","ko":"공중의 혼란을 이렇게 많이 야기하는 분야도 거의 없어요. 몇 년마다 한때 건강하지 않다고 여겨진 음식이 복권되고, 한때 칭찬받던 슈퍼푸드가 인기를 잃어요. 이 변동성은 부분적으로 영양 연구가 수행되는 방식의 결과예요 — 주로 상관관계는 보여줄 수 있지만 인과관계는 보여줄 수 없는 관찰 연구를 통해서요. 복잡한 결과를 극적인 헤드라인으로 단순화하는 미디어 보도가 상황을 더 악화시켜요. 영양 과학에서 가장 안전한 지침은 또한 가장 지루한 것이에요: 주로 통곡물 식품, 주로 식물성, 너무 많지 않게, 초가공 제품을 피하세요. 이 조언은 식이 유행이 왔다 갔다 하는 동안 일관되게 유지됐어요.","ex":[{"p":"falls from grace","m":"인기를 잃다, 총애를 잃다","g":"fall from grace = 한때 높이 평가됐다가 추락하다. 종교적 표현에서 유래","s":"loses its reputation / falls out of favor / goes from hero to zero","e":"Many once-celebrated business leaders have fallen from grace due to ethical failures."},{"p":"observational studies","m":"관찰 연구","g":"observational = 개입 없이 관찰만 하는. 무작위 대조 시험(RCT)과 대비되는 연구 방법","s":"non-experimental research / correlation-based studies","e":"Most dietary research relies on observational studies, which can't prove causation."},{"p":"dietary fads","m":"식이 유행","g":"fad = 일시적인 유행. dietary fads = 유행하다 사라지는 식이요법들","s":"food trends / nutritional crazes / short-lived diet movements","e":"Dietary fads come and go, but the basics of good nutrition stay largely the same."}]},{"id":58,"level":2,"topic":"과학·기술","title":"The Psychology of Risk","text":"Humans are notoriously poor at assessing risk accurately. We tend to fear dramatic, rare events — plane crashes, shark attacks — far more than mundane, common ones like car accidents or heart disease. This is partly because vivid, memorable events are more easily recalled, a phenomenon psychologists call the availability heuristic. We also tend to underestimate risks that are familiar or that we feel we can control. Understanding these cognitive biases does not make us immune to them, but it can help us make more rational decisions — particularly in areas like personal finance, health, and public policy.","ko":"인간은 위험을 정확하게 평가하는 것으로 악명 높게 서투르죠. 우리는 자동차 사고나 심장 질환 같은 평범하고 흔한 것보다 비행기 추락이나 상어 공격 같은 극적이고 드문 사건을 훨씬 더 두려워하는 경향이 있어요. 이는 부분적으로 생생하고 기억에 남는 사건들이 더 쉽게 떠오르기 때문인데, 심리학자들은 이것을 가용성 휴리스틱이라고 해요. 또한 익숙하거나 통제할 수 있다고 느끼는 위험을 과소평가하는 경향이 있어요. 이러한 인지적 편향을 이해한다고 해서 면역이 되는 건 아니지만, 특히 개인 금융, 건강, 공공 정책 분야에서 더 합리적인 결정을 내리는 데 도움이 될 수 있어요.","ex":[{"p":"notoriously poor at","m":"~로 악명 높게 서투르다","g":"notoriously = 나쁜 의미로 유명하게. poor at = ~를 잘 못하다","s":"famously bad at / consistently terrible at","e":"We are notoriously poor at predicting what will make us happy in the future."},{"p":"availability heuristic","m":"가용성 휴리스틱 — 쉽게 떠오르는 것이 더 흔하다고 착각하는 현상","g":"heuristic = 경험에 기반한 어림법. availability = 쉽게 떠오르는 정도","s":"the tendency to judge likelihood by how easily examples come to mind","e":"The availability heuristic explains why people overestimate the danger of flying after a crash."},{"p":"cognitive biases","m":"인지적 편향","g":"cognitive = 인지의. bias = 편향. 체계적으로 잘못된 사고 패턴을 가리키는 심리학 용어","s":"mental shortcuts that lead to errors / systematic thinking errors","e":"Awareness of cognitive biases can help us make more rational decisions under uncertainty."}]},{"id":59,"level":2,"topic":"과학·기술","title":"CRISPR and Gene Editing","text":"CRISPR-Cas9 is a gene-editing technology that allows scientists to make precise changes to DNA with unprecedented accuracy and ease. Originally discovered as part of the bacterial immune system, it has been adapted into a powerful tool for medicine, agriculture, and basic research. In medicine, it holds promise for treating genetic diseases by correcting the underlying mutations that cause them. However, the ability to edit human embryos raises profound ethical questions about the limits of genetic intervention. The scientific community has called for caution, emphasizing the need for broad societal debate before such technologies are used in ways that could affect future generations.","ko":"CRISPR-Cas9는 과학자들이 전례 없는 정확성과 용이성으로 DNA를 정밀하게 변경할 수 있게 하는 유전자 편집 기술이에요. 원래 박테리아 면역 체계의 일부로 발견되어, 의학, 농업, 기초 연구를 위한 강력한 도구로 적용됐어요. 의학에서는 유전 질환을 일으키는 근본적인 돌연변이를 수정함으로써 치료하는 데 유망함을 보여요. 하지만 인간 배아를 편집하는 능력은 유전적 개입의 한계에 대한 심오한 윤리적 질문을 제기해요. 과학 공동체는 미래 세대에 영향을 미칠 수 있는 방식으로 그러한 기술이 사용되기 전에 광범위한 사회적 논쟁이 필요하다고 강조하며 주의를 촉구했어요.","ex":[{"p":"unprecedented accuracy","m":"전례 없는 정확성","g":"unprecedented = 이전에 없었던. accuracy = 정확성. unprecedented + 명사로 강조 표현","s":"unmatched precision / a level of accuracy never seen before","e":"Modern diagnostic tools offer unprecedented accuracy in detecting early-stage diseases."},{"p":"holds promise for","m":"~에 유망함을 보이다","g":"hold promise = 미래의 가능성을 품고 있다. promising의 동사 표현","s":"shows potential for / offers hope for / is a promising approach to","e":"This experimental treatment holds promise for patients with rare genetic conditions."},{"p":"broad societal debate","m":"광범위한 사회적 논쟁","g":"societal = 사회 전반의. broad = 광범위한. 기술 윤리 논의에서 자주 등장하는 표현","s":"wide public discussion / society-wide conversation / inclusive public discourse","e":"Decisions about AI in schools require broad societal debate, not just expert input."}]},{"id":60,"level":2,"topic":"과학·기술","title":"The Future of Work","text":"Automation and artificial intelligence are reshaping the labor market at a pace that challenges our ability to adapt. Routine tasks, whether physical or cognitive, are increasingly being performed by machines. This is not new — technology has always displaced some jobs while creating others — but the speed and breadth of current changes are unprecedented. The jobs most vulnerable to automation are those involving predictable, repetitive tasks. The jobs most resilient are those requiring creativity, complex judgment, and interpersonal skills. Preparing for this future requires investment in education, retraining programs, and social safety nets that can support workers through transitions.","ko":"자동화와 인공지능이 우리의 적응 능력에 도전하는 속도로 노동 시장을 재편하고 있어요. 신체적이든 인지적이든 반복적인 작업들이 점점 더 기계에 의해 수행되고 있어요. 이것은 새로운 것이 아니에요 — 기술은 항상 어떤 일자리는 대체하면서 다른 일자리를 만들었어요 — 하지만 현재 변화의 속도와 범위는 전례가 없어요. 자동화에 가장 취약한 일자리는 예측 가능하고 반복적인 작업을 포함하는 것들이에요. 가장 회복력 있는 일자리는 창의성, 복잡한 판단력, 대인 관계 기술을 요구하는 것들이에요. 이 미래를 준비하려면 교육, 재훈련 프로그램, 그리고 전환 기간 동안 근로자를 지원할 수 있는 사회 안전망에 대한 투자가 필요해요.","ex":[{"p":"reshaping the labor market","m":"노동 시장을 재편하다","g":"reshape = 새로운 모양으로 바꾸다. labor market = 노동 시장. transform과 비슷","s":"transforming the job market / overhauling the workforce landscape","e":"Remote work technology is reshaping the labor market in ways no one fully predicted."},{"p":"breadth of current changes","m":"현재 변화의 범위","g":"breadth = 폭, 범위. depth(깊이)와 대비. breadth of knowledge/experience처럼 사용","s":"scope of current shifts / the wide range of today's changes","e":"The breadth of changes brought by smartphones still surprises researchers."},{"p":"social safety nets","m":"사회 안전망","g":"safety net = 추락 방지 그물 → 사람들을 빈곤·실업으로부터 보호하는 사회 제도","s":"social support systems / welfare programs / public protection mechanisms","e":"Strong social safety nets help workers manage the stress of economic transitions."}]},{"id":61,"level":2,"topic":"과학·기술","title":"Dark Matter and the Universe","text":"Despite decades of research, approximately 85 percent of the matter in the universe remains undetected and unexplained — a substance scientists call dark matter. We know it exists because of its gravitational effects on visible matter, such as the way it causes galaxies to rotate faster than expected. But no one has ever directly observed a dark matter particle. Several promising candidates have been proposed, but none have been confirmed. The search for dark matter is one of the most exciting open questions in modern physics, reminding us that our current understanding of the universe is radically incomplete.","ko":"수십 년의 연구에도 불구하고, 우주의 물질 중 약 85%는 탐지되지 않고 설명되지 않은 채 남아 있어요 — 과학자들이 암흑 물질이라고 부르는 물질이에요. 그것이 존재한다는 것은 가시적 물질에 미치는 중력 효과로 알 수 있어요, 예를 들어 은하계가 예상보다 더 빠르게 회전하게 만드는 방식처럼요. 하지만 아무도 암흑 물질 입자를 직접 관측한 적이 없어요. 몇 가지 유망한 후보들이 제안됐지만, 확인된 것은 없어요. 암흑 물질 탐색은 현대 물리학에서 가장 흥미로운 열린 질문 중 하나이며, 우주에 대한 현재 이해가 근본적으로 불완전하다는 것을 상기시켜 줘요.","ex":[{"p":"gravitational effects","m":"중력 효과","g":"gravitational = 중력의. effect = 영향, 효과. 물리학 용어지만 일상 글에서도 사용","s":"the pull of gravity / effects caused by gravitational force","e":"Scientists detected the black hole through its gravitational effects on nearby stars."},{"p":"promising candidates","m":"유망한 후보들","g":"candidate = 후보. promising = 가능성 있는. 과학·선거·취업 등 다양한 맥락에서 사용","s":"likely contenders / potential solutions / plausible options","e":"Several promising candidates for the treatment have entered clinical trials."},{"p":"radically incomplete","m":"근본적으로 불완전한","g":"radically = 근본적으로. incomplete = 불완전한. radically different/new처럼도 사용","s":"fundamentally unfinished / deeply partial / far from complete","e":"Our understanding of the brain remains radically incomplete despite decades of research."}]},{"id":62,"level":2,"topic":"과학·기술","title":"Nanotechnology","text":"Nanotechnology involves the manipulation of matter at an incredibly small scale — one billionth of a meter. At this scale, materials often exhibit properties that are entirely different from their bulk counterparts, enabling novel applications in medicine, materials science, and electronics. In medicine, nanoparticles are being developed to deliver drugs directly to cancer cells, minimizing side effects. In materials science, carbon nanotubes offer extraordinary strength at minimal weight. While the potential is immense, concerns about the safety and environmental impact of engineered nanoparticles remain an area of active research. The field exemplifies how the smallest interventions can have the largest consequences.","ko":"나노기술은 믿을 수 없을 정도로 작은 규모 — 1미터의 10억분의 1 — 에서 물질을 조작하는 것을 포함해요. 이 규모에서 재료는 종종 벌크 형태와 완전히 다른 특성을 보여, 의학, 재료 과학, 전자 공학에서 새로운 응용을 가능하게 해요. 의학에서는 나노 입자가 부작용을 최소화하면서 직접 암세포에 약물을 전달하도록 개발되고 있어요. 재료 과학에서는 탄소 나노튜브가 최소한의 무게로 놀라운 강도를 제공해요. 잠재력은 엄청나지만, 설계된 나노 입자의 안전성과 환경 영향에 대한 우려는 여전히 활발한 연구 분야로 남아 있어요. 이 분야는 가장 작은 개입이 가장 큰 결과를 가져올 수 있다는 것을 잘 보여줘요.","ex":[{"p":"exhibit properties","m":"특성을 보이다·나타내다","g":"exhibit = 나타내다, 보여주다. exhibit behavior/symptoms/properties처럼 사용","s":"display characteristics / show qualities / demonstrate features","e":"Materials at the nanoscale exhibit properties that don't exist in larger quantities."},{"p":"minimizing side effects","m":"부작용을 최소화하다","g":"minimize = 최소화하다. side effect = 부작용. minimize risk/damage/disruption처럼도 사용","s":"reducing adverse effects / limiting unwanted reactions","e":"The goal of precision medicine is treating disease while minimizing side effects."},{"p":"exemplifies how","m":"~라는 것을 잘 보여주다","g":"exemplify = 전형적인 예가 되다, 잘 보여주다. exemplifies + that절 또는 how절","s":"perfectly illustrates how / is a great example of how","e":"Her career exemplifies how persistence and adaptability lead to long-term success."}]},{"id":63,"level":2,"topic":"과학·기술","title":"Social Networks and Information Spread","text":"The architecture of modern social networks has fundamentally changed how information — and misinformation — travels through society. Content that triggers strong emotional responses spreads faster and further than content that is merely accurate or informative. This is not a bug but a feature, from the platform's perspective: emotional engagement drives the metrics that generate advertising revenue. The result is an information ecosystem that systematically favors outrage, fear, and division. Solutions are being explored at multiple levels: platform design, media literacy education, and regulatory frameworks. Solving this problem requires understanding it first as a systems issue, not merely a problem of bad actors.","ko":"현대 소셜 네트워크의 구조는 정보 — 그리고 잘못된 정보 — 가 사회를 통해 이동하는 방식을 근본적으로 바꿨어요. 강한 감정적 반응을 유발하는 콘텐츠는 단순히 정확하거나 유익한 콘텐츠보다 더 빠르고 더 멀리 퍼져요. 이것은 플랫폼의 관점에서 버그가 아니라 기능이에요: 감정적 참여가 광고 수익을 창출하는 지표를 이끌어요. 결과는 분노, 두려움, 분열을 체계적으로 선호하는 정보 생태계예요. 해결책은 플랫폼 설계, 미디어 리터러시 교육, 규제 프레임워크 등 여러 수준에서 탐색되고 있어요. 이 문제를 해결하려면 먼저 나쁜 행위자의 문제가 아닌 시스템 문제로 이해해야 해요.","ex":[{"p":"triggers strong emotional responses","m":"강한 감정적 반응을 유발하다","g":"trigger = 유발하다. emotional response = 감정적 반응. trigger outrage/fear/sympathy처럼 사용","s":"provokes intense emotions / sparks strong reactions / generates emotional engagement","e":"Headlines that trigger strong emotional responses get shared far more than neutral ones."},{"p":"not a bug but a feature","m":"버그가 아니라 기능이다","g":"프로그래밍 용어에서 유래한 표현. 의도된 설계임을 강조할 때 아이러니하게 사용","s":"intentional by design / a deliberate choice, not a mistake","e":"The addictive nature of social media is not a bug but a feature — it was engineered that way."},{"p":"systems issue","m":"시스템 문제","g":"systems = 구조·체계 전체. systems issue = 개인이 아닌 구조적 원인에서 비롯된 문제","s":"structural problem / systemic challenge / issue rooted in how the system works","e":"Poverty is a systems issue that cannot be solved by charity alone."}]},{"id":64,"level":2,"topic":"과학·기술","title":"The Microplastics Crisis","text":"Microplastics — tiny plastic fragments less than five millimeters in size — have been found in the deepest oceans, the highest mountains, and most recently, in human blood and lungs. They enter our bodies through food, water, and the air we breathe. The long-term health effects of microplastic exposure are still being studied, but early findings raise serious concerns. The root cause is simple: we produce far more plastic than we can manage or recycle. Addressing this crisis requires reducing plastic production at its source, not just improving waste management at its end. Consumer choices matter, but systemic industrial change is the only solution that matches the scale of the problem.","ko":"마이크로플라스틱 — 5밀리미터 미만의 작은 플라스틱 조각들 — 이 가장 깊은 바다, 가장 높은 산, 그리고 가장 최근에는 인간의 혈액과 폐에서 발견됐어요. 먹는 음식, 물, 그리고 숨쉬는 공기를 통해 몸에 들어와요. 마이크로플라스틱 노출의 장기적인 건강 영향은 아직 연구 중이지만, 초기 결과는 심각한 우려를 제기해요. 근본 원인은 단순해요: 우리가 관리하거나 재활용할 수 있는 것보다 훨씬 더 많은 플라스틱을 생산해요. 이 위기를 해결하려면 끝단의 폐기물 관리를 개선하는 것만이 아니라 원천에서 플라스틱 생산을 줄여야 해요. 소비자 선택은 중요하지만, 시스템적 산업 변화만이 문제의 규모에 맞는 유일한 해결책이에요.","ex":[{"p":"root cause","m":"근본 원인","g":"root = 뿌리. root cause = 문제의 근본적인 원인. root cause analysis = 근본 원인 분석","s":"underlying cause / fundamental source of the problem / core reason","e":"To solve chronic absenteeism, schools need to address its root causes, not just the symptoms."},{"p":"at its source","m":"원천에서","g":"at its source = 문제가 시작되는 곳에서. upstream approach = 원천 해결 방식","s":"at the point of origin / upstream / before it becomes a problem","e":"The most effective pollution control happens at its source, before it enters waterways."},{"p":"matches the scale of","m":"~의 규모에 맞다","g":"match = 맞추다, 부합하다. the scale of the problem = 문제의 규모","s":"is proportionate to / meets the magnitude of / is adequate for the size of","e":"Our response to the housing crisis must match the scale of the need."}]},{"id":65,"level":2,"topic":"과학·기술","title":"Human Augmentation","text":"The boundary between human and machine is becoming increasingly blurred. Technologies ranging from cochlear implants and pacemakers to brain-computer interfaces and exoskeletons are extending and enhancing human capabilities in ways that were once confined to science fiction. Advocates argue that these technologies are simply a continuation of humanity's long history of using tools to overcome limitations. Critics raise concerns about equity — will enhancements only be available to the wealthy? — and about what it means to be human when our abilities are technologically enhanced. These questions will become more pressing as the technologies become more powerful and more widely available.","ko":"인간과 기계 사이의 경계가 점점 더 흐릿해지고 있어요. 인공 달팽이관 이식과 심박 조율기부터 뇌-컴퓨터 인터페이스와 외골격까지 다양한 기술이 한때 공상 과학에만 국한됐던 방식으로 인간의 능력을 확장하고 향상시키고 있어요. 지지자들은 이러한 기술이 단순히 한계를 극복하기 위해 도구를 사용해온 인류의 긴 역사의 연속이라고 주장해요. 비평가들은 형평성 — 향상이 부유층에게만 이용 가능할까요? — 과 능력이 기술적으로 향상될 때 인간이 된다는 것이 무엇을 의미하는지에 대한 우려를 제기해요. 기술이 더 강력해지고 더 널리 이용 가능해짐에 따라 이 질문들은 더 시급해질 거예요.","ex":[{"p":"confined to science fiction","m":"공상 과학에만 국한된","g":"confine to = ~에만 제한하다. was once confined to = 한때는 ~에만 있었다","s":"once limited to sci-fi / previously only imagined in fiction","e":"Ideas once confined to science fiction, like video calls, are now completely ordinary."},{"p":"continuation of","m":"~의 연속","g":"continuation = 계속됨. be a continuation of = ~에서 이어지는 것이다","s":"an extension of / the next step in / a natural progression from","e":"Modern smartphones are simply a continuation of humanity's drive to communicate better."},{"p":"equity","m":"형평성, 공평함","g":"equity = 공정한 접근성. equality(평등)와 구별 — equity는 필요에 따른 차등 지원도 포함","s":"fairness / equal access / social justice in distribution","e":"Discussions about new medical technology must include questions of equity and access."}]},{"id":66,"level":2,"topic":"과학·기술","title":"The Placebo Effect","text":"The placebo effect — improvements in health that result from a patient's belief in a treatment rather than the treatment itself — is one of the most fascinating and poorly understood phenomena in medicine. What makes it particularly interesting is that it works even when patients know they are receiving a placebo, a finding that has upended earlier assumptions. The placebo effect is not imaginary; it involves real physiological changes, including the release of endorphins and changes in brain activity. Understanding and ethically harnessing the placebo effect could be a powerful tool in healthcare. It is a reminder that the mind and body are far more interconnected than medicine has traditionally acknowledged.","ko":"플라시보 효과 — 치료 자체가 아닌 치료에 대한 환자의 믿음으로 인한 건강 개선 — 는 의학에서 가장 매혹적이고 잘 이해되지 않은 현상 중 하나예요. 특히 흥미로운 것은 환자들이 플라시보를 받고 있다는 것을 알면서도 효과가 있다는 것인데, 이 발견이 이전의 가정을 뒤집었어요. 플라시보 효과는 상상이 아니에요; 엔도르핀 분비와 뇌 활동 변화를 포함한 실제 생리적 변화를 포함해요. 플라시보 효과를 이해하고 윤리적으로 활용하는 것은 의료에서 강력한 도구가 될 수 있어요. 이것은 마음과 몸이 의학이 전통적으로 인정해온 것보다 훨씬 더 상호 연결되어 있다는 것을 상기시켜 줘요.","ex":[{"p":"upended earlier assumptions","m":"이전의 가정을 뒤집다","g":"upend = 뒤집다. upend assumptions/expectations/conventions처럼 사용","s":"overturned previous beliefs / challenged earlier thinking / turned prior assumptions on their head","e":"New research has upended earlier assumptions about how much sleep adults actually need."},{"p":"physiological changes","m":"생리적 변화","g":"physiological = 신체의 생리적 기능과 관련된. psychological(심리적)과 구별","s":"bodily changes / physical changes in the body / biological responses","e":"Meditation produces measurable physiological changes, including reduced cortisol levels."},{"p":"harnessing the placebo effect","m":"플라시보 효과를 활용하다","g":"harness = 통제하여 유용하게 활용하다. harness energy/potential/power처럼 사용","s":"making use of the placebo effect / leveraging belief in healing","e":"Researchers are exploring ways of harnessing the placebo effect without deception."}]},{"id":67,"level":3,"topic":"경제","title":"Central Bank Raises Rates Amid Inflation Concerns","text":"The Federal Reserve announced a quarter-point interest rate increase on Wednesday, its third consecutive hike this year, as policymakers sought to bring inflation back toward the bank's two-percent target. Fed Chair Jerome Powell, speaking at a press conference following the decision, acknowledged that the labor market remains resilient but warned that price pressures had not eased as quickly as officials had hoped. The rate now stands at its highest level in over two decades. Economists are divided over whether further tightening will tip the economy into recession. Financial markets fell sharply in the hours following the announcement, with the S&P 500 closing down more than one percent.","ko":"연방준비제도는 수요일에 0.25%포인트 금리 인상을 발표했어요. 이는 올해 세 번째 연속 인상으로, 정책 입안자들이 인플레이션을 중앙은행의 2% 목표치로 되돌리려는 시도예요. 결정 후 기자회견에서 연준 의장 제롬 파월은 노동 시장이 회복탄력성을 유지하고 있다고 인정하면서도 물가 압박이 관계자들이 바랐던 것만큼 빠르게 완화되지 않았다고 경고했어요. 금리는 이제 20년 이상 만에 최고 수준에 달했어요. 경제학자들은 추가 긴축이 경기를 침체로 몰아갈지에 대해 의견이 엇갈려요. 발표 후 몇 시간 동안 금융 시장은 급락했고, S&P 500은 1% 이상 하락하며 마감했어요.","ex":[{"p":"consecutive hike","m":"연속 인상","g":"consecutive = 연속적인. hike = 급격한 인상. rate hike, price hike처럼 사용","s":"successive increase / back-to-back rise","e":"The central bank's third consecutive hike signaled that it was serious about fighting inflation."},{"p":"price pressures had not eased","m":"물가 압박이 완화되지 않았다","g":"ease = 완화되다. pressure eases / tension eases처럼 사용. 뉴스체에서 경제 상황을 묘사할 때 자주 등장","s":"inflation had not subsided / costs remained elevated","e":"Despite rate increases, price pressures had not eased in core goods and services."},{"p":"tip the economy into recession","m":"경기를 침체로 몰아가다","g":"tip into = 어떤 상태로 빠지게 하다. tip into recession은 경제 뉴스의 정형적 표현","s":"push the economy into a downturn / trigger a recession","e":"Aggressive rate hikes risk tipping even a strong economy into recession."}]},{"id":68,"level":3,"topic":"환경","title":"COP Talks End with Fragile Climate Agreement","text":"Delegates from nearly two hundred nations concluded three weeks of negotiations in Dubai on Friday with a landmark agreement that, for the first time, calls on countries to transition away from fossil fuels. The deal stops short of mandating a complete phase-out, a compromise that frustrated climate activists but was seen as politically necessary to secure broad sign-on. The host nation, a major oil producer, faced intense scrutiny throughout the summit. Binding emissions targets remain elusive, and critics argue that without enforcement mechanisms, the agreement will remain aspirational. The next summit is scheduled to take place in Brazil, where deforestation and the protection of the Amazon will dominate the agenda.","ko":"거의 200개국의 대표단이 두바이에서 3주간의 협상을 금요일에 화석 연료로부터의 전환을 국가들에 촉구하는 획기적인 합의로 마무리지었어요. 이 합의는 완전한 단계적 폐지 의무화에는 미치지 못하는 타협안으로, 기후 활동가들을 실망시켰지만 광범위한 동의를 확보하는 데 정치적으로 필요한 것으로 여겨졌어요. 주요 석유 생산국인 개최국은 정상 회담 내내 집중적인 감시를 받았어요. 구속력 있는 배출 목표는 여전히 달성하기 어렵고, 비평가들은 집행 메커니즘 없이는 합의가 열망적인 수준에 머물 것이라고 주장해요. 다음 정상 회담은 브라질에서 개최될 예정이며, 삼림 벌채와 아마존 보호가 의제를 지배할 거예요.","ex":[{"p":"stops short of","m":"~에는 미치지 못하다, ~까지는 하지 않다","g":"stop short of = 어떤 지점 직전에 멈추다. 뉴스에서 합의나 결정의 한계를 설명할 때 자주 사용","s":"falls short of / does not go as far as / avoids","e":"The new policy stops short of banning the practice outright, allowing exceptions."},{"p":"secure broad sign-on","m":"광범위한 동의를 확보하다","g":"sign-on = 참여, 동의. secure = 확보하다. 외교·정치 맥락에서 많이 사용","s":"gain widespread agreement / win broad support","e":"To secure broad sign-on, negotiators had to water down the original proposal significantly."},{"p":"remain aspirational","m":"열망적인 수준에 머물다 (실현 가능성이 낮다)","g":"aspirational = 이상적이지만 현실적으로 달성하기 어려운. 비평 맥락에서 자주 사용","s":"stay on paper only / lack practical force / be little more than wishful thinking","e":"Without accountability measures, even ambitious climate targets tend to remain aspirational."}]},{"id":69,"level":3,"topic":"경제","title":"Tech Startup Files for Bankruptcy After Funding Dries Up","text":"Luminary Health, once valued at over two billion dollars, filed for Chapter 11 bankruptcy protection on Thursday after failing to secure a new round of financing. The San Francisco-based company, which offered an AI-powered platform for personalized wellness coaching, laid off its entire workforce of four hundred employees earlier this month. Investors cited a deteriorating funding environment and the company's failure to reach profitability as key factors in their decision not to participate in a rescue financing round. The collapse is the latest in a series of high-profile startup failures, prompting renewed scrutiny of valuations assigned during the pandemic-era investment boom. Customers have been advised to export their data before the platform is taken offline next month.","ko":"한때 20억 달러 이상의 가치를 평가받았던 루미너리 헬스는 새로운 자금 조달에 실패한 후 목요일에 챕터11 파산 보호를 신청했어요. 개인 맞춤형 웰니스 코칭을 위한 AI 기반 플랫폼을 제공했던 샌프란시스코 소재 이 회사는 이달 초 400명의 전체 직원을 해고했어요. 투자자들은 악화된 자금 조달 환경과 회사의 수익성 달성 실패를 구제 자금 조달 라운드에 참여하지 않기로 한 주요 요인으로 꼽았어요. 이번 붕괴는 일련의 고프로파일 스타트업 실패 중 가장 최근 사례로, 팬데믹 시대의 투자 붐 기간 동안 책정된 가치 평가에 대한 새로운 검토를 촉구하고 있어요. 고객들은 다음 달 플랫폼이 오프라인 상태가 되기 전에 데이터를 내보내도록 권고받았어요.","ex":[{"p":"filed for Chapter 11 bankruptcy","m":"챕터11 파산 보호를 신청하다","g":"Chapter 11 = 미국 파산법 11조. 완전 청산이 아닌 구조조정을 허용. file for = 공식 신청하다","s":"sought bankruptcy protection / applied for insolvency proceedings","e":"The retailer filed for Chapter 11 bankruptcy, hoping to restructure its debts and survive."},{"p":"deteriorating funding environment","m":"악화된 자금 조달 환경","g":"deteriorating = 악화되는. funding environment = 투자 자금이 얼마나 쉽게 조달되는지의 시장 환경","s":"tightening capital markets / a more hostile investment climate","e":"In a deteriorating funding environment, startups without clear revenue models are most vulnerable."},{"p":"renewed scrutiny","m":"새로운 검토, 재점검","g":"scrutiny = 면밀한 검토. renewed = 다시 시작된. face/come under/attract scrutiny처럼 사용","s":"fresh examination / heightened review / increased attention and criticism","e":"The scandal brought renewed scrutiny to the company's governance practices."}]},{"id":70,"level":3,"topic":"과학·기술","title":"Study Links Ultra-Processed Foods to Cognitive Decline","text":"A major longitudinal study published Wednesday in the journal Nature Medicine has found that adults who consume high quantities of ultra-processed foods show significantly faster rates of cognitive decline compared with those who follow less processed diets. The research, which tracked more than ten thousand participants over an eight-year period, controlled for variables including age, education, and baseline health status. The mechanism is not yet fully understood, but researchers suggest that chronic inflammation and disrupted gut microbiome composition may play key roles. The findings add to a growing body of literature linking dietary patterns to long-term brain health. Public health officials are now calling for stronger food labeling requirements and restrictions on the marketing of ultra-processed products to children.","ko":"수요일에 학술지 네이처 메디신에 게재된 대규모 종단 연구에 따르면, 초가공 식품을 많이 섭취하는 성인은 덜 가공된 식단을 따르는 사람들에 비해 인지 기능 저하 속도가 훨씬 빠른 것으로 나타났어요. 8년에 걸쳐 1만 명 이상의 참가자를 추적한 이 연구는 나이, 교육 수준, 기저 건강 상태를 포함한 변수들을 통제했어요. 메커니즘은 아직 완전히 이해되지 않았지만, 연구자들은 만성 염증과 장 마이크로바이옴 구성의 혼란이 핵심적인 역할을 할 수 있다고 제안해요. 이번 발견은 식이 패턴과 장기적인 뇌 건강을 연결하는 점점 더 많은 문헌에 추가돼요. 공중 보건 관계자들은 이제 더 강력한 식품 표시 요건과 어린이 대상 초가공 제품 마케팅 제한을 촉구하고 있어요.","ex":[{"p":"longitudinal study","m":"종단 연구 (장기 추적 연구)","g":"longitudinal = 시간의 흐름에 따라 같은 대상을 추적하는. cross-sectional study(횡단 연구)와 반대","s":"long-term tracking study / cohort study over time","e":"Only a longitudinal study can show whether a lifestyle change actually causes better health outcomes."},{"p":"controlled for variables","m":"변수를 통제하다","g":"control for = 영향을 줄 수 있는 다른 요인을 제거하다. 연구 방법론 설명에서 핵심 표현","s":"accounted for confounding factors / adjusted for other influences","e":"The researchers controlled for variables like income and exercise when analyzing the data."},{"p":"a growing body of literature","m":"점점 늘어나는 연구 문헌","g":"body of literature = 특정 주제에 관한 연구 집합. a growing body of = 점점 증가하는","s":"an expanding pool of research / increasing scientific evidence","e":"There is now a growing body of literature supporting the link between sleep and immune function."}]},{"id":71,"level":3,"topic":"사회","title":"Snap Election Results Signal Shift in Voter Sentiment","text":"The ruling coalition suffered its worst electoral defeat in three decades on Sunday, losing control of the lower house in a snap election called by the prime minister just eight weeks ago. The opposition bloc, which campaigned on a platform of economic reform and anti-corruption measures, secured two hundred and twelve seats — well above the threshold needed to form a government without coalition partners. Turnout reached sixty-four percent, the highest in twelve years, suggesting that widespread public frustration had translated into active political engagement. The outgoing administration will remain in a caretaker capacity until a new government is formally sworn in. Financial markets opened higher on Monday, interpreting the result as a signal of greater economic policy predictability.","ko":"집권 연립 정부는 8주 전 총리가 요청한 조기 선거에서 30년 만에 최악의 선거 패배를 겪으며 하원 통제권을 잃었어요. 경제 개혁과 반부패 조치를 공약으로 내세운 야권 블록은 연립 파트너 없이 정부를 구성하는 데 필요한 기준치를 훨씬 넘는 212석을 확보했어요. 투표율은 12년 만에 최고치인 64%를 기록했으며, 광범위한 공중의 불만이 적극적인 정치 참여로 이어졌음을 시사해요. 퇴임하는 행정부는 새 정부가 공식적으로 취임할 때까지 관리 역할로 남을 거예요. 금융 시장은 월요일에 더 높게 개장했으며, 이 결과를 더 큰 경제 정책 예측 가능성의 신호로 해석했어요.","ex":[{"p":"snap election","m":"조기 선거, 돌발 선거","g":"snap = 갑작스러운. snap election = 임기 만료 전에 갑자기 실시되는 선거. 영국·의원내각제 국가에서 흔한 표현","s":"early election / surprise vote / called election","e":"The prime minister called a snap election to capitalize on high approval ratings."},{"p":"caretaker capacity","m":"관리자 역할, 과도기 역할","g":"caretaker = 임시 관리자. caretaker government/capacity = 다음 정부까지 최소한의 역할만 하는 상태","s":"interim role / acting administration / transitional status","e":"The outgoing president remained in a caretaker capacity for three weeks after losing the election."},{"p":"translated into","m":"~로 이어지다, 전환되다","g":"translate into = 어떤 결과나 행동으로 나타나다. 추상적 감정이 구체적 행동으로 바뀔 때 사용","s":"converted into / resulted in / turned into","e":"Growing public anger translated into the largest protest march the city had seen in years."}]},{"id":72,"level":3,"topic":"사회","title":"Flood Response Overwhelms Local Authorities","text":"Emergency services in the southern province are struggling to reach thousands of residents still stranded after catastrophic flooding triggered by three days of unprecedented rainfall. At least forty-seven people have been confirmed dead, with officials warning that the toll is expected to rise significantly as search and rescue operations extend into more remote communities. The national military has deployed helicopters and amphibious vehicles to assist, but damaged roads and downed communications infrastructure continue to impede access. The prime minister declared a national state of emergency on Tuesday and appealed for international humanitarian assistance. Climate scientists noted that the intensity of the storm system was consistent with patterns associated with warming sea surface temperatures in the region.","ko":"남부 지방의 비상 서비스는 3일간의 전례 없는 강우로 촉발된 재앙적인 홍수 이후 아직 고립된 수천 명의 주민들에게 닿으려 애쓰고 있어요. 최소 47명의 사망이 확인됐으며, 수색 및 구조 작업이 더 외딴 지역사회로 확대됨에 따라 피해자 수가 크게 늘어날 것으로 예상된다고 관계자들이 경고했어요. 국가 군대가 헬리콥터와 수륙양용 차량을 배치해 지원하고 있지만, 손상된 도로와 끊긴 통신 인프라가 계속해서 접근을 방해하고 있어요. 총리는 화요일에 국가비상사태를 선포하고 국제 인도주의 지원을 호소했어요. 기후 과학자들은 폭풍 시스템의 강도가 해당 지역의 해수면 온도 상승과 관련된 패턴과 일치한다고 밝혔어요.","ex":[{"p":"the toll is expected to rise","m":"피해자 수가 늘어날 것으로 예상된다","g":"toll = (사고·재해의) 인명 피해. death toll. rise significantly = 크게 증가하다. 재난 뉴스의 정형 표현","s":"casualty figures are likely to increase / more deaths are anticipated","e":"With many areas still unreachable, the toll is expected to rise as rescuers push further in."},{"p":"impede access","m":"접근을 방해하다","g":"impede = 방해하다. access = 접근. impede progress/efforts처럼 활용","s":"block entry / hinder rescue teams / prevent crews from reaching victims","e":"Collapsed bridges and debris fields continued to impede access to the flooded villages."},{"p":"consistent with patterns","m":"패턴과 일치하다","g":"consistent with = ~와 일치하는. 과학적 관찰이나 분석 결과를 설명할 때 자주 사용","s":"in line with trends / matching projections / fitting the expected profile","e":"The drought's severity was consistent with patterns predicted by climate models years ago."}]},{"id":73,"level":3,"topic":"과학·기술","title":"EU Moves to Impose Fines on Major AI Platforms","text":"European regulators announced plans on Thursday to levy substantial fines against three of the world's largest technology companies under the newly implemented Artificial Intelligence Act, which came into force earlier this year. The companies are accused of failing to conduct adequate risk assessments for their general-purpose AI systems and of insufficient transparency in disclosing training data sources. Penalties under the act can reach up to three percent of a company's global annual revenue. The firms have thirty days to respond and may contest the findings before a regulatory tribunal. Industry groups warned that aggressive enforcement could stifle innovation and push AI development outside Europe. Civil society organizations, however, praised the move as a necessary step toward meaningful accountability.","ko":"유럽 규제 기관들은 목요일에 올해 초 발효된 인공지능법에 따라 세계 최대 기술 기업 세 곳에 상당한 벌금을 부과할 계획을 발표했어요. 이 기업들은 범용 AI 시스템에 대한 적절한 위험 평가 미실시와 훈련 데이터 출처 공개의 투명성 부족 혐의를 받고 있어요. 이 법에 따른 처벌은 기업의 전 세계 연간 수익의 최대 3%에 달할 수 있어요. 기업들은 30일 이내에 답변해야 하며 규제 재판소 앞에서 조사 결과에 이의를 제기할 수 있어요. 산업 단체들은 공격적인 집행이 혁신을 저해하고 AI 개발을 유럽 밖으로 밀어낼 수 있다고 경고했어요. 그러나 시민 사회 단체들은 이 조치를 의미 있는 책임을 향한 필요한 단계로 칭송했어요.","ex":[{"p":"levy substantial fines","m":"상당한 벌금을 부과하다","g":"levy = 세금·벌금을 부과하다. substantial = 상당한. levy a fine/tax/charge처럼 사용","s":"impose significant penalties / issue large fines","e":"The regulator threatened to levy substantial fines on any firm caught violating the rules."},{"p":"stifle innovation","m":"혁신을 저해하다","g":"stifle = 억누르다, 질식시키다. stifle creativity/growth/competition처럼 활용. 규제 논쟁의 정형 표현","s":"suppress innovation / hold back technological progress / hamper development","e":"Critics argued that excessive regulation would stifle innovation and drive talent abroad."},{"p":"contest the findings","m":"조사 결과에 이의를 제기하다","g":"contest = 공식적으로 이의를 제기하다. findings = (조사·연구의) 결과. legal context에서 자주 사용","s":"challenge the conclusions / dispute the results / appeal the determination","e":"The company said it would contest the findings and present its own evidence at the hearing."}]},{"id":74,"level":3,"topic":"사회","title":"Trade Talks Resume as Tariff Deadline Looms","text":"Senior trade officials from the United States and China resumed negotiations in Geneva on Monday, racing against a ninety-day deadline set last month under a framework agreement that suspended a new round of tariff increases. Both sides described the talks as constructive, though significant gaps remain over technology transfer requirements and market access for agricultural goods. Any deal reached will require ratification by the United States Congress, where bipartisan skepticism toward China trade agreements remains high. The two nations account for more than forty percent of global GDP, and economists warn that a breakdown in negotiations would likely trigger ripple effects across supply chains worldwide. A joint statement is expected by the end of the week.","ko":"미국과 중국의 고위 무역 관리들은 새로운 관세 인상 라운드를 유예한 기본 합의 하에 지난달 설정된 90일 데드라인에 맞서 월요일에 제네바에서 협상을 재개했어요. 양측은 기술 이전 요건과 농산물에 대한 시장 접근에 관해 여전히 상당한 간극이 있지만 회담이 건설적이었다고 설명했어요. 모든 합의는 중국 무역 협정에 대한 양당의 회의론이 여전히 높은 미국 의회의 비준을 필요로 할 거예요. 두 나라는 세계 GDP의 40% 이상을 차지하며, 경제학자들은 협상 결렬이 전 세계 공급망에 파급 효과를 일으킬 가능성이 높다고 경고해요. 공동 성명은 이번 주 말까지 발표될 예정이에요.","ex":[{"p":"as a deadline looms","m":"데드라인이 다가오면서","g":"loom = (위협적으로) 어렴풋이 나타나다. deadline/crisis/threat looms처럼 사용. 뉴스 헤드라인에 자주 등장","s":"as the deadline approaches / with a cutoff drawing near","e":"Negotiators worked through the night as the signing deadline loomed."},{"p":"ratification by Congress","m":"의회의 비준","g":"ratification = 공식 승인. ratify a treaty/agreement = 조약·협정을 비준하다","s":"congressional approval / legislative endorsement / formal approval from lawmakers","e":"The treaty cannot take effect until it receives ratification by both chambers of Congress."},{"p":"ripple effects","m":"파급 효과","g":"ripple = 잔물결. ripple effect = 어떤 사건이 연쇄적으로 다른 것에 영향을 주는 효과","s":"knock-on effects / cascading consequences / downstream impacts","e":"Supply chain disruptions in one country can create ripple effects across the entire global network."}]},{"id":75,"level":3,"topic":"경제","title":"Unemployment Falls but Wage Growth Raises Inflation Fears","text":"The economy added two hundred and thirty-five thousand jobs in October, pushing the unemployment rate down to four point one percent, according to figures released Friday by the Bureau of Labor Statistics. However, average hourly earnings rose by four point three percent year over year — a pace that some economists argue may prevent inflation from returning sustainably to the central bank's two-percent target. The services sector was the primary driver of job gains, while manufacturing continued to shed positions amid weak export demand. Federal Reserve officials were briefed on the data ahead of their next policy meeting, where markets now assign a thirty-eight percent probability to another rate increase. Consumer confidence data due next week is expected to provide further clarity on household spending trends.","ko":"노동통계국이 금요일 발표한 수치에 따르면 경제가 10월에 23만 5천 개의 일자리를 창출하며 실업률이 4.1%로 낮아졌어요. 그러나 평균 시간당 임금은 전년 대비 4.3% 상승했으며, 일부 경제학자들은 이 속도가 인플레이션이 중앙은행의 2% 목표치로 지속 가능하게 돌아오는 것을 막을 수 있다고 주장해요. 서비스 부문이 일자리 증가의 주요 동력이었으며, 제조업은 약한 수출 수요 속에서 계속 일자리를 줄였어요. 연준 관계자들은 다음 정책 회의 전에 데이터에 대한 브리핑을 받았으며, 시장은 이제 추가 금리 인상에 38%의 확률을 부여하고 있어요. 다음 주 발표 예정인 소비자 신뢰 데이터가 가계 지출 동향에 대한 더 명확한 정보를 제공할 것으로 기대돼요.","ex":[{"p":"shed positions","m":"일자리를 줄이다","g":"shed = 없애다. shed jobs/positions/workers = 인력 감축. 뉴스에서 layoff 대신 자주 사용","s":"cut jobs / reduce headcount / lay off workers","e":"The auto industry shed positions as demand for traditional vehicles declined."},{"p":"year over year","m":"전년 대비","g":"year over year (YoY) = 동일 기간 전년도와 비교. month over month(MoM)도 같은 패턴","s":"compared with the same period last year / on an annual basis","e":"Revenue grew fifteen percent year over year, driven by strong subscription renewals."},{"p":"assign a probability to","m":"~에 확률을 부여하다","g":"assign = 부여하다. assign probability/blame/value처럼 사용. 금융·분석 보도의 정형 표현","s":"price in a chance of / estimate the likelihood of","e":"Futures markets assign a seventy percent probability to a rate cut at the December meeting."}]},{"id":76,"level":3,"topic":"스포츠","title":"Underdog Nation Clinches World Cup Berth in Dramatic Fashion","text":"Morocco secured its place at next year's World Cup with a last-minute penalty goal on Tuesday that sent tens of thousands of fans in Casablanca into celebration and eliminated a heavily favored opponent with whom the team had been level for nearly ninety minutes. Goalkeeper Yassine Bono was named player of the match after making three crucial saves in extra time. The victory continues a remarkable run for Moroccan football following the nation's historic semifinal appearance at the previous tournament, which galvanized a generation of young players and boosted domestic league attendance by over thirty percent. FIFA's president congratulated the team via social media and reiterated the sport's commitment to expanding its global footprint.","ko":"모로코는 화요일 마지막 순간의 페널티 골로 내년 월드컵 진출권을 확보했으며, 카사블랑카의 수만 명의 팬들이 환호했고 거의 90분 동안 동점을 유지했던 강력한 상대를 탈락시켰어요. 골키퍼 야신 보노는 연장전에서 세 차례의 결정적인 선방을 펼쳐 경기 최우수 선수로 선정됐어요. 이번 승리는 이전 대회에서 역사적인 4강 진출로 젊은 선수 세대를 고무하고 국내 리그 관중을 30% 이상 늘린 모로코 축구의 놀라운 흐름을 이어가고 있어요. FIFA 회장은 소셜 미디어를 통해 팀을 축하하며 스포츠의 글로벌 발자국 확장 의지를 재확인했어요.","ex":[{"p":"clinches a berth","m":"진출권을 확보하다","g":"clinch = 결정짓다, 확보하다. berth = 자리, 위치. clinch a title/deal/victory에도 사용","s":"secures a spot / locks in a place / earns qualification","e":"With a draw, they clinched a berth in the knockout stage of the tournament."},{"p":"galvanized a generation","m":"한 세대를 고무하다","g":"galvanize = 전기 충격을 주듯 자극하다. galvanize + 사람/집단 = 강력히 동기를 부여하다","s":"inspired a new generation / energized young players across the country","e":"The unexpected gold medal galvanized a generation of young athletes to take up the sport."},{"p":"global footprint","m":"글로벌 발자국, 세계적 영향력","g":"footprint = 발자국 → 조직·기업·스포츠의 세계적 영향력과 존재감","s":"worldwide presence / international reach / global influence","e":"The league is expanding its global footprint by scheduling games in Asia and North America."}]},{"id":77,"level":3,"topic":"사회","title":"Government Announces Sweeping Education Reform Package","text":"The education ministry unveiled a wide-ranging reform package on Wednesday that includes the elimination of university entrance examinations in their current form, a shift toward portfolio-based assessment, and mandatory coding instruction from the third grade onward. The changes, which are set to be phased in over five years, have been welcomed by many educators but criticized by parents who argue that removing standardized testing will disadvantage students from lower-income families who lack access to alternative forms of enrichment. Teachers' unions have requested additional time for consultation and expressed concerns about the feasibility of implementation given current staff shortages. Opposition lawmakers called for a parliamentary inquiry before any legislative action is taken.","ko":"교육부는 수요일에 현행 형식의 대학 입학 시험 폐지, 포트폴리오 기반 평가로의 전환, 3학년부터 의무 코딩 교육을 포함하는 광범위한 개혁 패키지를 공개했어요. 5년에 걸쳐 단계적으로 시행될 예정인 이 변화는 많은 교육자들로부터 환영받았지만, 표준화 시험 폐지가 다른 형태의 심화 학습에 접근하기 어려운 저소득 가정의 학생들에게 불이익을 줄 것이라고 주장하는 학부모들의 비판을 받았어요. 교원 노조는 협의를 위한 추가 시간을 요청하고 현재의 인력 부족을 감안할 때 시행 가능성에 대한 우려를 표명했어요. 야당 의원들은 어떠한 입법 조치가 취해지기 전에 국회 조사를 요구했어요.","ex":[{"p":"phased in over","m":"~에 걸쳐 단계적으로 시행되다","g":"phase in = 단계적으로 도입하다. phase out = 단계적으로 폐지하다. 정책·규정 시행 맥락에서 필수 표현","s":"rolled out gradually over / implemented incrementally across","e":"The new curriculum will be phased in over three years, starting with primary schools."},{"p":"portfolio-based assessment","m":"포트폴리오 기반 평가","g":"portfolio = 학생이 모은 작품 모음. assessment = 평가. 시험 대신 누적 작업으로 평가하는 방식","s":"project-based evaluation / evidence-based grading / competency portfolio","e":"Portfolio-based assessment captures student growth over time, unlike a single exam score."},{"p":"parliamentary inquiry","m":"국회 조사","g":"parliamentary = 의회의. inquiry = 공식 조사. call for/launch an inquiry = 조사를 요구·개시하다","s":"legislative review / formal parliamentary investigation / a committee hearing","e":"The opposition called for a parliamentary inquiry into the handling of public funds."}]},{"id":78,"level":3,"topic":"건강","title":"WHO Declares New Pathogen a Public Health Emergency","text":"The World Health Organization declared a public health emergency of international concern on Saturday in response to a novel respiratory pathogen that has now been detected in fourteen countries across three continents. The virus, provisionally designated RV-7, has been identified in over two thousand cases, with a case fatality rate currently estimated at two to three percent — higher than seasonal influenza but significantly lower than previous outbreak pathogens of concern. The WHO's emergency committee has recommended enhanced surveillance, accelerated diagnostic capacity, and transparent data-sharing among member states. Vaccine developers have been notified and several have indicated they could have candidate vaccines ready for trial within eight weeks. The agency stressed that the current risk to the general public remains moderate and urged calm and preparedness rather than panic.","ko":"세계보건기구는 토요일에 현재 세 개 대륙의 14개국에서 감지된 신종 호흡기 병원체에 대응하여 국제적 공중보건 비상사태를 선언했어요. 임시로 RV-7로 지정된 이 바이러스는 2,000건 이상의 사례에서 확인됐으며, 현재 치명률은 2~3%로 추정돼 — 계절성 독감보다는 높지만 이전 우려 발생 병원체보다는 상당히 낮아요. WHO 비상위원회는 강화된 감시, 가속화된 진단 역량, 회원국 간 투명한 데이터 공유를 권고했어요. 백신 개발사들에게 통보됐으며 여러 곳에서 8주 이내에 후보 백신을 시험 준비할 수 있다고 밝혔어요. 기관은 일반 대중에 대한 현재 위험이 중간 수준으로 유지된다고 강조하고 공황보다는 침착함과 대비를 촉구했어요.","ex":[{"p":"public health emergency of international concern","m":"국제적 공중보건 비상사태","g":"WHO의 공식 최고 경보 수준 명칭 (PHEIC). declare = 선언하다","s":"global health emergency / WHO's highest alert level","e":"The WHO declared a public health emergency of international concern in January 2020 over COVID-19."},{"p":"case fatality rate","m":"치명률","g":"case fatality rate (CFR) = 확진자 중 사망자 비율. mortality rate와 구분 필요","s":"death rate among confirmed cases / proportion of cases that prove fatal","e":"The case fatality rate fell sharply once effective treatments became widely available."},{"p":"urged calm and preparedness","m":"침착함과 대비를 촉구했다","g":"urge = 강력히 촉구하다. preparedness = 대비 상태. 재난·위기 커뮤니케이션의 핵심 표현","s":"called for composure and readiness / advised people to stay calm and prepare","e":"Health officials urged calm and preparedness rather than stockpiling supplies."}]},{"id":79,"level":3,"topic":"사회","title":"The First Morning","text":"I arrived at the airport on a Tuesday, carrying two suitcases and the address of a cousin I had met only twice. The city was nothing like I had imagined. It was gray and loud and smelled of exhaust and rain, and the signs were in a language I could read but not yet hear. At the subway station, I watched people move with a certainty I envied — they knew where they were going, which doors would open, which trains ran express. I took the wrong line and ended up somewhere industrial and quiet, where a man at a convenience store pointed me back in the right direction without asking why I looked so lost. That small kindness stayed with me for weeks. By the time I found my cousin's apartment, it was nearly midnight. She opened the door, looked at me, and said only: you're thinner. I laughed for the first time since leaving home.","ko":"나는 화요일에 공항에 도착했어요. 두 개의 여행 가방과 두 번밖에 만난 적 없는 사촌의 주소를 들고서요. 도시는 내가 상상했던 것과 달랐어요. 회색이고 시끄러웠으며 배기가스와 빗물 냄새가 났고, 표지판들은 읽을 수는 있지만 아직 귀로 들을 수 없는 언어로 쓰여 있었어요. 지하철역에서 나는 내가 부러워하는 확신을 갖고 움직이는 사람들을 바라봤어요 — 그들은 어디로 가는지, 어느 문이 열리는지, 어느 열차가 급행인지를 알았어요. 나는 잘못된 노선을 타서 조용한 공업 지대 어딘가에 도착했고, 편의점의 한 남자가 내가 왜 그렇게 길을 잃어보이는지 묻지도 않고 올바른 방향을 가리켜줬어요. 그 작은 친절은 몇 주 동안 내 안에 남아 있었어요. 사촌의 아파트를 찾을 무렵에는 거의 자정이었어요. 그녀가 문을 열고, 나를 보더니, 이렇게만 말했어요: 더 말랐네. 나는 집을 떠난 후 처음으로 웃었어요.","ex":[{"p":"a certainty I envied","m":"내가 부러워한 확신","g":"envy + 명사 = ~을 부러워하다. 관계절이 명사를 수식하는 구조: a certainty (that) I envied","s":"a confidence I wished I had / a sureness that made me feel out of place","e":"I watched her speak in front of the crowd with a certainty I envied deeply."},{"p":"ended up somewhere","m":"(의도치 않게) 어딘가에 이르다","g":"end up + 장소/상태 = 결국 ~에 처하다. 계획과 다른 결과를 표현할 때","s":"wound up in / found myself in / arrived unexpectedly at","e":"I took the wrong exit and ended up somewhere completely unfamiliar."},{"p":"stayed with me","m":"내 안에 남아 있었다, 기억에 남았다","g":"stay with = 기억이나 감정이 오래 남다. 감정적 잔상을 표현하는 내러티브 표현","s":"lingered in my memory / stuck with me / left a lasting impression","e":"The image of her face in that moment stayed with me for years afterward."}]},{"id":80,"level":3,"topic":"사회","title":"Closing Time","text":"Margaret had been running the hardware store for thirty-one years when she finally admitted to herself what she had known for months. She stood at the counter on a slow Thursday afternoon, watching dust settle on a rack of paintbrushes that had not been touched since spring. The numbers told the story plainly. Three big-box stores had opened within fifteen miles in the past decade, and foot traffic had slowed to a trickle. Her daughter had suggested she sell the building and retire, gently, persistently, for the past two years. Margaret had always found a reason to delay. Now, looking at the empty aisles and the locked glass cabinet where her father had once displayed specialty drill bits with quiet pride, she could not find one. She called her daughter that evening. The conversation was shorter than either of them expected.","ko":"마가렛은 31년 동안 철물점을 운영하다가 마침내 몇 달 동안 알고 있었던 것을 스스로 인정했어요. 그녀는 느릿한 목요일 오후 카운터에 서서, 봄 이후 아무도 손대지 않은 페인트붓 진열대에 먼지가 쌓이는 것을 바라봤어요. 숫자들이 이야기를 분명히 전해주고 있었어요. 지난 10년간 반경 15마일 안에 세 개의 대형 매장이 문을 열었고, 방문객은 조금씩 줄어들었어요. 딸은 건물을 팔고 은퇴하라고 — 부드럽게, 끈질기게 — 2년 동안 권유해왔어요. 마가렛은 항상 미룰 이유를 찾아냈었어요. 이제 텅 빈 통로와 아버지가 한때 특수 드릴 비트를 조용한 자부심과 함께 진열했던 잠긴 유리 진열장을 바라보면서, 그녀는 이유를 찾을 수 없었어요. 그녀는 그날 저녁 딸에게 전화를 걸었어요. 대화는 두 사람 모두 예상했던 것보다 짧았어요.","ex":[{"p":"admitted to herself","m":"(마음속으로) 스스로 인정하다","g":"admit to oneself = 남에게가 아닌 자신에게 솔직해지다. 내러티브에서 내적 갈등 해소를 표현할 때","s":"acknowledged to herself / finally accepted / could no longer deny","e":"She finally admitted to herself that the relationship was no longer making her happy."},{"p":"slowed to a trickle","m":"조금씩 줄어들다 (가늘게 흐를 정도로)","g":"trickle = 가느다란 물줄기. slow to a trickle = 거의 없어질 만큼 줄다. 사람, 주문, 수익 등에 비유","s":"dwindled to almost nothing / dropped to a bare minimum / nearly dried up","e":"After the road closure, customers slowed to a trickle and the café barely broke even."},{"p":"found a reason to delay","m":"미룰 이유를 찾아내다","g":"find a reason to = ~할 이유를 (의도적으로) 찾다. 심리적 회피를 묘사할 때 자주 사용","s":"came up with an excuse to wait / kept putting it off","e":"He found a reason to delay the conversation every time the topic came up."}]},{"id":81,"level":3,"topic":"사회","title":"What I Did the Following Monday","text":"When the company let me go, they gave me a cardboard box and twenty minutes. I filled it with a photograph, a coffee mug, and a stress ball I had never once squeezed. In the elevator, a colleague I barely knew patted my shoulder and said something encouraging that I could not hear over the ringing in my ears. I drove home in the middle of the day, which felt wrong in a way I had not anticipated. The house was quiet and bright and smelled like morning still. I sat at the kitchen table for a long time. I did not call anyone. I did not update my resume. I made a cup of tea and watched a pigeon on the windowsill do absolutely nothing for forty minutes. The following Monday, I woke up at six as usual, showered, and made a list. Not of jobs. Of things I had always meant to do. It was, I realized, the first list in years that did not make me feel tired before I had started.","ko":"회사가 나를 내보낼 때, 그들은 나에게 판지 상자와 20분을 줬어요. 나는 사진 한 장, 커피 머그, 한 번도 쥐어짜지 않은 스트레스 볼을 채웠어요. 엘리베이터에서 거의 알지 못하는 동료가 내 어깨를 두드리며 귀에서 울리는 소리 때문에 들을 수 없었던 격려의 말을 했어요. 나는 한낮에 집으로 운전했는데, 예상하지 못한 방식으로 이상하게 느껴졌어요. 집은 조용하고 밝았으며 아직 아침 냄새가 났어요. 나는 오랫동안 부엌 식탁에 앉아 있었어요. 아무에게도 전화하지 않았어요. 이력서도 업데이트하지 않았어요. 차 한 잔을 끓이고 창턱의 비둘기가
