<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading Master</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0c12;--surf:#141420;--card:#1c1c2a;--border:#272740;
  --accent:#7c6fff;--a2:#ff6b6b;--a3:#ffd93d;--a4:#4ecb71;
  --text:#f0f0f8;--muted:#7070a0;--dim:#3a3a5c;
  --sans:"Noto Sans KR",sans-serif;--display:"Syne",sans-serif;--mono:"JetBrains Mono",monospace;
  --lv1:#4ecb71;--lv2:#ffd93d;--lv3:#ff6b6b;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
button{font-family:var(--sans);cursor:pointer}
.screen{display:none;min-height:100vh;flex-direction:column;animation:fadeIn .25s ease}
.screen.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* HOME */
#home{background:radial-gradient(ellipse 70% 55% at 15% 45%,rgba(124,111,255,.18),transparent 65%),radial-gradient(ellipse 55% 70% at 85% 65%,rgba(255,107,107,.10),transparent 60%),var(--bg);align-items:center;justify-content:center;padding:28px 20px}
.home-wrap{max-width:480px;width:100%}
.home-eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.3em;color:var(--accent);text-transform:uppercase;margin-bottom:18px;text-align:center}
.home-title{font-family:var(--display);font-weight:800;line-height:.88;margin-bottom:24px;text-align:center}
.home-title .t1{color:var(--text);display:block;font-size:clamp(52px,11vw,88px)}
.home-title .t2{color:transparent;-webkit-text-stroke:2px var(--accent);display:block;font-size:clamp(32px,7vw,58px)}
.home-desc{font-size:14px;color:var(--muted);text-align:center;line-height:1.8;margin-bottom:28px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 8px;text-align:center}
.stat-n{font-family:var(--display);font-size:26px;font-weight:800}
.stat-l{font-size:10px;color:var(--muted);letter-spacing:.05em;margin-top:3px}
.today-due{background:rgba(124,111,255,.08);border:1px solid rgba(124,111,255,.2);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--accent);text-align:center;display:none}
.btn-primary{display:block;width:100%;padding:18px;background:var(--accent);color:#fff;border:none;border-radius:14px;font-family:var(--display);font-size:18px;font-weight:700;letter-spacing:.04em;transition:all .2s;margin-bottom:10px}
.btn-primary:hover{background:#8d80ff;transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,111,255,.35)}
.btn-secondary{display:block;width:100%;padding:14px;background:transparent;color:var(--text);border:1px solid var(--border);border-radius:14px;font-size:14px;transition:all .2s;margin-bottom:8px}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}

/* NAV */
.top-nav{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);background:var(--surf);flex-shrink:0}
.nav-title{font-family:var(--display);font-size:15px;font-weight:700;flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin:0 8px}
.nav-back{background:none;border:none;color:var(--muted);font-size:22px;padding:4px 10px;border-radius:8px;line-height:1;transition:.2s;flex-shrink:0}
.nav-back:hover{color:var(--text);background:var(--card)}
.nav-step{font-family:var(--mono);font-size:12px;color:var(--muted);padding:4px 12px;background:var(--card);border-radius:20px;flex-shrink:0}

/* FILTER */
.filter-bar{display:flex;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surf);overflow-x:auto;flex-shrink:0}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:12px;white-space:nowrap;transition:.2s}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.reset-btn{padding:5px 12px;border-radius:8px;border:1px solid rgba(255,107,107,.3);background:rgba(255,107,107,.08);color:var(--a2);font-size:12px;transition:.2s;flex-shrink:0}
.reset-btn:hover{background:rgba(255,107,107,.18);border-color:var(--a2)}
/* SPEED */
.speed-bar{display:flex;gap:6px;justify-content:center;margin-top:12px}
.speed-btn{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:12px;font-family:var(--mono);transition:.2s}
.speed-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* LIST */
.para-list{flex:1;padding:14px;display:flex;flex-direction:column;gap:8px;overflow-y:auto}
.para-card{display:flex;align-items:center;gap:14px;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:12px;transition:all .18s;text-align:left;width:100%}
.para-card:hover{background:#1e1e2e;transform:translateX(4px)}
.para-lv{width:6px;height:46px;border-radius:3px;flex-shrink:0}
.para-num{font-family:var(--display);font-size:22px;font-weight:800;opacity:.35;min-width:34px;color:var(--text)}
.para-info{flex:1;min-width:0}
.para-title{font-size:14px;font-weight:600;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.para-topic{font-size:11px;color:#8888bb}
.para-right{text-align:right;flex-shrink:0}
.badge{font-size:10px;padding:3px 9px;border-radius:10px;font-family:var(--mono);display:inline-block}
.badge-new{background:rgba(124,111,255,.2);color:#a89fff}
.badge-done{background:rgba(78,203,113,.15);color:#6ddc8e}
.badge-due{background:rgba(255,107,107,.15);color:#ff8080}
.para-next{font-size:10px;color:#6666aa;margin-top:4px}

/* PROGRESS */
.prog-wrap{height:4px;background:var(--border);flex-shrink:0}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--a2));transition:width .4s ease}

/* STUDY BODY */
.study-body{flex:1;display:flex;flex-direction:column;gap:14px;padding:18px;overflow-y:auto}

/* LV BADGE */
.lv-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-family:var(--mono);font-size:11px;font-weight:600;margin-bottom:10px}
.lv1-badge{background:rgba(78,203,113,.12);color:var(--lv1);border:1px solid rgba(78,203,113,.2)}
.lv2-badge{background:rgba(255,217,61,.10);color:var(--lv2);border:1px solid rgba(255,217,61,.2)}
.lv3-badge{background:rgba(255,107,107,.10);color:var(--lv3);border:1px solid rgba(255,107,107,.2)}

/* READING */
.reading-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px;line-height:1.95;font-size:16px}
.reading-title{font-family:var(--display);font-size:19px;font-weight:800;margin-bottom:16px}
.timer-display{font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:12px;text-align:right}
.ko-card{background:rgba(124,111,255,.06);border:1px solid rgba(124,111,255,.15);border-radius:14px;padding:18px;line-height:1.9;font-size:14px;color:var(--muted)}

/* EX — inline under reading */
.ex-section{display:flex;flex-direction:column;gap:10px}
.ex-section-title{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;padding:0 2px}
.ex-item{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px}
.ex-pattern{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--accent);margin-bottom:4px}
.ex-meaning{font-size:14px;color:var(--a3);margin-bottom:10px}
.ex-grammar{font-size:12px;color:#a0a0c8;line-height:1.7;padding:10px 12px;background:rgba(255,255,255,.05);border-radius:8px;margin-bottom:8px}
.ex-sim{font-size:12px;color:#8888bb;margin-bottom:8px}
.ex-example{font-size:13px;color:#d8d8f0;font-style:italic;line-height:1.7;padding-top:8px;border-top:1px solid var(--border)}

/* TTS (listen page) */
.tts-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px;text-align:center}
.tts-icon{font-size:44px;margin-bottom:10px}
.tts-status{font-size:14px;color:var(--muted);margin-bottom:14px}
.tts-controls{display:flex;gap:10px;justify-content:center}
.tts-btn{padding:10px 22px;background:rgba(124,111,255,.15);border:1px solid var(--accent);border-radius:10px;color:var(--accent);font-size:14px;transition:.2s;min-width:90px}
.tts-btn:hover{background:rgba(124,111,255,.25)}

/* SHADOW */
.shadow-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px}
.shadow-sent{font-size:14px;line-height:1.9;padding:8px 10px;border-radius:8px;transition:.3s;cursor:pointer}
.shadow-sent.s-active{color:var(--accent);background:rgba(124,111,255,.08);font-weight:500}
.shadow-sent.s-done{color:var(--dim)}
.shadow-controls{display:flex;gap:10px;justify-content:center;margin-top:14px}
.shadow-btn{padding:9px 20px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;transition:.2s}
.shadow-btn:hover{border-color:var(--accent);color:var(--accent)}

/* RATING */
.rating-wrap{display:flex;flex-direction:column;gap:9px}
.rating-btn{padding:14px 16px;border-radius:13px;border:1px solid var(--border);background:var(--card);font-size:14px;color:#fff;transition:.2s;display:flex;align-items:center;gap:10px;text-align:left}
.rating-btn:hover{transform:translateY(-2px)}
.r-hard:hover{border-color:var(--a2);background:rgba(255,107,107,.08)}
.r-ok:hover{border-color:var(--a3);background:rgba(255,217,61,.08)}
.r-easy:hover{border-color:var(--a4);background:rgba(78,203,113,.08)}
.rating-detail{font-size:11px;color:var(--dim);margin-left:auto}

/* NEXT */
.next-btn{padding:15px;background:var(--accent);color:#fff;border:none;border-radius:13px;font-family:var(--display);font-size:15px;font-weight:700;width:100%;transition:.2s}
.next-btn:hover{background:#8d80ff;transform:translateY(-2px)}
.next-hint{text-align:center;font-size:11px;color:var(--dim);margin-top:5px}

/* COMPLETE */
.complete-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:32px;text-align:center}
.complete-icon{font-size:52px;margin-bottom:14px}
.complete-title{font-family:var(--display);font-size:22px;font-weight:800;margin-bottom:6px}
.complete-sub{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.8}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<div id="home" class="screen">
<div class="home-wrap">
  <div class="home-eyebrow">Reading Master</div>
  <div class="home-title">
    <span class="t1">100</span>
    <span class="t2">Paragraphs</span>
  </div>
  <div class="home-desc">뉴스 &middot; 내러티브 &middot; 논설 &mdash; 3단계 리딩 트레이닝</div>
  <div class="today-due" id="todayDueBar"></div>
  <div class="stats-grid">
    <div class="stat-box"><div class="stat-n" id="statDone">0</div><div class="stat-l">완료</div></div>
    <div class="stat-box"><div class="stat-n" id="statDue">0</div><div class="stat-l">복습 예정</div></div>
    <div class="stat-box"><div class="stat-n" id="statStreak">0</div><div class="stat-l">연속 일수</div></div>
  </div>
  <button class="btn-primary" id="btnToday">&#9654; 오늘 학습 시작</button>
  <button class="btn-secondary" id="btnList">&#128203; 전체 목록 보기</button>
  <button class="btn-secondary" id="btnDue">&#128260; 복습 목록만 보기</button>
</div>
</div>

<div id="list" class="screen">
<div class="top-nav">
  <button class="nav-back" id="listBack">&#8592;</button>
  <div class="nav-title">전체 목록</div>
  <button class="reset-btn" id="btnReset">&#128465; 초기화</button>
</div>
<div class="filter-bar">
  <button class="filter-btn active" data-f="all">전체 100</button>
  <button class="filter-btn" data-f="lv1">&#128994; Lv.1</button>
  <button class="filter-btn" data-f="lv2">&#128993; Lv.2</button>
  <button class="filter-btn" data-f="lv3">&#128308; Lv.3</button>
  <button class="filter-btn" data-f="new">신규</button>
  <button class="filter-btn" data-f="due">복습</button>
  <button class="filter-btn" data-f="done">완료</button>
</div>
<div class="para-list" id="paraList"></div>
</div>

<div id="study" class="screen">
<div class="top-nav">
  <button class="nav-back" id="studyBack">&#8592;</button>
  <div class="nav-title" id="studyTitle">학습</div>
  <div class="nav-step" id="studyStep">1/3</div>
</div>
<div class="prog-wrap"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
<div class="study-body" id="studyBody"></div>
</div>

<script>
var DATA=[{"id":1,"level":1,"topic":"일상","title":"The Power of Morning Routines","text":"Starting your day with a consistent routine can make a significant difference in your overall productivity. Many successful people wake up early and spend the first hour doing something meaningful, whether it's exercise, reading, or enjoying a quiet cup of coffee. By establishing good habits in the morning, you set a positive tone for the rest of the day. Small, consistent actions compound over time and become the foundation of long-term success. The key is not perfection, but showing up every single day.","ko":"일관된 루틴으로 하루를 시작하면 전반적인 생산성에 큰 차이를 만들 수 있어요. 많은 성공한 사람들은 일찍 일어나 하루의 첫 한 시간을 의미 있는 일을 하며 보내요. 아침에 좋은 습관을 확립함으로써 나머지 하루를 위한 긍정적인 분위기를 설정해요. 작고 일관된 행동이 시간이 지나며 쌓여 장기적인 성공의 기반이 돼요. 핵심은 완벽함이 아니라 매일 빠짐없이 실천하는 거예요.","ex":[{"p":"make a significant difference","m":"큰 차이를 만들다","g":"make + 명사 패턴 — make a difference, make an impact, make progress","s":"have a great impact on / play a key role","e":"Regular exercise makes a significant difference in how you feel."},{"p":"compound over time","m":"시간이 지나며 복리처럼 쌓이다","g":"compound = 복합적으로 증가하다. 금융 용어에서 왔지만 일상에서도 사용","s":"accumulate over time / add up gradually","e":"Small daily improvements compound over time into remarkable results."},{"p":"showing up every single day","m":"매일 빠짐없이 실천하다","g":"show up = 나타나다. every single day는 every day를 강조한 형태","s":"being consistent / committing daily","e":"Success is about showing up every single day, even when you don't feel like it."}]},{"id":2,"level":1,"topic":"일상","title":"The Art of Saying No","text":"Learning to say no is one of the most important skills in adult life. Many people struggle with this because they fear disappointing others or missing out on opportunities. However, saying yes to everything leads to burnout and a loss of focus on what truly matters. By being selective about your commitments, you protect your time and energy for things that align with your values. Saying no is not selfish — it is an act of self-respect.","ko":"거절하는 법을 배우는 것은 성인 생활에서 가장 중요한 기술 중 하나예요. 많은 사람들이 이것을 힘들어하는 이유는 다른 사람을 실망시키거나 기회를 놓칠까 두려워하기 때문이에요. 하지만 모든 것에 예스라고 말하면 번아웃과 집중력 상실로 이어져요. 약속에 선택적이 됨으로써 가치에 부합하는 것들을 위한 시간과 에너지를 보호해요. 거절은 이기적인 게 아니에요 — 자기 존중의 행위예요.","ex":[{"p":"struggle with","m":"~에 어려움을 겪다","g":"struggle with + 명사/동명사. 매우 자주 쓰이는 표현","s":"have difficulty with / find it hard to","e":"Many students struggle with time management during exam season."},{"p":"missing out on","m":"~를 놓치다","g":"miss out on + 명사. FOMO(Fear Of Missing Out)의 어원","s":"losing out on / passing up on","e":"Don't worry about missing out on one event — your health comes first."},{"p":"align with","m":"~와 일치하다, 부합하다","g":"align with = be consistent with. 가치관·목표가 서로 맞을 때","s":"be consistent with / fit with","e":"Choose a career that aligns with your personal values."}]},{"id":3,"level":1,"topic":"일상","title":"The Digital Detox","text":"We live in an age where our attention is constantly pulled in multiple directions by screens and notifications. Many experts recommend taking regular breaks from digital devices to restore focus and reduce stress. Even a short walk without your phone can feel surprisingly refreshing. During a digital detox, people often rediscover the joy of face-to-face conversations and offline hobbies. Disconnecting occasionally helps you reconnect with what is truly real and meaningful.","ko":"우리는 화면과 알림에 의해 끊임없이 주의가 여러 방향으로 끌리는 시대에 살고 있어요. 많은 전문가들이 집중력을 회복하고 스트레스를 줄이기 위해 디지털 기기로부터 정기적으로 휴식을 취하도록 권고해요. 핸드폰 없이 짧은 산책만 해도 놀랍도록 상쾌하게 느껴질 수 있어요. 디지털 디톡스 동안 사람들은 종종 대면 대화와 오프라인 취미의 즐거움을 재발견해요. 가끔씩 연결을 끊는 것이 진정으로 실제적이고 의미 있는 것과 다시 연결되는 데 도움이 돼요.","ex":[{"p":"pulled in multiple directions","m":"여러 방향으로 끌리다","g":"pull + 방향 전치사. 주의나 관심이 분산될 때 자주 사용","s":"torn between / distracted by","e":"Working parents are often pulled in multiple directions at once."},{"p":"restore focus","m":"집중력을 회복하다","g":"restore = 회복시키다. restore energy, restore balance처럼 활용","s":"regain concentration / reclaim attention","e":"A short break is often enough to restore focus and clarity."},{"p":"Disconnecting occasionally","m":"가끔씩 연결을 끊는 것","g":"disconnect from technology. occasionally = 때때로, 가끔","s":"unplugging from time to time / stepping away periodically","e":"Disconnecting occasionally from social media improves mental well-being."}]},{"id":4,"level":1,"topic":"일상","title":"Why Sleep Matters","text":"Sleep is often the first thing people sacrifice when life gets busy, yet it is one of the most critical factors in physical and mental health. During sleep, the brain processes information, consolidates memories, and repairs itself. Chronic sleep deprivation has been linked to a wide range of health problems, including heart disease, obesity, and depression. Most adults need between seven and nine hours of sleep per night to function optimally. Prioritizing sleep is not laziness — it is one of the smartest investments you can make in yourself.","ko":"수면은 삶이 바빠질 때 사람들이 가장 먼저 희생하는 것이지만, 신체적·정신적 건강에서 가장 중요한 요소 중 하나예요. 수면 중에 뇌는 정보를 처리하고, 기억을 통합하며, 스스로를 회복해요. 만성적인 수면 부족은 심장 질환, 비만, 우울증을 포함한 광범위한 건강 문제와 연관이 있어요. 대부분의 성인은 최적으로 기능하기 위해 하룻밤에 7~9시간의 수면이 필요해요. 수면을 우선시하는 것은 게으름이 아니에요 — 자신에게 할 수 있는 가장 현명한 투자 중 하나예요.","ex":[{"p":"the first thing people sacrifice","m":"사람들이 가장 먼저 희생하는 것","g":"sacrifice = 희생하다. 관계대명사 that 생략된 구조: the first thing (that) people sacrifice","s":"the first thing people give up / cut first","e":"Free time is often the first thing people sacrifice when they get busy."},{"p":"has been linked to","m":"~와 연관이 있어요, 관련이 있어요","g":"be linked to = be associated with. 현재완료 수동태로 연구 결과를 말할 때 자주 사용","s":"is associated with / is connected to","e":"Smoking has been linked to a wide range of serious health conditions."},{"p":"function optimally","m":"최적으로 기능하다","g":"function + 부사. optimally = at one's best. perform optimally와 같은 의미","s":"perform at your best / work at full capacity","e":"You cannot function optimally on less than six hours of sleep."}]},{"id":5,"level":1,"topic":"일상","title":"The Importance of Gratitude","text":"Gratitude is more than just saying thank you — it is a mindset that can fundamentally shift how you experience life. Research shows that people who regularly practice gratitude report higher levels of happiness and lower levels of stress. One simple way to cultivate gratitude is to write down three things you are thankful for each day. Over time, this practice trains your brain to notice the positive aspects of your life rather than dwelling on the negative. A grateful heart is not only healthier but also more resilient in the face of adversity.","ko":"감사함은 단순히 감사하다고 말하는 것 이상이에요 — 삶을 경험하는 방식을 근본적으로 바꿀 수 있는 마음가짐이에요. 연구에 따르면 규칙적으로 감사함을 실천하는 사람들은 더 높은 행복 수준과 더 낮은 스트레스 수준을 보고한다고 해요. 감사함을 기르는 한 가지 간단한 방법은 매일 감사한 세 가지를 적는 거예요. 시간이 지남에 따라 이 실천은 부정적인 것에 집착하기보다 삶의 긍정적인 측면을 알아차리도록 뇌를 훈련해요. 감사하는 마음은 더 건강할 뿐만 아니라 역경 앞에서도 더 회복력이 있어요.","ex":[{"p":"fundamentally shift","m":"근본적으로 바꾸다","g":"shift = 변화시키다. fundamentally와 함께 쓰여 '완전히 바꾸다'는 뉘앙스","s":"radically change / completely transform","e":"One conversation can fundamentally shift how you see yourself."},{"p":"cultivate gratitude","m":"감사함을 기르다·cultivate","g":"cultivate = 기르다, 함양하다. cultivate a skill, cultivate relationships에도 활용","s":"develop a sense of gratitude / practice thankfulness","e":"It takes conscious effort to cultivate gratitude in daily life."},{"p":"dwelling on the negative","m":"부정적인 것에 집착하다","g":"dwell on = ~에 오래 머물다, 집착하다. 부정적 의미로 자주 사용","s":"focusing on the bad / obsessing over negatives","e":"There's no point in dwelling on mistakes — learn and move on."}]},{"id":6,"level":1,"topic":"일상","title":"Cooking at Home","text":"In recent years, more people have rediscovered the pleasure and practicality of cooking at home. Home-cooked meals are generally healthier, cheaper, and more satisfying than eating out. The process of preparing food from scratch can also be meditative, offering a rare chance to disconnect from the demands of daily life. Sharing a home-cooked meal with family or friends strengthens bonds and creates lasting memories. Even simple dishes, made with care and intention, can become meaningful rituals.","ko":"최근 몇 년 동안 더 많은 사람들이 집에서 요리하는 즐거움과 실용성을 재발견했어요. 집에서 만든 식사는 일반적으로 외식보다 더 건강하고, 저렴하고, 만족스러워요. 처음부터 음식을 준비하는 과정은 명상적일 수도 있어서 일상의 요구로부터 단절될 드문 기회를 제공해요. 가족이나 친구들과 집에서 만든 식사를 나누는 것은 유대를 강화하고 오래 지속되는 추억을 만들어요. 정성과 의도를 담아 만든 간단한 요리도 의미 있는 의식이 될 수 있어요.","ex":[{"p":"from scratch","m":"처음부터, 맨 밑바닥부터","g":"scratch = 출발선. start from scratch는 완전히 처음부터 시작한다는 뜻","s":"from the beginning / from the ground up","e":"She built her business from scratch with no outside funding."},{"p":"disconnect from the demands","m":"요구로부터 벗어나다","g":"disconnect from = ~에서 단절되다. demands = 요구, 부담","s":"step away from pressures / escape from obligations","e":"Cooking helps me disconnect from the demands of a busy workday."},{"p":"strengthens bonds","m":"유대를 강화하다","g":"bond = 유대, 연결. strengthen bonds with someone처럼 사용","s":"deepens connections / brings people closer","e":"Sharing meals together strengthens bonds between family members."}]},{"id":7,"level":1,"topic":"일상","title":"The Value of Downtime","text":"Modern culture often glorifies busyness, treating rest as something to be earned rather than embraced. Yet research consistently shows that downtime is essential for creativity, emotional regulation, and cognitive performance. When you allow your mind to wander, it makes unexpected connections between ideas. Even a short period of rest can dramatically improve your ability to solve problems and think clearly. Rather than feeling guilty about relaxing, consider it a necessary part of a productive life.","ko":"현대 문화는 종종 바쁨을 미화하여 휴식을 받아들이는 것이 아닌 얻어야 할 것으로 취급해요. 하지만 연구는 일관되게 휴식 시간이 창의성, 감정 조절, 인지 능력에 필수적임을 보여줘요. 마음이 방황하도록 허용하면 아이디어 사이에서 예상치 못한 연결을 만들어요. 짧은 휴식 기간도 문제를 해결하고 명확하게 생각하는 능력을 극적으로 향상시킬 수 있어요. 편히 쉬는 것에 죄책감을 느끼기보다, 생산적인 삶의 필요한 부분으로 생각해봐요.","ex":[{"p":"glorifies busyness","m":"바쁨을 미화하다","g":"glorify = 찬미하다. busyness를 목적어로 써서 '바쁜 것을 대단하게 여기다'는 뜻","s":"celebrates being busy / idolizes productivity","e":"Our culture glorifies busyness but ignores the value of rest."},{"p":"allow your mind to wander","m":"마음이 자유롭게 방황하게 하다","g":"allow + 목적어 + to 부정사. mind to wander = 생각이 자유롭게 흐르다","s":"let your thoughts roam / give your brain a break","e":"Daydreaming allows your mind to wander and come up with creative ideas."},{"p":"feeling guilty about","m":"~에 대해 죄책감을 느끼다","g":"feel guilty about + 명사/동명사. 일상에서 매우 자주 쓰이는 감정 표현","s":"feeling bad about / being ashamed of","e":"Stop feeling guilty about taking time for yourself — it's necessary."}]},{"id":8,"level":1,"topic":"일상","title":"Making Friends as an Adult","text":"Making new friends becomes increasingly difficult as we get older. As adults, we no longer have the built-in social structures of school or university to facilitate easy connections. Friendship requires intentional effort — showing up regularly, being vulnerable, and investing time even when life is busy. Studies suggest that having strong social connections is one of the most important predictors of long-term happiness and health. The first step is often simply being open to the possibility of new connections in unexpected places.","ko":"나이가 들수록 새로운 친구를 사귀는 것이 점점 더 어려워져요. 성인으로서 우리는 더 이상 쉬운 연결을 촉진하는 학교나 대학의 내재된 사회적 구조가 없어요. 우정은 의도적인 노력이 필요해요 — 규칙적으로 나타나고, 취약해지고, 삶이 바쁠 때도 시간을 투자하는 것이요. 연구에 따르면 강한 사회적 연결을 갖는 것이 장기적인 행복과 건강의 가장 중요한 예측 인자 중 하나라고 해요. 첫 번째 단계는 종종 단순히 예상치 못한 장소에서의 새로운 연결 가능성에 열려 있는 거예요.","ex":[{"p":"built-in social structures","m":"내재된 사회적 구조","g":"built-in = 이미 갖추어진, 내장된. structure는 '구조, 틀'","s":"ready-made social settings / automatic social environments","e":"School provides built-in social structures that make friendship easier."},{"p":"being vulnerable","m":"취약함을 드러내다, 솔직하게 열리다","g":"vulnerable = 상처받기 쉬운. 여기서는 '감정적으로 솔직하게 열리다'는 긍정적 의미","s":"opening up / being emotionally honest","e":"Real friendship requires being vulnerable and sharing your true self."},{"p":"predictors of happiness","m":"행복의 예측 인자","g":"predictor = 예측 변수. academic/scientific writing에서 자주 등장","s":"indicators of happiness / factors linked to happiness","e":"Strong relationships are among the best predictors of lifelong happiness."}]},{"id":9,"level":1,"topic":"일상","title":"The Habit of Reading","text":"Reading regularly is one of the most effective ways to expand your knowledge, improve your vocabulary, and develop empathy. Unlike passive media consumption, reading requires active mental engagement and imagination. People who read consistently tend to have stronger analytical skills and a broader understanding of the world. Even reading for just twenty minutes a day can lead to significant intellectual growth over the course of a year. The best book is simply the one that you will actually finish.","ko":"규칙적으로 독서하는 것은 지식을 넓히고, 어휘력을 향상시키고, 공감 능력을 키우는 가장 효과적인 방법 중 하나예요. 수동적인 미디어 소비와 달리, 독서는 능동적인 정신적 참여와 상상력을 필요로 해요. 일관되게 읽는 사람들은 더 강한 분석 능력과 더 넓은 세계 이해를 갖는 경향이 있어요. 하루에 단 20분만 읽어도 1년이라는 시간 동안 상당한 지적 성장으로 이어질 수 있어요. 가장 좋은 책은 단순히 당신이 실제로 끝까지 읽을 책이에요.","ex":[{"p":"passive media consumption","m":"수동적인 미디어 소비","g":"passive ↔ active. consumption = 소비. 영상이나 SNS 시청은 passive로 분류","s":"mindless scrolling / inactive media use","e":"Passive media consumption takes up hours that could be spent on growth."},{"p":"tend to have","m":"~하는 경향이 있다","g":"tend to + 동사원형. 일반적인 경향을 말할 때 사용. generally have와 같은 의미","s":"are likely to have / often have","e":"People who exercise regularly tend to have more energy throughout the day."},{"p":"over the course of","m":"~의 기간 동안에","g":"over the course of + 기간. during보다 격식적이고 긴 과정을 강조","s":"throughout / during the span of","e":"She improved dramatically over the course of six months."}]},{"id":10,"level":1,"topic":"일상","title":"Managing Financial Stress","text":"Money is one of the leading causes of stress in modern life, regardless of income level. Financial anxiety often stems from a lack of clarity about one's financial situation rather than the situation itself. Creating a simple budget and tracking your spending can immediately reduce this anxiety by replacing uncertainty with information. Building an emergency fund, even a small one, provides a psychological safety net that changes how you experience financial risk. Taking control of your finances, even gradually, restores a sense of agency and calm.","ko":"돈은 소득 수준에 관계없이 현대 생활에서 스트레스의 주요 원인 중 하나예요. 재정적 불안은 종종 상황 자체가 아니라 자신의 재정 상황에 대한 명확성 부족에서 비롯돼요. 간단한 예산을 만들고 지출을 추적하면 불확실성을 정보로 대체함으로써 이 불안을 즉시 줄일 수 있어요. 비상 자금을 만드는 것은, 작은 것이라도, 재정적 위험을 경험하는 방식을 바꾸는 심리적 안전망을 제공해요. 점진적이라도 재정을 통제하면 주도성과 평온함이 회복돼요.","ex":[{"p":"stems from","m":"~에서 비롯되다, 기인하다","g":"stem from = originate from. 원인을 설명할 때 매우 자주 사용","s":"comes from / originates from / is rooted in","e":"Most conflicts stem from a simple lack of communication."},{"p":"replacing uncertainty with","m":"불확실성을 ~로 대체하다","g":"replace A with B = A를 B로 교체하다. uncertainty = 불확실성","s":"substituting unknowns with / swapping confusion for","e":"Good planning replaces uncertainty with a clear roadmap."},{"p":"sense of agency","m":"주도성, 통제감","g":"agency = 자신이 행동을 통제할 수 있다는 느낌. psychological term","s":"feeling of control / sense of empowerment","e":"Setting small goals every day gives you a stronger sense of agency."}]},{"id":11,"level":1,"topic":"일상","title":"The Power of Walking","text":"Walking is perhaps the most underrated form of exercise. It requires no equipment, no gym membership, and no special skills, yet the health benefits are profound. Regular walking reduces the risk of heart disease, improves mood, and boosts creative thinking. Many great thinkers and writers throughout history have credited long walks with helping them solve difficult problems. If you find it hard to exercise, starting with just a ten-minute walk each day is a sustainable and effective entry point.","ko":"걷기는 아마도 가장 과소평가된 운동 형태예요. 장비도, 헬스장 회원권도, 특별한 기술도 필요 없지만, 건강상의 이점은 엄청나요. 규칙적인 걷기는 심장 질환의 위험을 줄이고, 기분을 개선하며, 창의적 사고를 향상시켜요. 역사를 통해 많은 위대한 사상가들과 작가들이 긴 산책이 어려운 문제를 해결하는 데 도움이 됐다고 인정했어요. 운동하기 힘들다면, 매일 단 10분 걷는 것부터 시작하는 것이 지속 가능하고 효과적인 진입점이에요.","ex":[{"p":"the most underrated","m":"가장 과소평가된","g":"underrated ↔ overrated. under- 접두사 = 충분히 인정받지 못한","s":"the most overlooked / the least appreciated","e":"Sleep is probably the most underrated factor in athletic performance."},{"p":"credited A with B","m":"A가 B 덕분이라고 공으로 돌리다","g":"credit + 사람 + with + 명사. 'A로 인해 B가 가능했다'는 의미","s":"attributed A to B / gave credit to A for B","e":"He credited his success with having a great mentor early in his career."},{"p":"entry point","m":"진입점, 시작점","g":"entry point = 어떤 것을 시작하는 쉬운 방법 또는 기회","s":"starting point / gateway / first step","e":"Reading short articles is a great entry point into a new topic."}]},{"id":12,"level":1,"topic":"일상","title":"Living With Intention","text":"Many people drift through life reacting to circumstances rather than actively shaping their experience. Living with intention means making deliberate choices about how you spend your time, energy, and attention. It starts with getting clear on what you actually value, not what you think you should value. Once you have that clarity, you can begin aligning your daily actions with your deeper goals. A life lived with intention feels more coherent, more satisfying, and ultimately more yours.","ko":"많은 사람들이 자신의 경험을 능동적으로 형성하기보다 상황에 반응하며 삶을 표류해요. 의도를 가지고 사는 것은 시간, 에너지, 주의를 어떻게 쓸지 의도적인 선택을 하는 것을 의미해요. 자신이 실제로 무엇을 소중히 여기는지, 소중히 여겨야 한다고 생각하는 것이 아닌, 명확히 하는 것에서 시작해요. 그 명확성을 갖게 되면 일상적인 행동을 더 깊은 목표와 일치시키기 시작할 수 있어요. 의도를 가지고 사는 삶은 더 일관성 있고, 더 만족스럽고, 궁극적으로 더 자신의 것처럼 느껴져요.","ex":[{"p":"drift through life","m":"삶을 표류하다, 흘러가듯 살다","g":"drift = 떠다니다. 목적 없이 사는 것을 묘사하는 표현","s":"go through life aimlessly / live on autopilot","e":"Without clear goals, it's easy to drift through life without purpose."},{"p":"deliberate choices","m":"의도적인 선택","g":"deliberate = 의도적인, 신중한. conscious choices와 비슷한 의미","s":"conscious decisions / purposeful choices","e":"Making deliberate choices about your time leads to a more fulfilling life."},{"p":"aligning daily actions with","m":"일상적인 행동을 ~와 일치시키다","g":"align A with B = A를 B에 맞추다. goals, values와 함께 자주 쓰임","s":"matching your actions to / making your actions consistent with","e":"Aligning daily actions with your goals is the key to real progress."}]},{"id":13,"level":1,"topic":"일상","title":"The Art of Listening","text":"Most people listen not to understand, but to reply. True listening requires suspending your own thoughts and judgments long enough to genuinely hear what someone else is saying. Active listening involves maintaining eye contact, reflecting back what you've heard, and asking thoughtful follow-up questions. People who feel truly heard are more likely to open up, trust, and collaborate effectively. Developing your listening skills is one of the highest-return investments you can make in your personal and professional relationships.","ko":"대부분의 사람들은 이해하기 위해서가 아니라 대답하기 위해 들어요. 진정한 경청은 다른 사람이 말하는 것을 진심으로 듣기에 충분할 만큼 자신의 생각과 판단을 일시 중단하는 것을 필요로 해요. 적극적인 경청은 눈 맞춤을 유지하고, 들은 것을 반영하고, 사려 깊은 후속 질문을 하는 것을 포함해요. 진정으로 들어졌다고 느끼는 사람들은 더 많이 마음을 열고, 신뢰하고, 효과적으로 협력할 가능성이 높아요. 경청 능력을 개발하는 것은 개인 및 직업 관계에 할 수 있는 가장 높은 수익을 내는 투자 중 하나예요.","ex":[{"p":"suspending your own thoughts","m":"자신의 생각을 일시 중단하다","g":"suspend = 일시적으로 멈추다. suspend judgment, suspend disbelief 등","s":"setting aside your thoughts / pausing your own inner voice","e":"Effective listening means suspending your own thoughts and truly tuning in."},{"p":"reflecting back","m":"반영하여 돌려주다, 들은 것을 확인해주다","g":"reflect back = 상대방이 말한 것을 요약해서 확인해주는 경청 기술","s":"paraphrasing what you heard / summarizing back","e":"Try reflecting back what someone says — it shows you were truly listening."},{"p":"highest-return investments","m":"가장 높은 수익을 내는 투자","g":"return = 수익, 이득. investment는 금전적 의미 외에도 시간·노력 투자에 사용","s":"most rewarding investments / best use of your time","e":"Learning to communicate well is one of the highest-return investments in life."}]},{"id":14,"level":1,"topic":"일상","title":"Clutter and the Mind","text":"The physical environment we inhabit has a powerful effect on our mental state. A cluttered space often reflects and reinforces a cluttered mind, making it harder to focus and easier to feel overwhelmed. Cleaning and organizing your environment is not just a practical task — it is a form of mental decluttering as well. Research has shown that people who describe their homes as cluttered have higher levels of cortisol, the stress hormone. Creating order in your surroundings can create a corresponding sense of calm within yourself.","ko":"우리가 거주하는 물리적 환경은 정신 상태에 강력한 영향을 미쳐요. 어수선한 공간은 종종 어수선한 마음을 반영하고 강화하여, 집중하기 더 어렵고 압도되기 더 쉽게 만들어요. 환경을 청소하고 정리하는 것은 단순히 실용적인 일이 아니에요 — 정신적인 정리의 한 형태이기도 해요. 연구에 따르면 집이 어수선하다고 표현하는 사람들은 스트레스 호르몬인 코르티솔 수치가 더 높다고 해요. 주변 환경에 질서를 만드는 것은 자신 안에 상응하는 평온함을 만들 수 있어요.","ex":[{"p":"reflects and reinforces","m":"반영하고 강화하다","g":"두 동사를 and로 연결. reinforce = 더욱 강하게 만들다","s":"mirrors and amplifies / shows and deepens","e":"Negative self-talk reflects and reinforces low self-esteem over time."},{"p":"a form of mental decluttering","m":"정신적 정리의 한 형태","g":"declutter = 불필요한 것을 제거하다. mental decluttering = 정신적 정리","s":"a type of mental clearing / a way to clear your head","e":"Journaling is a form of mental decluttering that many people find helpful."},{"p":"a corresponding sense of","m":"상응하는 ~감","g":"corresponding = 그에 대응하는. sense of calm, sense of order처럼 사용","s":"a matching feeling of / a related feeling of","e":"When you clear your schedule, you often feel a corresponding sense of relief."}]},{"id":15,"level":1,"topic":"일상","title":"The Gift of Boredom","text":"In a world of endless entertainment, boredom has become a rare and undervalued experience. Yet psychologists argue that boredom serves an important function — it pushes us to seek meaning and engage our imagination. Children who are given unstructured time without screens often come up with remarkably creative solutions to the simple problem of having nothing to do. For adults, moments of boredom can spark original thinking and self-reflection. Rather than immediately reaching for your phone, try sitting with boredom for a few minutes and see what emerges.","ko":"끝없는 오락의 세계에서 지루함은 드물고 과소평가된 경험이 됐어요. 하지만 심리학자들은 지루함이 중요한 기능을 한다고 주장해요 — 의미를 찾고 상상력을 발휘하도록 우리를 밀어붙여요. 화면 없이 구조화되지 않은 시간을 받는 아이들은 종종 할 일이 없다는 단순한 문제에 놀랍도록 창의적인 해결책을 생각해내요. 어른들에게 지루함의 순간은 독창적인 사고와 자기 성찰을 자극할 수 있어요. 즉시 핸드폰을 집어 들기보다, 몇 분 동안 지루함과 함께 앉아 무엇이 나오는지 봐보세요.","ex":[{"p":"serves an important function","m":"중요한 기능을 하다","g":"serve a function/purpose = 역할을 하다. serves as와 구별 — serves a function은 목적을 수행","s":"plays an important role / fulfills a key purpose","e":"Failure serves an important function — it teaches us what doesn't work."},{"p":"come up with","m":"생각해내다, 찾아내다","g":"come up with + 명사. 아이디어·해결책을 찾을 때 매우 자주 사용","s":"think of / devise / generate","e":"Can you come up with a better solution before the meeting?"},{"p":"spark original thinking","m":"독창적인 사고를 자극하다","g":"spark = 불꽃을 일으키다 → 유발하다. spark creativity, spark a debate에도 활용","s":"trigger creative thought / ignite imagination","e":"Traveling to new places often sparks original thinking and fresh perspectives."}]},{"id":16,"level":1,"topic":"일상","title":"Saying What You Mean","text":"Clear communication is a skill that most people believe they have but relatively few actually practice well. Vague language, hints, and indirect requests create confusion and resentment in relationships. When you say exactly what you mean in a calm and respectful tone, you give others the chance to respond to your actual needs rather than their interpretation of them. Being direct does not mean being unkind — in fact, it is often the most respectful thing you can do. Honesty, delivered with care, is the foundation of genuine connection.","ko":"명확한 의사소통은 대부분의 사람들이 자신이 잘 한다고 믿지만 실제로 잘 실천하는 사람은 비교적 적은 기술이에요. 모호한 언어, 암시, 간접적인 요청은 관계에서 혼란과 원망을 만들어요. 차분하고 존중하는 어조로 정확히 말하고 싶은 것을 말할 때, 다른 사람들에게 자신의 해석이 아닌 실제 필요에 반응할 기회를 줘요. 직접적으로 말하는 것이 불친절하다는 의미는 아니에요 — 사실 그것이 종종 할 수 있는 가장 존중하는 행동이에요. 정성을 담아 전달된 솔직함이 진정한 연결의 기반이에요.","ex":[{"p":"relatively few actually","m":"실제로는 비교적 적은 (사람들이)","g":"relatively = 비교적. few + 복수명사 = 거의 없는. few vs a few 구별 중요","s":"not many in practice / only a handful truly","e":"Many people claim to be good listeners, but relatively few actually are."},{"p":"creates confusion and resentment","m":"혼란과 원망을 만들다","g":"resentment = 억울함, 원망. 관계에서 쌓이는 부정적 감정을 표현","s":"breeds misunderstanding and frustration / causes tension","e":"Unclear expectations create confusion and resentment among team members."},{"p":"delivered with care","m":"정성을 담아 전달된","g":"delivered = 전달된. with care는 방식을 나타내는 전치사구","s":"communicated thoughtfully / expressed with kindness","e":"Even difficult feedback, delivered with care, can be received well."}]},{"id":17,"level":1,"topic":"일상","title":"The Role of Humor","text":"Laughter and humor are often overlooked as serious contributors to well-being. A good sense of humor helps people cope with stress, build social connections, and maintain perspective during difficult times. People who can laugh at themselves tend to be more resilient and less defensive. Humor also creates a sense of shared experience — a well-timed joke can instantly make a group of strangers feel like old friends. Cultivating lightness in your life is not frivolous; it is a deeply human and healthy way to navigate the world.","ko":"웃음과 유머는 종종 웰빙에 진지한 기여자로서 간과돼요. 좋은 유머 감각은 사람들이 스트레스에 대처하고, 사회적 연결을 구축하고, 어려운 시간 동안 관점을 유지하는 데 도움이 돼요. 자신을 웃을 수 있는 사람들은 더 회복력이 있고 덜 방어적인 경향이 있어요. 유머는 또한 공유된 경험의 감각을 만들어요 — 적절한 타이밍의 농담은 낯선 사람들의 그룹을 즉시 오랜 친구처럼 느끼게 할 수 있어요. 삶에서 가벼움을 기르는 것은 경박한 것이 아니에요; 세상을 헤쳐나가는 깊이 인간적이고 건강한 방법이에요.","ex":[{"p":"cope with stress","m":"스트레스에 대처하다","g":"cope with = 어려운 상황을 감당하다. deal with보다 감정적 뉘앙스가 강함","s":"deal with stress / handle pressure / manage anxiety","e":"Exercise is one of the best ways to cope with everyday stress."},{"p":"a well-timed joke","m":"적절한 타이밍의 농담","g":"well-timed = 타이밍이 좋은. well- 접두사는 '잘'의 의미 — well-planned, well-placed","s":"a perfectly placed joke / humor at the right moment","e":"A well-timed joke can completely change the mood of a tense situation."},{"p":"navigate the world","m":"세상을 헤쳐나가다","g":"navigate = 방향을 잡다, 헤쳐나가다. navigate challenges, navigate relationships에도 사용","s":"move through life / make your way in the world","e":"Emotional intelligence helps you navigate the world with greater ease."}]},{"id":18,"level":1,"topic":"일상","title":"Knowing When to Quit","text":"We are often taught that persistence is always a virtue, but knowing when to quit can be just as important as knowing when to push through. Continuing to invest time and energy in something that is not working is known as the sunk cost fallacy — holding on because of what you've already put in, not because of future potential. Sometimes quitting is not failure; it is a strategic reallocation of your most limited resources. The ability to recognize a dead end and change course requires both self-awareness and courage. Letting go of what isn't working is often the first step toward finding what will.","ko":"우리는 종종 인내가 항상 미덕이라고 배우지만, 언제 그만두어야 할지 아는 것이 언제 밀고 나가야 할지 아는 것만큼 중요할 수 있어요. 효과가 없는 것에 계속 시간과 에너지를 투자하는 것은 매몰 비용의 오류로 알려져 있어요 — 미래의 가능성 때문이 아니라 이미 투자한 것 때문에 붙잡고 있는 거예요. 때로는 그만두는 것이 실패가 아니에요; 가장 한정된 자원의 전략적 재배분이에요. 막다른 골목을 인식하고 방향을 바꾸는 능력은 자기 인식과 용기 둘 다를 필요로 해요. 효과가 없는 것을 놓아주는 것이 종종 무엇이 효과 있을지 찾는 첫 번째 단계예요.","ex":[{"p":"push through","m":"밀고 나가다, 끝까지 버티다","g":"push through = 어려움에도 계속하다. push through pain, push through obstacles","s":"persevere / keep going / stick it out","e":"There will be days when you want to quit, but you have to push through."},{"p":"sunk cost fallacy","m":"매몰 비용의 오류","g":"sunk cost = 이미 지불해서 회수 불가한 비용. fallacy = 오류, 잘못된 믿음","s":"irrational attachment to past investment / throwing good money after bad","e":"Don't stay in a bad situation just because of the sunk cost fallacy."},{"p":"strategic reallocation","m":"전략적 재배분","g":"reallocation = 자원을 다시 배분하는 것. strategic = 전략적","s":"smart redistribution / purposeful redirection of resources","e":"Leaving a failing project is a strategic reallocation of your time and energy."}]},{"id":19,"level":1,"topic":"일상","title":"The Impact of Small Kindnesses","text":"Acts of kindness, however small, have a ripple effect that extends far beyond the moment of giving. Holding the door open, offering a genuine compliment, or simply smiling at a stranger can shift someone's entire day. Research in positive psychology suggests that performing acts of kindness not only benefits the recipient but also significantly boosts the well-being of the giver. This creates a positive feedback loop — when we feel good, we are more likely to spread that feeling to others. The world becomes a slightly better place every time someone chooses generosity over indifference.","ko":"아무리 작은 친절한 행동이라도 베푸는 순간을 훨씬 넘어 확장되는 파급 효과가 있어요. 문을 잡아주고, 진심 어린 칭찬을 하거나, 단순히 낯선 사람에게 미소 짓는 것만으로도 누군가의 하루 전체를 바꿀 수 있어요. 긍정 심리학의 연구는 친절한 행동을 수행하는 것이 받는 사람에게만 이익이 될 뿐만 아니라 주는 사람의 웰빙도 크게 향상시킨다고 제안해요. 이것은 긍정적인 피드백 루프를 만들어요 — 기분이 좋을 때 그 감정을 다른 사람들에게 전파할 가능성이 더 높아요. 누군가 무관심 대신 관대함을 선택할 때마다 세상은 조금 더 좋은 곳이 돼요.","ex":[{"p":"a ripple effect","m":"파급 효과","g":"ripple = 물결. 하나의 행동이 연쇄적으로 퍼져나가는 효과를 표현","s":"a chain reaction / a knock-on effect / a cascading impact","e":"One act of kindness can create a ripple effect that touches many lives."},{"p":"positive feedback loop","m":"긍정적인 피드백 루프","g":"feedback loop = 결과가 원인에 다시 영향을 주는 순환 구조. positive = 강화하는","s":"virtuous cycle / self-reinforcing pattern","e":"Exercise creates a positive feedback loop — you feel better, so you exercise more."},{"p":"indifference","m":"무관심","g":"indifference = 관심이 없음. apathy(무감각)와 비슷하지만 더 의도적인 무시 뉘앙스","s":"apathy / lack of concern / uncaring attitude","e":"The greatest enemy of kindness is not cruelty, but indifference."}]},{"id":20,"level":1,"topic":"일상","title":"Patience in an Impatient World","text":"We live in an age of instant gratification, where waiting even a few seconds for a page to load can feel unbearable. This cultural shift toward immediacy has made it harder for many people to tolerate delay, frustration, or slow progress. Yet the most meaningful things in life — deep relationships, mastery of a skill, recovery from hardship — all take time. Patience is not passive; it is an active practice of choosing to trust the process even when results are not yet visible. Learning to be comfortable with uncertainty is one of the most powerful things you can do for your mental health.","ko":"우리는 페이지가 로드되기까지 몇 초를 기다리는 것조차 참기 힘들 수 있는 즉각적인 만족의 시대에 살고 있어요. 즉각성을 향한 이 문화적 변화는 많은 사람들이 지연, 좌절, 또는 느린 진행을 견디기 더 어렵게 만들었어요. 하지만 삶에서 가장 의미 있는 것들 — 깊은 관계, 기술의 숙달, 고난으로부터의 회복 — 은 모두 시간이 걸려요. 인내는 수동적인 것이 아니에요; 결과가 아직 보이지 않아도 과정을 신뢰하기로 선택하는 능동적인 실천이에요. 불확실성에 편안해지는 법을 배우는 것이 정신 건강을 위해 할 수 있는 가장 강력한 일 중 하나예요.","ex":[{"p":"instant gratification","m":"즉각적인 만족","g":"gratification = 만족, 충족. instant gratification ↔ delayed gratification","s":"immediate reward / quick satisfaction","e":"Social media is designed to provide instant gratification through likes and comments."},{"p":"tolerate delay","m":"지연을 견디다","g":"tolerate = 참다, 견디다. tolerate + 명사. tolerance = 인내력","s":"endure waiting / accept slowness / put up with delays","e":"Children who can tolerate delay tend to do better academically and socially."},{"p":"trust the process","m":"과정을 신뢰하다","g":"process = 진행 과정. 결과보다 과정에 집중하라는 뉘앙스의 표현","s":"believe in the journey / have faith in gradual progress","e":"When growth feels slow, you have to trust the process and keep showing up."}]},{"id":21,"level":1,"topic":"일상","title":"The Science of Habits","text":"According to behavioral scientists, habits are formed through a simple three-step loop: a cue, a routine, and a reward. The cue triggers the behavior, the routine is the behavior itself, and the reward reinforces it. Understanding this loop gives you the power to intentionally build new habits or break unwanted ones. To form a new habit, attach it to an existing one — this is called habit stacking. To break a bad habit, identify the cue and find a healthier routine that delivers a similar reward.","ko":"행동 과학자들에 따르면, 습관은 단순한 세 단계 루프를 통해 형성돼요: 신호, 루틴, 그리고 보상이요. 신호는 행동을 유발하고, 루틴은 행동 자체이며, 보상은 그것을 강화해요. 이 루프를 이해하면 의도적으로 새로운 습관을 만들거나 원치 않는 습관을 끊을 수 있는 힘이 생겨요. 새로운 습관을 형성하려면 기존 습관에 붙이세요 — 이것을 습관 쌓기라고 해요. 나쁜 습관을 끊으려면 신호를 파악하고 비슷한 보상을 제공하는 더 건강한 루틴을 찾아보세요.","ex":[{"p":"triggers the behavior","m":"행동을 유발하다","g":"trigger = 방아쇠를 당기다 → 유발하다. trigger + 명사 또는 trigger + 사람 to do","s":"sets off the action / initiates the response / prompts the behavior","e":"Stress often triggers the behavior of reaching for comfort food."},{"p":"habit stacking","m":"습관 쌓기","g":"기존 습관 뒤에 새 습관을 연결하는 기법. After I do X, I will do Y.","s":"chaining habits / linking routines","e":"Habit stacking makes it easier to build new habits by linking them to existing ones."},{"p":"delivers a similar reward","m":"비슷한 보상을 제공하다","g":"deliver = 제공하다. reward = 보상. deliver results, deliver value처럼도 사용","s":"provides a comparable payoff / offers a similar benefit","e":"Going for a walk can deliver a similar reward to checking your phone — novelty and relief."}]},{"id":22,"level":1,"topic":"일상","title":"Work and Identity","text":"In many modern cultures, the first question asked when meeting someone new is: 'What do you do?' This reflects how deeply work has become intertwined with personal identity. While finding meaning in your work is healthy, over-identifying with your job creates fragility — if you lose your job or change careers, you can feel like you've lost yourself. A balanced identity includes your relationships, values, hobbies, and roles beyond your professional title. Diversifying your sense of self protects your mental health and opens you up to a richer life.","ko":"많은 현대 문화에서 새로운 사람을 만날 때 처음 하는 질문은 '무슨 일을 하세요?'예요. 이것은 일이 개인 정체성과 얼마나 깊이 뒤얽히게 됐는지를 반영해요. 일에서 의미를 찾는 것은 건강하지만, 직업과 지나치게 동일시하면 취약성이 생겨요 — 직업을 잃거나 커리어를 바꾸면 자신을 잃은 것처럼 느낄 수 있어요. 균형 잡힌 정체성은 직업적 직함을 넘어 관계, 가치관, 취미, 역할을 포함해요. 자아감을 다양화하는 것은 정신 건강을 보호하고 더 풍요로운 삶을 열어줘요.","ex":[{"p":"intertwined with","m":"~와 뒤얽힌, 긴밀히 연결된","g":"intertwine = 서로 엮이다. deeply intertwined와 함께 자주 사용","s":"deeply connected to / entangled with / inseparable from","e":"In modern life, technology has become deeply intertwined with how we work and socialize."},{"p":"over-identifying with","m":"~와 지나치게 동일시하다","g":"over- 접두사 = 지나치게. identify with = ~와 자신을 동일시하다","s":"defining yourself entirely by / being too attached to","e":"Over-identifying with your role as a parent can be unhealthy when children grow up."},{"p":"diversifying your sense of self","m":"자아감을 다양화하다","g":"diversify = 다양화하다. sense of self = 자아 개념. 투자 분산 개념을 정체성에 적용","s":"expanding your identity / not putting all your eggs in one basket of identity","e":"Diversifying your sense of self beyond work makes you more emotionally resilient."}]},{"id":23,"level":1,"topic":"일상","title":"The Hidden Cost of Multitasking","text":"Despite what many people believe, the human brain is not designed for true multitasking. What we call multitasking is actually rapid task-switching, and each switch comes with a cognitive cost. Studies show that people who multitask frequently make more mistakes, retain less information, and take longer to complete tasks than those who focus on one thing at a time. The illusion of efficiency makes multitasking feel productive, when in reality it often slows us down. Single-tasking — giving full attention to one thing — is both more effective and more satisfying.","ko":"많은 사람들이 믿는 것과 달리, 인간의 뇌는 진정한 멀티태스킹을 위해 설계되지 않았어요. 우리가 멀티태스킹이라고 부르는 것은 실제로 빠른 작업 전환이며, 각 전환에는 인지적 비용이 따라와요. 연구에 따르면 멀티태스킹을 자주 하는 사람들은 한 번에 한 가지에 집중하는 사람들보다 더 많은 실수를 하고, 더 적은 정보를 기억하고, 작업을 완료하는 데 더 오래 걸린다고 해요. 효율성의 환상이 멀티태스킹을 생산적으로 느끼게 만들지만, 실제로는 종종 우리를 느리게 해요. 싱글태스킹 — 한 가지에 온전히 집중하는 것 — 이 더 효과적이고 더 만족스러워요.","ex":[{"p":"cognitive cost","m":"인지적 비용","g":"cognitive = 인지의, 인식의. cost는 금전적 비용 외에 대가·부담을 의미","s":"mental toll / brain power required / attention cost","e":"Constant interruptions carry a hidden cognitive cost that reduces output quality."},{"p":"retain less information","m":"더 적은 정보를 기억하다","g":"retain = 유지하다, 보유하다. retain information = 정보를 기억에 유지하다","s":"remember less / hold onto less / absorb less","e":"We retain more information when we take notes by hand rather than typing."},{"p":"the illusion of efficiency","m":"효율성의 환상","g":"illusion = 착각, 환상. feels productive but isn't = efficiency illusion","s":"the false sense of productivity / misleading feeling of getting things done","e":"Checking email constantly creates the illusion of efficiency without real progress."}]},{"id":24,"level":1,"topic":"일상","title":"Learning from Failure","text":"Failure is universally feared but rarely discussed openly, which robs it of its greatest value. Every failure carries within it specific information about what went wrong and what can be done differently next time. The most successful people in any field tend to share one trait: they treat failure as data rather than as a verdict on their worth. Reframing failure as feedback removes the emotional sting and transforms it into a powerful learning tool. The question to ask after any setback is not 'Why did this happen to me?' but 'What is this teaching me?'","ko":"실패는 보편적으로 두려워하지만 공개적으로 거의 논의되지 않아, 그것의 가장 큰 가치를 빼앗아요. 모든 실패에는 무엇이 잘못됐는지와 다음에는 무엇을 다르게 할 수 있는지에 대한 구체적인 정보가 담겨 있어요. 어떤 분야에서든 가장 성공한 사람들은 한 가지 특성을 공유하는 경향이 있어요: 실패를 자신의 가치에 대한 판결이 아닌 데이터로 취급해요. 실패를 피드백으로 재구성하면 감정적인 아픔이 제거되고 강력한 학습 도구로 변환돼요. 어떤 좌절 후에도 할 질문은 '왜 이런 일이 나에게 일어났나?'가 아니라 '이것이 나에게 무엇을 가르치고 있나?'예요.","ex":[{"p":"robs it of its greatest value","m":"그것에서 가장 큰 가치를 빼앗다","g":"rob A of B = A에게서 B를 빼앗다. 중요한 숙어 패턴","s":"strips it of its value / takes away its benefit","e":"Fear of failure robs many people of their greatest opportunities."},{"p":"treat failure as data","m":"실패를 데이터로 취급하다","g":"treat A as B = A를 B로 취급하다. 인식의 전환을 표현하는 패턴","s":"view failure as information / see setbacks as feedback","e":"Scientists treat failure as data — it points them toward the right answer."},{"p":"Reframing failure as","m":"실패를 ~로 재구성하다","g":"reframe = 다른 시각으로 다시 바라보다. cognitive reframing은 심리 치료 기법","s":"seeing failure as / recasting failure as / repositioning failure as","e":"Reframing failure as a learning experience changes how you respond to it."}]},{"id":25,"level":1,"topic":"일상","title":"The Comfort Zone Paradox","text":"The comfort zone is not a place of comfort — it is a place of avoidance. What feels safe in the short term often leads to stagnation and regret over time. Growth, by its nature, requires discomfort; it happens at the edges of what we already know and can do. The paradox is that the more you push your boundaries, the more your sense of what is comfortable expands. Each time you do something that scares you a little, you become slightly more capable, confident, and alive.","ko":"컴포트 존은 편안함의 장소가 아니에요 — 회피의 장소예요. 단기적으로 안전하게 느껴지는 것이 시간이 지나면서 종종 침체와 후회로 이어져요. 성장은 그 본질상 불편함을 필요로 해요; 이미 알고 있고 할 수 있는 것의 가장자리에서 일어나요. 역설은 경계를 더 많이 밀어붙일수록 편안함의 감각이 더 많이 확장된다는 거예요. 조금 두렵게 만드는 것을 할 때마다 조금 더 유능하고, 자신감 있고, 살아있게 돼요.","ex":[{"p":"a place of avoidance","m":"회피의 장소","g":"avoidance = 피하는 것. avoidance behavior는 심리학 용어로도 사용","s":"a space of evasion / somewhere we hide from challenge","e":"Procrastination is not laziness — it's a place of avoidance dressed up as delay."},{"p":"leads to stagnation","m":"침체로 이어지다","g":"stagnation = 정체, 침체. stagnant water처럼 흐르지 않는 상태","s":"results in stagnation / causes you to stop growing","e":"Refusing to learn new skills leads to stagnation in your career."},{"p":"push your boundaries","m":"경계를 밀어붙이다","g":"push boundaries = 한계를 넘으려 시도하다. comfort zone과 자주 함께 사용","s":"challenge your limits / stretch your capabilities / step outside your comfort zone","e":"Traveling alone pushes your boundaries and builds real confidence."}]},{"id":26,"level":1,"topic":"일상","title":"The Problem with Perfectionism","text":"Perfectionism is often mistaken for high standards, but the two are fundamentally different. High standards drive you to produce excellent work; perfectionism drives you to avoid producing work at all, for fear that it won't be good enough. Perfectionists often procrastinate, struggle to finish projects, and are harshly self-critical when they fall short. The antidote is not lowering your standards but adopting a 'done is better than perfect' mindset for most things. Progress, not perfection, is what leads to growth and learning over time.","ko":"완벽주의는 종종 높은 기준으로 오해되지만, 두 가지는 근본적으로 달라요. 높은 기준은 훌륭한 작업을 만들도록 이끌어요; 완벽주의는 충분히 좋지 않을까 봐 두려워서 아예 작업을 만들지 않도록 이끌어요. 완벽주의자들은 종종 미루고, 프로젝트를 끝내는 데 어려움을 겪고, 부족할 때 자신에게 혹독하게 자기 비판적이에요. 해독제는 기준을 낮추는 것이 아니라 대부분의 것들에 대해 '완료가 완벽보다 낫다'는 마음가짐을 채택하는 거예요. 시간이 지남에 따라 성장과 학습으로 이어지는 것은 완벽함이 아닌 진전이에요.","ex":[{"p":"mistaken for","m":"~로 오해받다","g":"be mistaken for = ~로 잘못 알려지다. mistake A for B = A를 B로 혼동하다","s":"confused with / misidentified as / wrongly seen as","e":"Confidence is often mistaken for arrogance by people who lack it themselves."},{"p":"fall short","m":"부족하다, 미치지 못하다","g":"fall short (of expectations) = 기대에 미치지 못하다. fall short of는 전치사 of 포함","s":"come up short / not meet the standard / miss the mark","e":"Even great athletes fall short sometimes — that's how they learn to improve."},{"p":"done is better than perfect","m":"완료가 완벽보다 낫다","g":"행동파 마인드셋 표현. 완료하는 것의 가치를 강조","s":"progress over perfection / imperfect action beats perfect inaction","e":"When starting a new project, remember: done is better than perfect."}]},{"id":27,"level":1,"topic":"일상","title":"How to Handle Criticism","text":"Receiving criticism gracefully is a skill that takes time and self-awareness to develop. The natural reaction is to become defensive, dismissive, or hurt. However, criticism — when offered in good faith — is one of the most valuable gifts another person can give you. The key is to separate your sense of self-worth from the feedback. Ask yourself: Is there truth in this? What can I learn? A person who can genuinely hear and integrate criticism improves faster than one who cannot. Gratitude for honest feedback, even when it stings, is a mark of real maturity.","ko":"비판을 우아하게 받아들이는 것은 개발하는 데 시간과 자기 인식이 필요한 기술이에요. 자연스러운 반응은 방어적이 되거나, 무시하거나, 상처받는 것이에요. 하지만 비판은 — 선의로 제공될 때 — 다른 사람이 당신에게 줄 수 있는 가장 귀중한 선물 중 하나예요. 핵심은 자신의 가치감을 피드백에서 분리하는 거예요. 스스로에게 물어봐요: 여기에 진실이 있나? 무엇을 배울 수 있나? 비판을 진심으로 듣고 통합할 수 있는 사람은 그렇지 못한 사람보다 더 빠르게 향상돼요. 솔직한 피드백에 대한 감사함은, 아프더라도, 진정한 성숙함의 표시예요.","ex":[{"p":"receiving criticism gracefully","m":"비판을 우아하게 받아들이다","g":"gracefully = 우아하게, 품위 있게. gracefully accept/handle처럼도 사용","s":"handling feedback with composure / accepting criticism without defensiveness","e":"Receiving criticism gracefully shows emotional intelligence and confidence."},{"p":"offered in good faith","m":"선의로 제공된","g":"in good faith = 진심으로, 선의로. 법률·비즈니스 용어에서도 자주 사용","s":"given sincerely / provided with good intentions","e":"If feedback is offered in good faith, try to receive it with an open mind."},{"p":"integrate criticism","m":"비판을 통합하다·받아들여 발전시키다","g":"integrate = 통합하다. 단순히 듣는 것을 넘어 자신의 발전에 녹여넣는 것","s":"absorb feedback / incorporate criticism into your growth","e":"Great leaders don't just hear criticism — they integrate it into how they lead."}]},{"id":28,"level":1,"topic":"일상","title":"The Language We Use About Ourselves","text":"The way we talk to ourselves shapes our identity more than we realize. When you constantly say 'I'm bad at this' or 'I'm a procrastinator,' you are not describing your reality — you are reinforcing it. Neuroscience shows that the brain responds to negative self-talk by making those stories feel more true over time. Shifting to language like 'I'm still learning this' or 'I sometimes procrastinate but I'm working on it' creates space for growth and change. Be as careful with the words you use about yourself as you would be with words spoken to someone you care about.","ko":"우리가 자신에게 말하는 방식은 우리가 깨닫는 것보다 더 많이 정체성을 형성해요. '나는 이걸 못해' 또는 '나는 미루는 사람이야'라고 계속 말할 때, 당신은 현실을 묘사하는 게 아니에요 — 그것을 강화하는 거예요. 신경과학은 뇌가 부정적인 자기 대화에 반응하여 시간이 지남에 따라 그 이야기들이 더 사실처럼 느껴지도록 만든다는 것을 보여줘요. '나는 아직 이것을 배우고 있어' 또는 '나는 가끔 미루지만 고치고 있어'와 같은 언어로 전환하면 성장과 변화를 위한 공간이 생겨요. 자신에 대해 사용하는 말을 소중히 여기는 사람에게 하는 말만큼 주의해요.","ex":[{"p":"reinforcing it","m":"그것을 강화하다","g":"reinforce = 강화하다. reinforce beliefs, reinforce stereotypes처럼 사용","s":"making it stronger / cementing that belief / deepening that pattern","e":"Every time you act on fear, you are reinforcing it as a habit."},{"p":"creates space for","m":"~을 위한 공간을 만들다","g":"create space for = 가능성이나 여지를 만들다. 물리적 공간이 아닌 비유적 표현","s":"leaves room for / opens up possibilities for","e":"Taking a break creates space for new ideas to emerge."},{"p":"as careful with...as","m":"~만큼 ~에 주의하다","g":"as + 형용사 + with A + as + B 비교 구조. 두 가지를 동등하게 대우해야 한다는 뜻","s":"just as mindful of...as / equally careful with...as","e":"Be as careful with your commitments as you are with your money."}]},{"id":29,"level":1,"topic":"일상","title":"Why Travel Changes You","text":"Travel does more than provide new scenery — it fundamentally challenges the assumptions we carry about how life should be lived. When you encounter different cultures, foods, languages, and social customs, your mental models are forced to expand. Travelers often return home with a fresh appreciation for what they once took for granted and a healthier skepticism toward their own cultural defaults. Even uncomfortable or difficult travel experiences tend to build resilience, creativity, and empathy. You do not have to go far — sometimes a new neighborhood is enough to shift your perspective.","ko":"여행은 새로운 풍경을 제공하는 것 이상이에요 — 삶이 어떻게 살아져야 하는지에 대해 우리가 가지고 다니는 가정에 근본적으로 도전해요. 다른 문화, 음식, 언어, 사회적 관습을 만날 때, 정신적 모델이 확장되도록 강요받아요. 여행자들은 종종 한때 당연하게 여겼던 것에 대한 새로운 감사와 자신의 문화적 기본값에 대한 더 건강한 회의주의를 가지고 집으로 돌아와요. 불편하거나 어려운 여행 경험도 회복력, 창의성, 공감 능력을 키우는 경향이 있어요. 멀리 갈 필요가 없어요 — 때로는 새로운 동네만으로도 관점을 바꾸기에 충분해요.","ex":[{"p":"assumptions we carry","m":"우리가 가지고 다니는 가정들","g":"carry assumptions = 믿음이나 편견을 가지고 다니다. 이미 가지고 있는 전제를 표현","s":"beliefs we hold / preconceptions we bring / ideas we take for granted","e":"We often don't realize the assumptions we carry until something challenges them."},{"p":"took for granted","m":"당연하게 여기다","g":"take A for granted = A의 가치를 인식하지 못하고 당연히 여기다","s":"overlooked / didn't appreciate / assumed would always be there","e":"We often take clean water and safety for granted until we experience their absence."},{"p":"cultural defaults","m":"문화적 기본값","g":"default = 자동으로 선택되는 설정. cultural defaults = 의문 없이 따르는 문화적 관행","s":"cultural norms / automatic cultural assumptions / default behaviors","e":"Travel helps you notice and question your own cultural defaults."}]},{"id":30,"level":1,"topic":"일상","title":"Asking for Help","text":"Many people find it remarkably difficult to ask for help, even when they genuinely need it. This reluctance often stems from a fear of appearing weak, incompetent, or burdensome. Yet research consistently shows that asking for help is associated with higher performance, not lower. People who ask for help learn faster, make fewer mistakes, and build stronger relationships. Asking someone for their expertise or support is also a form of respect — it signals that you value their knowledge and trust them enough to be vulnerable. Most people are far more willing to help than we assume.","ko":"많은 사람들이 진심으로 필요할 때도 도움을 요청하는 것이 놀랍도록 어렵다고 느껴요. 이 꺼림칙함은 종종 약하고, 무능하고, 부담스럽게 보일 것에 대한 두려움에서 비롯돼요. 하지만 연구는 일관되게 도움을 요청하는 것이 더 낮은 성과가 아닌 더 높은 성과와 연관이 있다고 보여줘요. 도움을 요청하는 사람들은 더 빨리 배우고, 더 적은 실수를 하고, 더 강한 관계를 구축해요. 누군가의 전문 지식이나 지원을 요청하는 것은 또한 존중의 형태예요 — 그들의 지식을 소중히 여기고 취약해질 만큼 충분히 신뢰한다는 신호를 보내요. 대부분의 사람들은 우리가 가정하는 것보다 훨씬 더 기꺼이 도우려 해요.","ex":[{"p":"reluctance stems from","m":"꺼림칙함이 ~에서 비롯되다","g":"reluctance = 하기 싫음, 꺼려함. stem from = 기인하다","s":"hesitation comes from / unwillingness originates in","e":"His reluctance to delegate stems from a fear of losing control."},{"p":"associated with higher performance","m":"더 높은 성과와 연관이 있다","g":"be associated with = ~와 연관되다. academic·research context에서 자주 사용","s":"linked to better outcomes / connected to greater success","e":"Regular feedback is associated with higher performance in the workplace."},{"p":"be vulnerable","m":"취약해지다, 솔직하게 열리다","g":"vulnerable = 상처받을 수 있는. Brené Brown이 강조한 '감정적으로 열리는 것'의 의미","s":"open up / show your true self / lower your guard","e":"Real intimacy requires the courage to be vulnerable with another person."}]},{"id":31,"level":1,"topic":"일상","title":"The Joy of Simple Pleasures","text":"Modern life often trains us to overlook the small, freely available pleasures in favor of bigger, more expensive experiences. Yet psychological research suggests that simple pleasures — a cup of tea, a walk in fresh air, a conversation with an old friend — often provide more lasting satisfaction than major purchases or events. This is partly because we adapt quickly to big experiences, a phenomenon known as hedonic adaptation. Simple pleasures, by contrast, tend to stay fresh because they are accessible every day. Slowing down enough to notice and savor them is a practice that pays dividends for your overall happiness.","ko":"현대 생활은 종종 더 크고 더 비싼 경험을 선호하여 작고 무료로 이용 가능한 즐거움을 간과하도록 훈련해요. 하지만 심리학적 연구는 단순한 즐거움들 — 차 한 잔, 신선한 공기 속 산책, 오랜 친구와의 대화 — 이 종종 큰 구매나 행사보다 더 오래 지속되는 만족을 제공한다고 제안해요. 이는 부분적으로 우리가 큰 경험에 빠르게 적응하기 때문인데, 쾌락적 적응이라고 알려진 현상이에요. 반면에 단순한 즐거움은 매일 접근 가능하기 때문에 신선함을 유지하는 경향이 있어요. 그것들을 알아차리고 음미할 만큼 충분히 속도를 늦추는 것은 전반적인 행복에 보상을 주는 실천이에요.","ex":[{"p":"in favor of","m":"~를 선호하여, ~를 위해","g":"in favor of = ~을 지지하여, ~쪽을 선택하여. decide in favor of도 사용","s":"in preference to / choosing over / at the expense of","e":"Many people give up hobbies in favor of more productive activities."},{"p":"hedonic adaptation","m":"쾌락적 적응","g":"hedonic = 쾌락의. adaptation = 적응. 새로운 것에 빠르게 익숙해지는 심리 현상","s":"getting used to good things / the hedonic treadmill","e":"Hedonic adaptation explains why a new car stops making us happy after a few weeks."},{"p":"pays dividends","m":"보상을 주다, 이득이 되다","g":"pay dividends = 주식 배당처럼 보상이 돌아온다. 시간이 지나 이득이 생기는 것","s":"pays off / brings rewards / yields returns","e":"Investing in your health pays dividends for decades to come."}]},{"id":32,"level":1,"topic":"일상","title":"Keeping Promises to Yourself","text":"Of all the commitments we make, the ones we make to ourselves are often the easiest to break. When we cancel plans with ourselves — skipping exercise, abandoning a creative project, giving up on a goal — we send a subtle but powerful message to our subconscious: my word to myself does not matter. Over time, this erodes self-trust and makes it harder to believe in your own intentions. Honoring your commitments to yourself, even small ones, builds a track record of reliability that strengthens your self-concept. Start small: keep one promise to yourself today, then build from there.","ko":"우리가 만드는 모든 약속 중에서, 자신에게 만드는 것들이 종종 가장 깨기 쉬워요. 자신과의 계획을 취소할 때 — 운동을 건너뛰고, 창의적인 프로젝트를 포기하고, 목표를 포기할 때 — 잠재의식에 미묘하지만 강력한 메시지를 보내요: 자신에 대한 내 말은 중요하지 않다. 시간이 지남에 따라 이것은 자기 신뢰를 침식하고 자신의 의도를 믿기 더 어렵게 만들어요. 자신에 대한 약속을, 작은 것도, 지키면 자아 개념을 강화하는 신뢰성의 실적이 쌓여요. 작게 시작하세요: 오늘 자신에게 약속 하나를 지키고, 거기서 쌓아나가세요.","ex":[{"p":"subtle but powerful","m":"미묘하지만 강력한","g":"subtle = 눈에 잘 띄지 않는, 미묘한. but powerful로 대조를 강조","s":"quiet but significant / small but impactful","e":"The way you speak to yourself sends a subtle but powerful message every day."},{"p":"erodes self-trust","m":"자기 신뢰를 침식하다","g":"erode = 서서히 깎아내다. 해안 침식처럼 자기 신뢰가 조금씩 무너지는 이미지","s":"undermines self-confidence / chips away at your belief in yourself","e":"Consistently breaking promises to yourself erodes self-trust over time."},{"p":"track record of reliability","m":"신뢰성의 실적","g":"track record = 과거 성과 기록. reliability = 신뢰할 수 있음","s":"history of keeping your word / proven record of follow-through","e":"Employers value candidates who have a track record of reliability."}]},{"id":33,"level":1,"topic":"일상","title":"The Power of Environment Design","text":"We like to believe that our behavior is driven by willpower, but research suggests that our environment shapes our choices far more than we think. If you leave your phone on your desk, you will check it. If you keep fruit visible on the counter, you will eat more of it. Designing your environment to make good choices easy and bad choices difficult is one of the most effective strategies for behavior change. Instead of relying on discipline alone, architect your surroundings to work in your favor. The goal is to make the right choice the default choice.","ko":"우리는 행동이 의지력에 의해 이끌린다고 믿고 싶지만, 연구는 우리 환경이 우리가 생각하는 것보다 훨씬 더 많이 선택을 형성한다고 제안해요. 핸드폰을 책상 위에 두면 확인할 거예요. 과일을 카운터에 눈에 띄게 두면 더 많이 먹을 거예요. 좋은 선택을 쉽게 하고 나쁜 선택을 어렵게 만들도록 환경을 설계하는 것은 행동 변화를 위한 가장 효과적인 전략 중 하나예요. 단독으로 절제에 의존하는 대신 자신에게 유리하게 주변 환경을 설계해봐요. 목표는 올바른 선택이 기본 선택이 되도록 하는 거예요.","ex":[{"p":"shapes our choices","m":"선택을 형성하다","g":"shape = 형성하다. shape behavior, shape identity, shape the future처럼 활용","s":"influences our decisions / determines what we choose / affects our behavior","e":"The company culture shapes employees' choices more than the written rules do."},{"p":"architect your surroundings","m":"주변 환경을 설계하다","g":"architect = 건축가, 설계하다 (동사). surroundings = 주변 환경","s":"design your environment / structure your space / engineer your surroundings","e":"To eat better, architect your surroundings by keeping healthy food within reach."},{"p":"the default choice","m":"기본 선택, 자동으로 하게 되는 선택","g":"default = 기본값. 의식적인 결정 없이 자동으로 선택되는 것","s":"the automatic option / the path of least resistance / the easiest choice","e":"Make exercise the default choice by putting your gym clothes next to your bed."}]},{"id":34,"level":2,"topic":"일상","title":"Social Media and Self-Worth","text":"Social media platforms are designed to maximize engagement, and one powerful way they do this is by tapping into our fundamental need for social approval. Each like, comment, or share triggers a small dopamine release, creating a cycle of seeking and receiving validation. The danger is that this trains us to evaluate our worth based on external metrics rather than internal values. Research links heavy social media use to increased rates of anxiety, depression, and loneliness, particularly among young people. Using social media intentionally — with clear limits and purposes — allows you to enjoy its benefits without letting it define your sense of self.","ko":"소셜 미디어 플랫폼은 참여를 극대화하도록 설계됐고, 이를 위한 강력한 방법 중 하나는 사회적 승인에 대한 우리의 근본적인 욕구를 이용하는 거예요. 각 좋아요, 댓글, 또는 공유는 작은 도파민 분비를 유발하여 검증을 추구하고 받는 사이클을 만들어요. 위험은 이것이 내부적 가치가 아닌 외부적 지표를 기반으로 자신의 가치를 평가하도록 훈련한다는 거예요. 연구는 과도한 소셜 미디어 사용을 불안, 우울증, 외로움의 증가율과 연결하는데, 특히 젊은 사람들 사이에서요. 명확한 한도와 목적을 가지고 소셜 미디어를 의도적으로 사용하면 그것이 자아감을 정의하도록 두지 않고 이점을 즐길 수 있어요.","ex":[{"p":"tapping into","m":"~를 이용하다, 활용하다","g":"tap into = 자원이나 감정 등을 이용하다. tap into emotions, tap into potential처럼 사용","s":"exploiting / drawing on / leveraging","e":"Great marketing taps into the emotions and desires of its audience."},{"p":"triggers a dopamine release","m":"도파민 분비를 유발하다","g":"trigger = 유발하다. dopamine = 쾌감·보상과 관련된 신경 전달 물질","s":"releases dopamine / causes a pleasure response / activates the reward center","e":"Checking your phone triggers a dopamine release that makes it hard to stop."},{"p":"external metrics","m":"외부적 지표","g":"metric = 측정 기준. external ↔ internal. 좋아요 수처럼 외부에서 측정되는 것","s":"outside measures / external validation / public indicators","e":"Don't let external metrics like follower counts define your sense of value."}]},{"id":35,"level":2,"topic":"일상","title":"The Power of Apology","text":"A genuine apology is one of the most powerful tools for repairing damaged relationships and restoring trust. Yet most people apologize poorly — saying 'I'm sorry you feel that way' instead of 'I'm sorry for what I did.' A real apology has three components: acknowledgment of the specific harm caused, genuine remorse, and a commitment to change. It does not make excuses or redirect blame. Apologizing well requires setting aside your ego and prioritizing the other person's experience. When done sincerely, it can transform conflict into deeper understanding.","ko":"진심 어린 사과는 손상된 관계를 회복하고 신뢰를 회복하는 가장 강력한 도구 중 하나예요. 하지만 대부분의 사람들은 잘못 사과해요 — '제가 한 것에 대해 미안해요' 대신 '당신이 그렇게 느끼다니 미안해요'라고 말해요. 진정한 사과에는 세 가지 구성 요소가 있어요: 야기된 특정 피해의 인정, 진정한 후회, 그리고 변화에 대한 약속이요. 변명을 하거나 비난을 돌리지 않아요. 잘 사과하려면 자신의 자아를 내려놓고 상대방의 경험을 우선시해야 해요. 진심으로 할 때, 갈등을 더 깊은 이해로 변환할 수 있어요.","ex":[{"p":"repairing damaged relationships","m":"손상된 관계를 회복하다","g":"repair = 고치다, 회복하다. repair a relationship, repair trust처럼 사용","s":"healing broken bonds / restoring strained relationships","e":"A sincere apology is the first step toward repairing a damaged relationship."},{"p":"genuine remorse","m":"진정한 후회·뉘우침","g":"genuine = 진짜의, 진심의. remorse = 깊은 후회, 가책. regret보다 강한 표현","s":"heartfelt regret / sincere sorrow / real contrition","e":"Without genuine remorse, an apology is just words that don't mean anything."},{"p":"setting aside your ego","m":"자신의 자아를 내려놓다","g":"set aside = 제쳐두다. ego = 자존심, 자아. set aside differences, set aside pride처럼도 사용","s":"putting your pride aside / letting go of your need to be right","e":"Apologizing well means setting aside your ego and focusing on the other person."}]},{"id":36,"level":2,"topic":"일상","title":"Dealing With Uncertainty","text":"One of the greatest sources of anxiety in modern life is the intolerance of uncertainty. We crave control and predictability, but the truth is that most of life is inherently unpredictable. Trying to eliminate uncertainty only amplifies the anxiety it creates. A more effective approach is to build your relationship with uncertainty rather than fight it. This means practicing acceptance, staying grounded in what you can control, and developing trust in your own ability to adapt and respond. Resilient people don't have fewer uncertainties than others — they simply have a better relationship with not knowing.","ko":"현대 생활에서 불안의 가장 큰 원천 중 하나는 불확실성에 대한 불인내예요. 우리는 통제와 예측 가능성을 열망하지만, 사실 삶의 대부분은 본질적으로 예측 불가능해요. 불확실성을 없애려는 시도는 그것이 만드는 불안을 증폭시킬 뿐이에요. 더 효과적인 접근법은 불확실성과 싸우기보다 불확실성과의 관계를 구축하는 거예요. 이것은 수용을 실천하고, 통제할 수 있는 것에 근거를 두고, 적응하고 반응하는 자신의 능력에 신뢰를 개발하는 것을 의미해요. 회복력 있는 사람들이 다른 사람들보다 불확실성이 적은 게 아니에요 — 단순히 모르는 것과 더 좋은 관계를 갖고 있어요.","ex":[{"p":"intolerance of uncertainty","m":"불확실성에 대한 불인내","g":"intolerance of = ~를 참지 못함. intolerance of ambiguity도 비슷한 표현","s":"inability to cope with the unknown / discomfort with unpredictability","e":"Intolerance of uncertainty is a core feature of anxiety disorders."},{"p":"amplifies the anxiety","m":"불안을 증폭시키다","g":"amplify = 증폭시키다. 소리를 키우는 것에서 나온 비유적 표현","s":"intensifies the worry / makes anxiety worse / magnifies fear","e":"Avoiding feared situations only amplifies the anxiety in the long run."},{"p":"staying grounded in","m":"~에 근거를 두다, 중심을 잡다","g":"grounded = 안정적인, 흔들리지 않는. stay grounded in reality, stay grounded in your values","s":"remaining anchored to / staying connected to / keeping your feet on the ground about","e":"Staying grounded in your values helps you navigate uncertain times with clarity."}]},{"id":37,"level":2,"topic":"일상","title":"Boundaries and Self-Respect","text":"Boundaries are not walls that keep people out — they are guidelines that define how you expect to be treated. People with healthy boundaries communicate clearly what they are and are not willing to do, without guilt or apology. Setting a boundary is an act of self-respect and also an act of respect toward others, because it creates honest and sustainable relationships. The discomfort of setting a boundary is temporary; the discomfort of not having one is chronic. If you struggle to set limits, start by identifying what consistently drains you, and work backwards from there.","ko":"경계는 사람들을 막는 벽이 아니에요 — 자신이 어떻게 대우받기를 기대하는지 정의하는 지침이에요. 건강한 경계를 가진 사람들은 죄책감이나 사과 없이 자신이 기꺼이 하고 하지 않을 것을 명확하게 전달해요. 경계를 설정하는 것은 자기 존중의 행위이자 타인에 대한 존중의 행위이기도 해요, 왜냐하면 솔직하고 지속 가능한 관계를 만들기 때문이에요. 경계를 설정하는 불편함은 일시적이에요; 경계가 없을 때의 불편함은 만성적이에요. 한계를 설정하는 것이 어렵다면, 일관되게 무엇이 당신의 에너지를 소진하는지 파악하고 거기서부터 역으로 작업해봐요.","ex":[{"p":"define how you expect to be treated","m":"대우받기를 기대하는 방식을 정의하다","g":"define = 정의하다. how + 주어 + 동사 구조로 방식을 표현","s":"set standards for how others interact with you / establish what treatment is acceptable","e":"Your boundaries define how you expect to be treated in any relationship."},{"p":"sustainable relationships","m":"지속 가능한 관계","g":"sustainable = 지속 가능한. 환경에만 쓰이지 않고 관계·생활방식에도 사용","s":"lasting relationships / healthy long-term connections","e":"Without honesty, it's difficult to build truly sustainable relationships."},{"p":"work backwards from there","m":"거기서부터 역으로 작업하다","g":"work backwards = 결과에서 원인으로 거슬러 올라가 생각하다","s":"trace back from that point / reverse-engineer from there","e":"To solve a complex problem, try working backwards from the desired outcome."}]},{"id":38,"level":2,"topic":"일상","title":"The Art of Slowing Down","text":"Speed is celebrated in modern culture, but there is an underappreciated wisdom in moving slowly and deliberately. Rushing through life means you arrive at your destinations without having fully experienced the journey. Slowing down allows you to notice details, make more thoughtful decisions, and be more present in your relationships. Many of the mistakes we regret most are those made in haste — sent in anger, spoken without thinking, chosen under pressure. There is nothing inherently wrong with moving quickly when the situation demands it, but cultivating the ability to slow down is a form of self-mastery worth developing.","ko":"속도는 현대 문화에서 찬양되지만, 천천히 신중하게 움직이는 것에는 과소평가된 지혜가 있어요. 삶을 서두르며 살면 여정을 완전히 경험하지 않고 목적지에 도착하게 돼요. 속도를 늦추면 세부 사항을 알아차리고, 더 사려 깊은 결정을 내리고, 관계에서 더 현재에 있을 수 있어요. 우리가 가장 후회하는 실수들 중 많은 것들이 서두름 속에 만들어진 것들이에요 — 화로 보낸 것, 생각 없이 말한 것, 압박 아래 선택한 것. 상황이 요구할 때 빠르게 움직이는 것은 본질적으로 잘못된 것이 없지만, 속도를 늦추는 능력을 기르는 것은 개발할 가치 있는 자기 통달의 형태예요.","ex":[{"p":"moving slowly and deliberately","m":"천천히 신중하게 움직이다","g":"deliberately = 의도적으로, 신중하게. deliberate action = 의도적인 행동","s":"acting with intention / moving thoughtfully / taking your time","e":"She spoke slowly and deliberately, making sure every word had weight."},{"p":"made in haste","m":"서둘러서 만들어진","g":"in haste = 서둘러서. Haste makes waste(서두르면 망친다) 속담에도 등장","s":"rushed / made under pressure / done too quickly","e":"Most decisions made in haste are ones we later wish we had thought through more carefully."},{"p":"self-mastery","m":"자기 통달, 자기 절제","g":"mastery = 통달, 숙달. self-mastery = 자신을 다스리는 능력. self-control과 비슷","s":"self-discipline / self-control / personal mastery","e":"True leadership begins with self-mastery — the ability to manage your own emotions and impulses."}]},{"id":39,"level":2,"topic":"일상","title":"Finding Flow","text":"Psychologist Mihaly Csikszentmihalyi described 'flow' as a state of complete absorption in a challenging but manageable activity. In flow, time seems to stop, self-consciousness fades, and performance reaches its peak. Flow occurs at the intersection of high skill and high challenge — too easy and you become bored, too hard and you become anxious. Activities that reliably produce flow — music, coding, sport, writing — tend to be deeply rewarding precisely because they demand your full attention. Identifying and regularly engaging in activities that produce flow is one of the most direct paths to a satisfying life.","ko":"심리학자 미하이 칙센트미하이는 '플로우'를 도전적이지만 관리 가능한 활동에 완전히 몰입한 상태로 묘사했어요. 플로우에서는 시간이 멈추는 것처럼 보이고, 자기 의식이 사라지고, 수행 능력이 최고조에 달해요. 플로우는 높은 기술과 높은 도전의 교차점에서 발생해요 — 너무 쉬우면 지루해지고, 너무 어려우면 불안해져요. 음악, 코딩, 스포츠, 글쓰기처럼 안정적으로 플로우를 만드는 활동들은 완전한 주의를 요구하기 때문에 정확히 깊이 보람 있는 경향이 있어요. 플로우를 만드는 활동을 파악하고 정기적으로 참여하는 것은 만족스러운 삶으로 가는 가장 직접적인 경로 중 하나예요.","ex":[{"p":"complete absorption in","m":"~에 완전히 몰입한","g":"absorption = 흡수, 몰입. be absorbed in = ~에 몰두하다. complete는 강조","s":"total immersion in / full engagement with / being completely lost in","e":"Complete absorption in creative work is one of the most satisfying human experiences."},{"p":"self-consciousness fades","m":"자기 의식이 사라지다","g":"self-consciousness = 자의식, 남의 시선을 의식하는 것. fade = 점차 사라지다","s":"self-awareness disappears / the inner critic goes quiet","e":"In moments of flow, self-consciousness fades and you simply become the activity."},{"p":"at the intersection of","m":"~의 교차점에서","g":"intersection = 교차점. at the intersection of A and B = A와 B가 만나는 지점에서","s":"at the crossroads of / where A meets B / combining both","e":"Innovation often happens at the intersection of different disciplines and perspectives."}]},{"id":40,"level":2,"topic":"일상","title":"The Long Game","text":"Most people overestimate what they can achieve in one year and underestimate what they can achieve in ten. This is the core insight behind thinking in terms of the long game. Short-term thinking optimizes for immediate comfort; long-term thinking optimizes for meaning and compound growth. Choosing to invest in health, relationships, skills, and character over years and decades produces results that cannot be achieved through any shortcut. The people who seem to achieve the most are often those who simply stay in the game longer than everyone else, showing up consistently through both good and difficult times.","ko":"대부분의 사람들은 1년 안에 달성할 수 있는 것을 과대평가하고 10년 안에 달성할 수 있는 것을 과소평가해요. 이것이 장기적인 게임으로 생각하는 것의 핵심 통찰이에요. 단기적 사고는 즉각적인 편안함을 최적화하고; 장기적 사고는 의미와 복리 성장을 최적화해요. 수년과 수십 년에 걸쳐 건강, 관계, 기술, 성품에 투자하기로 선택하면 어떤 지름길로도 달성할 수 없는 결과를 만들어요. 가장 많은 것을 달성하는 것처럼 보이는 사람들은 종종 단순히 다른 모든 사람보다 더 오랫동안 게임에 머물며 좋은 시간과 어려운 시간 모두를 통해 일관되게 나타나는 사람들이에요.","ex":[{"p":"overestimate what they can achieve","m":"달성할 수 있는 것을 과대평가하다","g":"overestimate ↔ underestimate. 동사 + what 절 구조","s":"expect too much too soon / set unrealistic short-term expectations","e":"We tend to overestimate what we can achieve this week and underestimate this decade."},{"p":"optimizes for","m":"~를 위해 최적화하다","g":"optimize for = ~를 목표로 최적화하다. 컴퓨터 용어에서 일상으로 확장된 표현","s":"prioritizes / is designed for / is structured around","e":"A good night's sleep optimizes for recovery, creativity, and emotional regulation."},{"p":"showing up consistently","
